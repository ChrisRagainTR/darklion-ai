<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route to DarkLion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid #1e2330;
      flex-shrink: 0;
    }
    .header h2 { font-size: 15px; font-weight: 700; color: #fff; }
    .header p  { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* Shared fields row */
    .shared-fields {
      padding: 12px 18px;
      border-bottom: 1px solid #1e2330;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: #0f1117;
    }
    .shared-fields .field { flex: 1; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus, select:focus { border-color: #4f8ef7; }
    select option { background: #1e2330; }

    /* Client search */
    .search-wrap { position: relative; }
    #clientResults {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1a1f2e; border: 1px solid #2d3748;
      border-top: none; border-radius: 0 0 6px 6px;
      max-height: 160px; overflow-y: auto; z-index: 100; display: none;
    }
    .result-item {
      padding: 7px 10px; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; gap: 7px;
    }
    .result-item:hover { background: #252d3d; }
    .type-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      font-weight: 700; text-transform: uppercase; flex-shrink: 0;
    }
    .type-person       { background: #1e3a5f; color: #60a5fa; }
    .type-company      { background: #1a3a2a; color: #4ade80; }
    .type-relationship { background: #3a1a3a; color: #c084fc; }

    #selectedClient {
      display: none; align-items: center; justify-content: space-between;
      background: #1a2640; border: 1px solid #2d4a6e;
      border-radius: 6px; padding: 7px 10px; font-size: 13px;
    }
    #selectedClient .name { color: #93c5fd; font-weight: 600; }
    #selectedClient .clear {
      background: none; border: none; color: #64748b;
      cursor: pointer; font-size: 15px; padding: 0 2px;
    }
    #selectedClient .clear:hover { color: #e2e8f0; }

    /* Jobs list */
    .jobs-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 18px;
    }

    .job-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .job-card.uploaded {
      border-color: #1a4a2e;
      background: #111a14;
      opacity: 0.7;
    }
    .job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .job-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .job-status {
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .job-status.done    { color: #4ade80; }
    .job-status.error   { color: #f87171; }
    .job-status.pending { color: #64748b; }
    .job-status.loading { color: #4f8ef7; }

    .job-name-input {
      width: 100%;
      padding: 6px 8px;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
      margin-bottom: 6px;
    }
    .job-name-input:focus { border-color: #4f8ef7; }

    .job-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .btn-upload {
      flex: 1;
      padding: 6px 10px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-upload:hover { background: #3b7de8; }
    .btn-upload:disabled { background: #374151; cursor: not-allowed; }
    .btn-skip {
      padding: 6px 10px;
      background: #1e2330;
      color: #64748b;
      border: 1px solid #2d3748;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-skip:hover { color: #e2e8f0; }

    /* Bottom bar */
    .bottom-bar {
      padding: 12px 18px;
      border-top: 1px solid #1e2330;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .progress-text { font-size: 12px; color: #64748b; }
    .btn-done {
      padding: 8px 20px;
      background: #1e4a2e;
      color: #4ade80;
      border: 1px solid #2d6a3e;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-done:hover { background: #1a5a36; }
    .btn-cancel {
      padding: 8px 16px;
      background: #1e2330;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #252d3d; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h2>🦁 Route to DarkLion</h2>
      <p id="headerSub">Select a client, then upload each document</p>
    </div>
  </div>

  <!-- Shared: Client + Year + Folder (apply to all jobs) -->
  <div class="shared-fields">
    <div class="field" style="flex:2;">
      <label>Client (applies to all)</label>
      <div class="search-wrap">
        <input type="text" id="clientSearch" placeholder="Type to search…"
               autocomplete="off" oninput="onSearchInput()" />
        <div id="clientResults"></div>
      </div>
      <div id="selectedClient">
        <span class="name" id="selectedName"></span>
        <button class="clear" onclick="clearClient()">✕</button>
      </div>
    </div>
    <div class="field">
      <label>Year</label>
      <select id="year"></select>
    </div>
    <div class="field">
      <label>Folder</label>
      <select id="category">
        <option value="tax">Tax</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Section</label>
      <select id="section">
        <option value="firm_uploaded">Advisor</option>
        <option value="client_uploaded">Client</option>
      </select>
    </div>
  </div>

  <!-- Job list -->
  <div class="jobs-list" id="jobsList">
    <div style="color:#64748b;font-size:13px;text-align:center;padding:2rem;">
      Waiting for print jobs…
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span class="progress-text" id="progressText"></span>
    <div style="display:flex;gap:8px;">
      <button class="btn-cancel" onclick="doCancel()">Cancel All</button>
      <button class="btn-done" id="doneBtn" onclick="doDone()" style="display:none;">✓ Done</button>
    </div>
  </div>

  <script>
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────────
  let jobs = [];       // [{ filePath, jobTitle, status: 'pending'|'uploading'|'done'|'skipped'|'error', errorMsg }]
  let selectedClient = null;
  let searchTimer = null;

  // ── Init ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    populateYearDropdown();

    window.electronAPI.onJobReady(({ jobs: incoming }) => {
      addJobs(incoming);
    });

    window.electronAPI.onAddJobs((incoming) => {
      addJobs(incoming);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) hideResults();
    });
  });

  function addJobs(incoming) {
    for (const j of incoming) {
      jobs.push({ filePath: j.filePath, jobTitle: j.jobTitle || 'Document', status: 'pending', errorMsg: null });
    }
    renderJobs();
    updateProgress();
    document.getElementById('headerSub').textContent =
      jobs.length === 1 ? '1 document to route' : `${jobs.length} documents to route`;
  }

  // ── Year dropdown ──────────────────────────────────────────────────────────
  function populateYearDropdown() {
    const sel = document.getElementById('year');
    const y = new Date().getFullYear();
    for (let i = y; i >= y - 4; i--) {
      const o = document.createElement('option');
      o.value = String(i); o.textContent = String(i);
      sel.appendChild(o);
    }
  }

  // ── Render jobs ────────────────────────────────────────────────────────────
  function renderJobs() {
    const el = document.getElementById('jobsList');
    if (!jobs.length) { el.innerHTML = '<div style="color:#64748b;text-align:center;padding:2rem;font-size:13px;">No jobs</div>'; return; }

    el.innerHTML = jobs.map((j, i) => {
      const isDone    = j.status === 'done' || j.status === 'skipped';
      const isLoading = j.status === 'uploading';
      const isError   = j.status === 'error';

      const statusText = j.status === 'done'      ? '✓ Uploaded'
                       : j.status === 'skipped'   ? '— Skipped'
                       : j.status === 'uploading' ? '⏳ Uploading…'
                       : j.status === 'error'     ? ('✗ ' + (j.errorMsg || 'Error'))
                       : '';
      const statusClass = j.status === 'done' || j.status === 'skipped' ? 'done'
                        : j.status === 'uploading' ? 'loading'
                        : j.status === 'error' ? 'error' : 'pending';

      return `
        <div class="job-card ${isDone ? 'uploaded' : ''}" id="job-card-${i}">
          <div class="job-header">
            <span class="job-title" title="${esc(j.jobTitle)}">${esc(j.jobTitle)}</span>
            ${statusText ? `<span class="job-status ${statusClass}">${statusText}</span>` : ''}
          </div>
          ${!isDone ? `
            <input type="text" class="job-name-input" id="job-name-${i}"
                   value="${esc(j.jobTitle)}" placeholder="Document name">
            <div class="job-actions">
              <button class="btn-upload" id="job-btn-${i}"
                      onclick="uploadJob(${i})" ${isLoading ? 'disabled' : ''}>
                ${isLoading ? 'Uploading…' : '↑ Upload to DarkLion'}
              </button>
              <button class="btn-skip" onclick="skipJob(${i})" ${isLoading ? 'disabled' : ''}>Skip</button>
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  function updateProgress() {
    const done    = jobs.filter(j => j.status === 'done' || j.status === 'skipped').length;
    const total   = jobs.length;
    const el      = document.getElementById('progressText');
    const doneBtn = document.getElementById('doneBtn');

    el.textContent = total ? `${done} of ${total} complete` : '';
    doneBtn.style.display = (done === total && total > 0) ? '' : 'none';
  }

  // ── Client search ──────────────────────────────────────────────────────────
  function onSearchInput() {
    const q = document.getElementById('clientSearch').value.trim();
    if (searchTimer) clearTimeout(searchTimer);
    if (q.length < 2) { hideResults(); return; }
    searchTimer = setTimeout(() => runSearch(q), 250);
  }

  async function runSearch(q) {
    try {
      const results = await window.electronAPI.search(q);
      renderResults(results);
    } catch (err) {
      console.error('Search error:', err);
    }
  }

  function renderResults(data) {
    const container = document.getElementById('clientResults');
    container.innerHTML = '';
    const items = [];
    (data.people        || []).forEach(p => items.push({ id: p.id, type: 'person',       label: p.full_name || p.name || 'Person #' + p.id,       sub: p.email || '' }));
    (data.companies     || []).forEach(c => items.push({ id: c.id, type: 'company',      label: c.name || 'Company #' + c.id,                       sub: '' }));
    (data.relationships || []).forEach(r => items.push({ id: r.id, type: 'relationship', label: r.name || r.display_name || 'Household #' + r.id,   sub: '' }));

    if (!items.length) {
      container.innerHTML = '<div class="result-item" style="color:#64748b;cursor:default;">No results</div>';
    } else {
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'result-item';
        const badge = item.type === 'relationship' ? 'household' : item.type;
        div.innerHTML = `<span class="type-badge type-${item.type}">${badge}</span><span>${esc(item.label)}</span>${item.sub ? `<span style="color:#64748b;font-size:10px;margin-left:auto">${esc(item.sub)}</span>` : ''}`;
        div.addEventListener('click', () => selectClient(item));
        container.appendChild(div);
      });
    }
    container.style.display = 'block';
  }

  function hideResults() { document.getElementById('clientResults').style.display = 'none'; }

  function selectClient(item) {
    selectedClient = item;
    document.getElementById('clientSearch').style.display = 'none';
    document.getElementById('selectedClient').style.display = 'flex';
    document.getElementById('selectedName').textContent = item.label;
    hideResults();
  }

  function clearClient() {
    selectedClient = null;
    document.getElementById('clientSearch').style.display = 'block';
    document.getElementById('clientSearch').value = '';
    document.getElementById('selectedClient').style.display = 'none';
  }

  // ── Upload single job ──────────────────────────────────────────────────────
  async function uploadJob(i) {
    if (!selectedClient) {
      alert('Please select a client first.');
      document.getElementById('clientSearch').focus();
      return;
    }

    const job = jobs[i];
    if (!job || job.status === 'done' || job.status === 'uploading') return;

    const displayName = document.getElementById('job-name-' + i)?.value.trim() || job.jobTitle;
    const year        = document.getElementById('year').value;
    const category    = document.getElementById('category').value;
    const section     = document.getElementById('section').value;

    job.status = 'uploading';
    renderJobs();

    try {
      await window.electronAPI.upload({
        filePath:       job.filePath,
        ownerType:      selectedClient.type,
        ownerId:        selectedClient.id,
        year,
        folderSection:  section,
        folderCategory: category,
        displayName:    displayName.endsWith('.pdf') ? displayName : displayName + '.pdf',
      });

      job.status = 'done';
      window.electronAPI.uploadComplete(job.filePath);
    } catch (err) {
      job.status = 'error';
      job.errorMsg = err.message || 'Upload failed';
    }

    renderJobs();
    updateProgress();
  }

  function skipJob(i) {
    if (jobs[i]) {
      jobs[i].status = 'skipped';
      renderJobs();
      updateProgress();
    }
  }

  // ── Done / Cancel ──────────────────────────────────────────────────────────
  function doDone() {
    window.electronAPI.allDone();
  }

  function doCancel() {
    window.electronAPI.cancel();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>
</body>
</html>
