<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route to DarkLion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e2330;
    }
    .header-icon { font-size: 22px; }
    .header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .header p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .form-group { margin-bottom: 13px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 9px 11px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, select:focus {
      border-color: #4f8ef7;
    }
    select option { background: #1e2330; }

    /* Client search */
    .search-wrap { position: relative; }
    #clientResults {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-top: none;
      border-radius: 0 0 7px 7px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .result-item {
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
    }
    .result-item:hover { background: #252d3d; }
    .result-item .type-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .type-person   { background: #1e3a5f; color: #60a5fa; }
    .type-company  { background: #1a3a2a; color: #4ade80; }
    .type-relationship { background: #3a1a3a; color: #c084fc; }

    /* Selected client chip */
    #selectedClient {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: #1a2640;
      border: 1px solid #2d4a6e;
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 13px;
    }
    #selectedClient .name { color: #93c5fd; font-weight: 600; }
    #selectedClient .clear {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
    }
    #selectedClient .clear:hover { color: #e2e8f0; }

    /* Row layout for year + folder */
    .row { display: flex; gap: 10px; }
    .row .form-group { flex: 1; }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
      padding-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary {
      background: #4f8ef7;
      color: white;
    }
    .btn-primary:hover { background: #3b7de8; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; opacity: 0.6; }
    .btn-ghost {
      background: #1e2330;
      color: #94a3b8;
      border: 1px solid #2d3748;
    }
    .btn-ghost:hover { background: #252d3d; }

    /* Status / error */
    .status {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
      color: #64748b;
    }
    .status.error { color: #fca5a5; }
    .status.success { color: #4ade80; }

    /* Progress overlay */
    #uploading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      font-size: 14px;
      color: #94a3b8;
      z-index: 999;
    }
    #uploading.show { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2d3748;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🦁</div>
    <div>
      <h2>Route to DarkLion</h2>
      <p id="jobLabel">Select a client and folder below</p>
    </div>
  </div>

  <!-- Document name -->
  <div class="form-group">
    <label>Document Name</label>
    <input type="text" id="docName" placeholder="Document name" />
  </div>

  <!-- Client search -->
  <div class="form-group">
    <label>Client</label>
    <div class="search-wrap">
      <input type="text" id="clientSearch"
             placeholder="Type to search clients…"
             autocomplete="off"
             oninput="onSearchInput()" />
      <div id="clientResults"></div>
    </div>
    <div id="selectedClient">
      <span class="name" id="selectedName"></span>
      <button class="clear" onclick="clearClient()" title="Change client">✕</button>
    </div>
  </div>

  <!-- Year + Category row -->
  <div class="row">
    <div class="form-group">
      <label>Year</label>
      <select id="year"></select>
    </div>
    <div class="form-group">
      <label>Folder</label>
      <select id="category">
        <option value="tax">Tax</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>

  <!-- Section -->
  <div class="form-group">
    <label>Section</label>
    <select id="section">
      <option value="firm_uploaded">Delivered by Advisor</option>
      <option value="client_uploaded">Client Portal</option>
    </select>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-ghost" onclick="doCancel()">Cancel</button>
    <button class="btn btn-primary" id="uploadBtn" onclick="doUpload()" disabled>Upload to DarkLion</button>
  </div>

  <div class="status" id="status"></div>

  <!-- Upload in progress overlay -->
  <div id="uploading">
    <div class="spinner"></div>
    <span>Uploading to DarkLion…</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
