<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkLion — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 360px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: #4f8ef7;
    }
    .btn {
      width: 100%;
      padding: 11px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #3b7de8; }
    .btn:disabled { background: #374151; cursor: not-allowed; }
    .error {
      background: #2d1515;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🦁 DarkLion</h1>
      <p>Print Agent — Sign in to continue</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@yourfirm.com" autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="error" id="error"></div>
  </div>

  <script>
    // Focus email on load
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('email').focus();

      // Allow Enter key to submit
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
      });
    });

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('error');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        await window.electronAPI.login(email, password);
        window.electronAPI.loginSuccess();
      } catch (err) {
        showError(err.message || 'Login failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const errEl = document.getElementById('error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
  </script>
</body>
</html>
