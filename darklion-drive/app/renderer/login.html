<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self' data: file:" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkLion Drive — Connect</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1724;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 340px;
      padding: 40px 36px;
      background: #16213e;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #f0b900;
      letter-spacing: 0.5px;
    }

    .logo-subtitle {
      font-size: 13px;
      color: #8899aa;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8899aa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f1724;
      border: 1px solid #1e3a5f;
      border-radius: 7px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #f0b900;
    }

    input::placeholder {
      color: #445566;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #f0b900;
      color: #0f1724;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:hover:not(:disabled) {
      background: #ffc800;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: #5a4800;
      color: #998800;
      cursor: not-allowed;
    }

    .error {
      margin-top: 14px;
      padding: 10px 13px;
      background: rgba(220, 50, 50, 0.12);
      border: 1px solid rgba(220, 50, 50, 0.3);
      border-radius: 6px;
      font-size: 13px;
      color: #ff7070;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      color: #8899aa;
      text-align: center;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #334455;
      border-top-color: #f0b900;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .version {
      text-align: center;
      font-size: 11px;
      color: #334455;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="../icon.ico" width="64" height="64" style="border-radius:12px;margin-bottom:4px;" onerror="this.style.display='none'" />
      <div class="logo-title">DarkLion Drive</div>
      <div class="logo-subtitle">Secure document access for your firm</div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn" id="connectBtn">Connect Drive</button>

      <div class="error" id="errorBox"></div>
      <div class="status" id="statusBox"></div>
    </form>

    <div class="version" id="versionLabel">v1.0.0</div>
  </div>

  <script src="login.js"></script>
</body>
</html>
