<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engagement Letter — Sentinel Wealth &amp; Tax</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1923; --gold: #c9a84c; --gold-light: #e2c068;
      --text: #1a202c; --muted: #718096; --border: #e2e8f0;
      --card-bg: #ffffff; --page-bg: #f7fafc;
      --green: #38a169; --red: #e53e3e;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--page-bg); color: var(--text); }

    .site-header { background: var(--navy); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .site-logo { color: #fff; font-weight: 800; font-size: 1rem; }
    .site-logo span { color: var(--gold); }
    .secure-badge { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.65rem; border-radius: 999px; }

    .content { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem; }

    /* LOE Document styles */
    .loe-doc { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem; }

    /* Signature card */
    .sig-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; margin-bottom: 1.5rem; }
    .sig-card h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1.25rem; text-align: left; }
    .signer-block { border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .signer-label { font-size: 0.78rem; font-weight: 700; color: #462161; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; text-align: left; }
    .form-group label { text-align: left; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .form-control { width: 100%; border: 1.5px solid var(--border); border-radius: 7px; padding: 0.5rem 0.75rem; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.15s; font-family: inherit; }
    .form-control:focus { border-color: var(--gold); }

    /* Canvas */
    .canvas-wrap { position: relative; }
    .sig-canvas { border: 2px solid var(--border); border-radius: 7px; background: #fff; width: 100%; cursor: crosshair; touch-action: none; display: block; }
    .sig-canvas.active { border-color: var(--navy); }
    .canvas-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.8rem; color: #cbd5e0; pointer-events: none; }
    .clear-btn { margin-top: 0.4rem; font-size: 0.78rem; background: none; border: 1px solid var(--border); border-radius: 5px; padding: 0.25rem 0.6rem; cursor: pointer; color: var(--muted); }
    .clear-btn:hover { border-color: var(--navy); color: var(--navy); }

    /* Checkbox */
    .agree-row { display: flex; align-items: flex-start; gap: 0.6rem; margin-top: 0.75rem; }
    .agree-row input { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--gold); flex-shrink: 0; }
    .agree-row label { font-size: 0.82rem; color: var(--muted); line-height: 1.5; cursor: pointer; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.7rem 1.5rem; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; text-decoration: none; font-family: inherit; width: 100%; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-gold { background: #c9a84c; color: #0f1923; font-weight: 700; }
    .btn-gold:not(:disabled):hover { background: #e2c068; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }

    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); cursor: pointer; text-decoration: underline; }

    .success-state { text-align: center; padding: 3rem 1rem; }
    .loading-state { text-align: center; padding: 3rem 1rem; }
    .spin { display: inline-block; width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .content { padding: 1rem; }
      .loe-doc { padding: 1.25rem; }
    }
  </style>

    .loe-consent-options { margin: 16px 0; }

<body>

<header class="site-header">
  <img src="/sentinel-logo.png" alt="Sentinel Wealth &amp; Tax" style="height:36px;object-fit:contain;" onerror="this.style.display='none';document.getElementById('fallback-logo').style.display=''">
  <span id="fallback-logo" style="display:none;" class="site-logo">Sentinel <span>Wealth &amp; Tax</span></span>
  <div class="secure-badge">🔒 Secure Document</div>
</header>

<div id="root" class="loading-state">
  <div class="spin"></div>
  <p style="margin-top:1rem;color:var(--muted);">Loading engagement letter…</p>
</div>

<script>
const token = location.pathname.split('/').slice(-2)[0]; // /p/:token/sign
const API_BASE = '/api/proposals/public/' + token;

let engagement = null;
let canvases = [];
let canvasData = [null, null]; // base64 for each signer
let drawing = [false, false];

async function init() {
  try {
    const r = await fetch(API_BASE + '/engagement');
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      showError(err.error || 'Engagement not found. Please accept the proposal first.');
      return;
    }
    engagement = await r.json();

    // PDF-only mode: Puppeteer loads this page to render the LOE for printing
    if (new URLSearchParams(location.search).get('pdf') === '1') {
      renderPdfOnlyMode();
      return;
    }

    if (engagement.status === 'signed') {
      showSuccess();
      // If ?download=1, auto-trigger download after a short delay for the page to render
      if (new URLSearchParams(location.search).get('download') === '1') {
        setTimeout(() => downloadDoc(), 800);
      }
      return;
    }

    renderSignPage();
  } catch(e) {
    showError('Failed to load. Please try again.');
  }
}

function showError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="content">
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">😕</div>
        <div style="font-size:1.25rem;font-weight:800;margin-bottom:0.5rem;">Engagement Not Found</div>
        <p style="color:var(--muted);">${escHtml(msg)}</p>
        <a href="/p/${token}" style="display:inline-block;margin-top:1.5rem;font-size:0.85rem;color:var(--navy);">← Return to Proposal</a>
      </div>
    </div>`;
}

function showSuccess() {
  document.getElementById('root').innerHTML = `
    <div class="content">
      <div class="success-state">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <div style="font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;">Engagement Signed!</div>
        <p style="color:var(--muted);margin-bottom:1.5rem;">Your engagement letter has been fully executed. Your advisor will be in touch shortly.</p>
        <button class="btn btn-gold" style="max-width:280px;margin:0 auto;" onclick="downloadDoc()">⬇ Download / Print Copy</button>
        <p style="margin-top:0.75rem;font-size:0.8rem;color:var(--muted);">You may close this window.</p>
      </div>
    </div>`;
}

function downloadDoc() {
  // Server-side PDF: no print dialog, no browser headers, pixel-perfect
  window.location.href = API_BASE + '/pdf';
}

function renderPdfOnlyMode() {
  // Puppeteer calls this page with ?pdf=1 to get a clean, printable version
  const eng = engagement;
  const loeHtml = eng.engagement_type === 'wealth' ? generateWealthLOE(eng) : generateTaxLOE(eng);
  const auditHtml = generateSignatureAuditHtml(eng);

  // Apply minimal print-friendly styles + the existing LOE styles already in <head>
  document.getElementById('root').innerHTML = `
    <div style="max-width:860px;margin:0 auto;padding:1.5rem 1.25rem;">
      <div class="loe-content">${loeHtml}${auditHtml}</div>
    </div>`;

  // Hide nav header so PDF is clean
  const header = document.querySelector('header');
  if (header) header.style.display = 'none';
}

function renderSignPage() {
  const eng = engagement;
  const isDual = eng.require_dual_signature;
  const loeHtml = eng.engagement_type === 'wealth' ? generateWealthLOE(eng) : generateTaxLOE(eng);
  const sigTitle = isDual ? 'Sign This Agreement — Both Parties Required' : 'Sign This Agreement';

  document.getElementById('root').innerHTML = `
    <div class="content">
      <div class="loe-doc loe-content" id="loe-document">${loeHtml}</div>

      <div class="sig-card">
        <h2>✍️ ${escHtml(sigTitle)}</h2>
        ${renderSignerBlock(0, isDual ? 'First Signer' : 'Your Signature')}
        ${isDual ? renderSignerBlock(1, 'Second Signer') : ''}

        <button class="btn btn-gold" id="sign-btn" onclick="submitSignatures()" disabled>
          Sign &amp; Accept Agreement
        </button>
        <a class="back-link" onclick="resetAndGoBack()">← Choose a Different Package</a>
      </div>
    </div>`;

  initCanvases(isDual ? 2 : 1);
  updateSignBtn();
}

function renderSignerBlock(i, label) {
  return `<div class="signer-block" id="signer-block-${i}">
    <div class="signer-label">${escHtml(label)}</div>
    <div class="form-group">
      <label>Full Legal Name</label>
      <input type="text" class="form-control" id="sig-name-${i}" placeholder="Type your full legal name" oninput="updateSignBtn()">
    </div>
    <div class="form-group">
      <label>Signature</label>
      <div class="canvas-wrap">
        <canvas id="sig-canvas-${i}" class="sig-canvas" height="140"></canvas>
        <div class="canvas-label" id="canvas-hint-${i}">Sign here with mouse or finger</div>
      </div>
      <button class="clear-btn" onclick="clearCanvas(${i})">Clear</button>
    </div>
    <div class="agree-row">
      <input type="checkbox" id="agree-${i}" onchange="updateSignBtn()">
      <label for="agree-${i}">I agree this electronic signature is legally binding and serves as my signature on the above Engagement Letter.</label>
    </div>
  </div>`;
}

function initCanvases(count) {
  for (let i = 0; i < count; i++) {
    const canvas = document.getElementById('sig-canvas-' + i);
    if (!canvas) continue;
    canvases[i] = canvas;

    // Retina scaling
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = canvas.offsetWidth || 600;
    canvas.width = w * dpr;
    canvas.height = 140 * dpr;
    canvas.style.height = '140px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let isDrawing = false;
    let lastX = 0, lastY = 0;

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      if (e.touches) {
        return [e.touches[0].clientX - r.left, e.touches[0].clientY - r.top];
      }
      return [e.clientX - r.left, e.clientY - r.top];
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      [lastX, lastY] = getPos(e);
      canvas.classList.add('active');
      const hint = document.getElementById('canvas-hint-' + i);
      if (hint) hint.style.display = 'none';
    }
    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const [x, y] = getPos(e);
      const c = canvas.getContext('2d');
      c.beginPath();
      c.moveTo(lastX, lastY);
      c.lineTo(x, y);
      c.stroke();
      [lastX, lastY] = [x, y];
    }
    function endDraw(e) {
      if (!isDrawing) return;
      isDrawing = false;
      canvasData[i] = canvas.toDataURL('image/png');
      updateSignBtn();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
  }
}

function clearCanvas(i) {
  const canvas = canvases[i];
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  canvasData[i] = null;
  const hint = document.getElementById('canvas-hint-' + i);
  if (hint) hint.style.display = '';
  canvas.classList.remove('active');
  updateSignBtn();
}

function updateSignBtn() {
  const isDual = engagement && engagement.require_dual_signature;
  const count = isDual ? 2 : 1;
  let ready = true;
  for (let i = 0; i < count; i++) {
    const name = document.getElementById('sig-name-' + i)?.value.trim();
    const agreed = document.getElementById('agree-' + i)?.checked;
    const hasCanvas = !!canvasData[i];
    if (!name || !agreed || !hasCanvas) { ready = false; break; }
  }
  const btn = document.getElementById('sign-btn');
  if (btn) btn.disabled = !ready;
}

async function submitSignatures() {
  const btn = document.getElementById('sign-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const isDual = engagement.require_dual_signature;
  const count = isDual ? 2 : 1;

  try {
    let lastResult;
    for (let i = 0; i < count; i++) {
      const name = document.getElementById('sig-name-' + i).value.trim();
      const sig = canvasData[i];
      const r = await fetch(API_BASE + '/sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signerIndex: i, signed_by_name: name, signature_data: sig }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || 'Failed to submit signature');
      }
      lastResult = await r.json();
    }
    engagement.status = 'signed';
    showSuccess();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Sign & Accept Agreement';
    alert(e.message || 'Failed to submit. Please try again.');
  }
}

async function resetAndGoBack() {
  if (!confirm('This will cancel your selection and return to the proposal. Continue?')) return;
  try {
    await fetch(API_BASE + '/reset', { method: 'POST' });
  } catch(e) {}
  window.location = '/p/' + token;
}

// LOE GENERATION
// ============================================================

function loeCoverHeader(eng) {
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const clientName = eng.company_name || eng.client_name || '';
  const owners = eng.owners || '';
  const email = eng.contact_email || '';
  const addr1 = eng.address_line1 || '';
  const addr2 = eng.address_line2 || '';

function formatOrdinalDate(d) {
  const day = d.getDate();
  const suffix = [11,12,13].includes(day) ? 'th' :
    day % 10 === 1 ? 'st' : day % 10 === 2 ? 'nd' : day % 10 === 3 ? 'rd' : 'th';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${day}${suffix} day of ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function fmtDate(d) {
  if (!d) return new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function getTierName(eng) {
  const tiers = eng.tiers || [];
  if (eng.engagement_type === 'wealth') {

    if (indices.length) return indices.map(i => (tiers[i] && tiers[i].name) || '').filter(Boolean).join(' + ');

  const idx = eng.selected_tier_index;

  return tiers[0]?.name || 'Selected Package';
}

function getTierBullets(eng) {

}

function generateSignatureAuditHtml(eng) {
  const sigs = [];
  if (eng.signed_by_name) {
    sigs.push({
      label: 'Client Signature',
      name: eng.signed_by_name,
      at: eng.signed_at,
      ip: eng.signer_ip,
      data: eng.signature_data,
    });
  }
  if (eng.signed2_by_name) {
    sigs.push({
      label: 'Second Signer Signature',
      name: eng.signed2_by_name,
      at: eng.signed2_at,
      ip: eng.signer2_ip,
      data: eng.signature2_data,
    });
  }
  if (!sigs.length) return '';

  return sigs.map(s => `
    <div style="margin-top:28pt;border:2pt solid #462161;border-radius:6pt;padding:18pt 20pt;page-break-inside:avoid;">
      <div style="font-size:9pt;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#462161;margin-bottom:14pt;">
        Electronic Signature &mdash; ${escHtml(s.label)}
      </div>
      <div style="border-bottom:1.5pt solid #1a1a2e;padding-bottom:8pt;margin-bottom:12pt;min-height:55pt;">
        ${s.data ? `<img src="${s.data}" alt="Signature" style="max-height:55pt;max-width:240pt;object-fit:contain;">` : ''}
      </div>
      <table style="width:100%;font-size:9.5pt;border-collapse:collapse;">
        <tr>
          <td style="padding:2pt 0;width:90pt;font-weight:700;color:#1a1a2e;">Signed by:</td>
          <td style="padding:2pt 0;color:#374151;">${escHtml(s.name)}</td>
        </tr>
        <tr>
          <td style="padding:2pt 0;font-weight:700;color:#1a1a2e;">Date &amp; Time:</td>
          <td style="padding:2pt 0;color:#374151;">${s.at ? escHtml(fmtDate(s.at)) : '—'}</td>
        </tr>
        <tr>
          <td style="padding:2pt 0;font-weight:700;color:#1a1a2e;">IP Address:</td>
          <td style="padding:2pt 0;color:#374151;">${escHtml(s.ip || 'N/A')}</td>
        </tr>
      </table>
    </div>`).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
