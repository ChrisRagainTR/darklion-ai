    // ── UPLOAD ────────────────────────────────────────────
    const modal = document.getElementById('uploadModal');
    const fileInput = document.getElementById('fileInput');
    const fileDrop = document.getElementById('fileDrop');
    let _uploadCompanyId = null; // null = personal, number = company

    // Populate year selects
    const yearSel = document.getElementById('uploadYear');
    const moveYearSel = document.getElementById('moveYear');
    const curYear = new Date().getFullYear();
    for (let y = curYear; y >= 2018; y--) {
      [yearSel, moveYearSel].forEach(sel => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        sel.appendChild(opt);
      });
    }

    function openUploadModal(companyId) {
      _uploadCompanyId = companyId || null;
      const ctxLabel = document.getElementById('uploadContextLabel');
      if (_uploadCompanyId) {
        const co = (_companies || []).find(c => (c.id || c.company_id) === _uploadCompanyId);
        const coName = co ? (co.company_name || co.name) : `Company #${_uploadCompanyId}`;
        ctxLabel.textContent = `Uploading to: 🏢 ${coName}`;
        ctxLabel.style.display = 'block';
      } else {
        ctxLabel.style.display = 'none';
      }
      modal.classList.remove('hidden');
      document.getElementById('uploadErr').style.display = 'none';
      document.getElementById('uploadMsg').style.display = 'none';
      document.getElementById('selectedFileName').textContent = '';
      document.getElementById('doUploadBtn').disabled = true;
      _selectedFile = null;
    }

    // Upload triggered from inline section headers (⬆ Upload on "Uploaded by You")
    document.getElementById('closeUploadBtn').addEventListener('click', () => modal.classList.add('hidden'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

    fileDrop.addEventListener('click', () => fileInput.click());
    fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(f) {
      _selectedFile = f;
      document.getElementById('selectedFileName').textContent = f.name;
      document.getElementById('doUploadBtn').disabled = false;
    }
    window._portalSetFile = setFile;

    // Handle drag-drop pre-load from page-wide drop handler
    modal.addEventListener('preload-file', function(e) {
      if (e.detail && e.detail.file) setFile(e.detail.file);
    });

    document.getElementById('doUploadBtn').addEventListener('click', async () => {
      if (!_selectedFile) return;
      const btn = document.getElementById('doUploadBtn');
      const errEl = document.getElementById('uploadErr');
      const msgEl = document.getElementById('uploadMsg');

      btn.disabled = true;
      btn.textContent = 'Uploading…';
      errEl.style.display = 'none';
      msgEl.style.display = 'none';

      try {
        const fd = new FormData();
        fd.append('file', _selectedFile);
        fd.append('year', yearSel.value);
        fd.append('folder_category', document.getElementById('uploadCategory').value);
        if (_uploadCompanyId) fd.append('company_id', _uploadCompanyId);

        const res = await fetch('/portal/upload', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: fd,
        });

        if (res.status === 401) {
          localStorage.removeItem('portalToken');
          window.location.href = '/portal-login';
          return;
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');

        // Check for duplicate name
        const yr = yearSel.value;
        const cat = document.getElementById('uploadCategory').value;
        const isDuplicate = _docs.some(d => d.display_name === _selectedFile.name && d.year === yr && (d.folder_category||'other') === cat);
        msgEl.textContent = isDuplicate
          ? `✓ Uploaded (a file with this name already exists in ${yr} / ${cat} — both are saved)`
          : '✓ File uploaded successfully!';
        msgEl.style.display = 'block';

        // Close modal immediately and refresh whatever tab is currently visible
        modal.classList.add('hidden');
        _docs = await api('/portal/documents').catch(() => _docs);

        if (_uploadCompanyId) {
          // Bust cache and force re-render the company tab that's open
          const coContainer = document.getElementById(`co-docs-${_uploadCompanyId}`);
          if (coContainer) {
            delete coContainer.dataset.loaded;
            loadCompanyDocs(_uploadCompanyId);
          }
          // Also bust all other company tab caches
          document.querySelectorAll('[id^="co-docs-"]').forEach(el => delete el.dataset.loaded);
        } else {
          // Personal tab
          renderDocuments();
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Upload';
      }
    });

    // ── MOVE MODAL ────────────────────────────────────────
    const moveModal = document.getElementById('moveModal');
    let _moveDocId = null;

    function openMoveModal(docId, docName, currentYear, currentCat) {
      _moveDocId = docId;
      document.getElementById('moveDocName').textContent = `"${docName}"`;
      moveYearSel.value = currentYear || String(curYear);
      document.getElementById('moveCategory').value = currentCat || 'other';
      document.getElementById('moveErr').style.display = 'none';
      moveModal.classList.remove('hidden');
    }

    document.getElementById('closeMoveBtn').addEventListener('click', () => moveModal.classList.add('hidden'));
    moveModal.addEventListener('click', e => { if (e.target === moveModal) moveModal.classList.add('hidden'); });

    document.getElementById('doMoveBtn').addEventListener('click', async () => {
      if (!_moveDocId) return;
      const btn = document.getElementById('doMoveBtn');
      const errEl = document.getElementById('moveErr');
      btn.disabled = true;
      btn.textContent = 'Moving…';
      errEl.style.display = 'none';

      try {
        const res = await fetch(`/portal/documents/${_moveDocId}`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            year: moveYearSel.value,
            folder_category: document.getElementById('moveCategory').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Move failed');

        _docs = await api('/portal/documents').catch(() => _docs);
        moveModal.classList.add('hidden');

        // Refresh the currently visible tab
        const activePanel = document.querySelector('.tab-panel.active');
        const coMatch = activePanel && activePanel.id.match(/^tab-co-(\d+)$/);
        if (coMatch) {
          const coId = parseInt(coMatch[1]);
          const coContainer = document.getElementById(`co-docs-${coId}`);
          if (coContainer) { delete coContainer.dataset.loaded; loadCompanyDocs(coId); }
        } else {
          renderDocuments();
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Move';
      }
    });

    // ── Chat / Messages (per-staff DMs) ──────────────────
    let _chatLoaded = false;
    let _chatAllMessages = [];
    let _chatAttachFiles = [];
    let _staffList = [];      // all firm staff
    let _selectedStaffId = null;
    let _selectedStaffThreadId = null;

    async function initChat() {
      window._portalReloadMessages = loadMessages;
      await loadStaffList();
    }

    async function loadStaffList() {
      const token = localStorage.getItem('portalToken');
      try {
        // GET /portal/messages returns all staff with thread info
        const res = await fetch('/portal/messages', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) throw new Error(`Staff list error ${res.status}`);
        _staffList = await res.json();
        if (!Array.isArray(_staffList)) _staffList = [];
        // Sort: unread first, then by most recent message, then alphabetical
        _staffList.sort((a, b) => {
          const aUnread = parseInt(a.unreadCount || 0);
          const bUnread = parseInt(b.unreadCount || 0);
          if (bUnread !== aUnread) return bUnread - aUnread;
          const aTime = a.lastMessageAt ? new Date(a.lastMessageAt).getTime() : 0;
          const bTime = b.lastMessageAt ? new Date(b.lastMessageAt).getTime() : 0;
          if (bTime !== aTime) return bTime - aTime;
          return (a.name || '').localeCompare(b.name || '');
        });
        renderStaffList();
        // Auto-select: unread first, then most recent thread, then first in list
        if (_staffList.length > 0 && _selectedStaffId === null) {
          selectStaffMember(_staffList[0]);
        }
        // Update tab badge
        const totalUnread = _staffList.reduce((acc, s) => acc + (s.unreadCount || 0), 0);
        updateChatBadge(totalUnread);
        // Show/update unread banner above staff list
        let banner = document.getElementById('msg-unread-banner');
        if (totalUnread > 0) {
          if (!banner) {
            banner = document.createElement('div');
            banner.id = 'msg-unread-banner';
            banner.style.cssText = 'background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.35);border-radius:8px;padding:0.6rem 0.9rem;margin-bottom:0.75rem;font-size:0.84rem;font-weight:600;color:#e74c3c;display:flex;align-items:center;gap:0.5rem;';
            const contacts = document.getElementById('chatContacts');
            if (contacts && contacts.parentNode) contacts.parentNode.insertBefore(banner, contacts);
          }
          banner.innerHTML = `<span style="font-size:1rem;">🔴</span> You have <strong>${totalUnread}</strong> new message${totalUnread > 1 ? 's' : ''}`;
        } else if (banner) {
          banner.remove();
        }
      } catch(e) {
        console.error('[portal] loadStaffList error:', e);
        const el = document.getElementById('chatContactsEmpty');
        if (el) { el.textContent = 'Could not load team.'; el.style.display = ''; }
      }
    }

    function renderStaffList() {
      const el = document.getElementById('chatContacts');
      if (!el) return;
      const empty = document.getElementById('chatContactsEmpty');
      if (!_staffList.length) {
        if (empty) { empty.textContent = 'No team members found.'; empty.style.display = ''; }
        return;
      }
      if (empty) empty.style.display = 'none';

      // Sort: unread first, then by most recent message, then alphabetical
      const sorted = [..._staffList].sort((a, b) => {
        const au = parseInt(a.unreadCount || 0), bu = parseInt(b.unreadCount || 0);
        if (au !== bu) return bu - au; // unread first
        const at = a.lastMessageAt ? new Date(a.lastMessageAt).getTime() : 0;
        const bt = b.lastMessageAt ? new Date(b.lastMessageAt).getTime() : 0;
        if (at !== bt) return bt - at; // most recent first
        return (a.name || '').localeCompare(b.name || '');
      });

      el.innerHTML = sorted.map(s => {
        const initials = (s.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const unread = parseInt(s.unreadCount || 0);
        const isActive = _selectedStaffId === s.id;
        const preview = s.lastPreview || '';
        const avatarHtml = s.avatar_url
          ? `<img src="${s.avatar_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;" alt="${chatEsc(initials)}" onerror="this.outerHTML='<div class=\\'chat-contact-avatar\\'>${initials}</div>';">`
          : `<div class="chat-contact-avatar${unread > 0 ? ' has-unread' : ''}">${initials}</div>`;
        return `<div class="chat-contact-row${isActive ? ' active' : ''}${unread > 0 ? ' has-unread' : ''}" data-staff-id="${s.id}">
          <div style="position:relative;flex-shrink:0;">
            ${avatarHtml}
            ${unread > 0 ? `<div style="position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;border:2px solid var(--portal-bg,#0f1117);">${unread}</div>` : ''}
          </div>
          <div class="chat-contact-info">
            <div class="chat-contact-name" style="${unread > 0 ? 'color:#fff;font-weight:700;' : ''}">${chatEsc(s.name)}${s.credentials ? `<span style="font-size:0.72rem;font-weight:400;color:var(--gold,#c9a84c);margin-left:0.35rem;">${chatEsc(s.credentials)}</span>` : ''}</div>
            <div class="chat-contact-preview" style="${unread > 0 ? 'color:rgba(255,255,255,0.8);' : ''}">${unread > 0 ? `<span style="color:#e74c3c;font-weight:700;">● </span>` : ''}${chatEsc(preview) || 'No messages yet'}</div>
          </div>
          <div class="chat-contact-meta">
            ${s.lastMessageAt ? `<div class="chat-contact-time">${new Date(s.lastMessageAt).toLocaleDateString()}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      el.querySelectorAll('.chat-contact-row').forEach(row => {
        row.addEventListener('click', function() {
          const staffId = parseInt(row.dataset.staffId);
          const staff = _staffList.find(s => s.id === staffId);
          if (staff) selectStaffMember(staff);
        });
      });
    }

    function selectStaffMember(staff) {
      _selectedStaffId = staff.id;
      _selectedStaffThreadId = staff.threadId || null;

      document.querySelectorAll('.chat-contact-row').forEach(r => {
        r.classList.toggle('active', parseInt(r.dataset.staffId) === staff.id);
      });

      const hdr = document.getElementById('chatMainHeader');
      if (hdr) hdr.style.display = '';

      const hdrAvatar = document.getElementById('chatHdrAvatar');
      if (hdrAvatar) {
        const initials = (staff.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        if (staff.avatar_url) {
          hdrAvatar.innerHTML = `<img src="${staff.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.textContent='${initials}';">`;
        } else {
          hdrAvatar.textContent = initials;
        }
      }

      const hdrName = document.getElementById('chatHdrName');
      if (hdrName) hdrName.textContent = staff.name || 'Advisor';
      const hdrCreds = document.getElementById('chatHdrCreds');
      if (hdrCreds) hdrCreds.textContent = staff.credentials || '';

      // Show input bar
      const inputBar = document.getElementById('chatInputBar');
      if (inputBar) inputBar.style.display = '';

      _chatAllMessages = [];
      _renderedMsgIds = new Set();
      const container = document.getElementById('chatMessages');
      if (container) container.innerHTML = '<div class="chat-empty" id="chatEmpty">No messages yet. Send a message below to get started.</div>';

      loadMessages();
    }

    let _loadingMessages = false;
    async function loadMessages() {
      if (!_selectedStaffId) return;
      if (_loadingMessages) return;
      _loadingMessages = true;
      const token = localStorage.getItem('portalToken');
      if (!token) { _loadingMessages = false; return; }
      try {
        const res = await fetch(`/portal/messages/thread/${_selectedStaffId}`, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) throw new Error(`Messages API error ${res.status}`);
        const data = await res.json();
        _selectedStaffThreadId = data.threadId || null;
        const freshMessages = (data.messages || []);

        const freshKey = `${freshMessages.length}:${freshMessages[freshMessages.length-1]?.id}`;
        const currentKey = `${_chatAllMessages.length}:${_chatAllMessages[_chatAllMessages.length-1]?.id}`;
        if (freshKey !== currentKey) {
          _chatAllMessages = freshMessages;
          renderChatMessages();
        }

        // Also refresh staff list for unread counts
        loadStaffList();
      } catch (e) {
        console.error('[portal messages] load error:', e);
        const el = document.getElementById('chatEmpty');
        if (el) { el.style.display = 'block'; el.textContent = 'No messages yet. Send a message to start the conversation!'; }
      } finally {
        _loadingMessages = false;
      }
    }

    function chatFormatBytes(b) {
      if (!b) return '0 B';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }

    function handleChatAttach(fileList) {
      for (const f of Array.from(fileList)) {
        if (_chatAttachFiles.length >= 8) { alert('Maximum 8 files per message'); break; }
        _chatAttachFiles.push(f);
      }
      document.getElementById('chatAttachInput').value = '';
      renderChatAttachChips();
    }
    window.handleChatAttach = handleChatAttach;

    function removeChatAttachFile(idx) {
      _chatAttachFiles.splice(idx, 1);
      renderChatAttachChips();
    }
    window.removeChatAttachFile = removeChatAttachFile;

    async function downloadPortalAttachment(documentId) {
      const token = localStorage.getItem('portalToken');
      try {
        const res = await fetch(`/portal/attachments/${documentId}/download`, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const data = await res.json();
        if (data.url) window.open(data.url, '_blank');
        else alert('Download failed');
      } catch(e) { alert('Failed to download attachment'); }
    }
    window.downloadPortalAttachment = downloadPortalAttachment;

    function renderChatAttachChips() {
      const el = document.getElementById('chatAttachChips');
      if (!el) return;
      el.innerHTML = _chatAttachFiles.map((f, i) =>
        `<span class="chat-attach-chip">📎 ${chatEsc(f.name)} <button onclick="removeChatAttachFile(${i})">×</button></span>`
      ).join('');
    }

    let _renderedMsgIds = new Set();

    function buildMsgHtml(m) {
      const isClient = m.sender_type === 'client';
      const side = isClient ? 'client' : 'staff';
      const time = new Date(m.created_at).toLocaleString();
      const senderLabel = !isClient && m.sender_name ? `<span style="font-size:0.65rem;color:var(--muted);display:block;margin-bottom:0.15rem;">${chatEsc(m.sender_name)}</span>` : '';
      const attachmentsHtml = (m.attachments || []).length > 0
        ? `<div class="msg-attachments">${(m.attachments).map(a => {
            const size = a.sizeBytes ? ' <span class="att-size">(' + chatFormatBytes(a.sizeBytes) + ')</span>' : '';
            return `<a class="attachment-chip" href="#" onclick="downloadPortalAttachment(${a.documentId});return false;">📎 ${chatEsc(a.displayName)}${size}</a>`;
          }).join('')}</div>`
        : '';
      return `<div class="chat-bubble-wrap ${side}" data-msg-id="${m.id}">
        ${senderLabel}
        <div class="chat-bubble ${side}">${m.body ? chatEsc(m.body) : ''}${attachmentsHtml}</div>
        <div class="chat-bubble-meta">${time}</div>
      </div>`;
    }

    function renderChatMessages() {
      const container = document.getElementById('chatMessages');
      const empty = container.querySelector('.chat-empty');

      if (!_chatAllMessages.length) {
        if (!_renderedMsgIds.size) {
          container.innerHTML = '<div class="chat-empty">No messages yet. Send a message to start the conversation!</div>';
        }
        return;
      }

      if (empty) empty.remove();

      let appended = false;
      for (const m of _chatAllMessages) {
        if (!_renderedMsgIds.has(m.id)) {
          container.insertAdjacentHTML('beforeend', buildMsgHtml(m));
          _renderedMsgIds.add(m.id);
          appended = true;
        }
      }

      if (appended) container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessage() {
      if (!_selectedStaffId) return;
      const input = document.getElementById('chatInput');
      const body = input.value.trim();
      if (!body && _chatAttachFiles.length === 0) return;
      const token = localStorage.getItem('portalToken');
      try {
        input.disabled = true;
        const fd = new FormData();
        fd.append('body', body);
        fd.append('staff_user_id', String(_selectedStaffId));
        _chatAttachFiles.forEach(f => fd.append('files', f));
        const res = await fetch('/portal/messages/send', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: fd,
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || `Server error ${res.status}`);
        }
        const result = await res.json();
        _selectedStaffThreadId = result.threadId || _selectedStaffThreadId;
        input.value = '';
        _chatAttachFiles = [];
        renderChatAttachChips();
        await loadMessages();
      } catch (e) {
        alert('Failed to send message: ' + e.message);
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    function updateChatBadge(count) {
      const btn = document.querySelector('.tab-btn[data-tab="messages"]');
      if (!btn) return;
      const existing = btn.querySelector('.unread-badge-tab');
      if (existing) existing.remove();
      if (count > 0) {
        btn.insertAdjacentHTML('beforeend', `<span class="unread-badge-tab">${count}</span>`);
      }
    }

    function chatEsc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    // ── Wire UI events first (independent of init, always safe) ─────
    (function wireEvents() {
      // ── Page-wide drag-and-drop when Documents tab is active ──
      let _dragCounter = 0;
      const _dragOverlay = document.createElement('div');
      _dragOverlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:rgba(201,168,76,0.08);border:3px dashed var(--gold);pointer-events:none;align-items:center;justify-content:center;font-size:1.5rem;color:var(--gold);font-weight:700;';
      _dragOverlay.textContent = '📄 Drop to upload document';
      document.body.appendChild(_dragOverlay);

      function isDocTabActive() {
        return document.querySelector('.tab-btn[data-tab="documents"]')?.classList.contains('active');
      }

      document.addEventListener('dragenter', function(e) {
        if (!isDocTabActive()) return;
        _dragCounter++;
        _dragOverlay.style.display = 'flex';
      });
      document.addEventListener('dragleave', function(e) {
        if (!isDocTabActive()) return;
        _dragCounter--;
        if (_dragCounter <= 0) { _dragCounter = 0; _dragOverlay.style.display = 'none'; }
      });
      document.addEventListener('dragover', function(e) {
        if (!isDocTabActive()) return;
        e.preventDefault();
      });
      document.addEventListener('drop', function(e) {
        if (!isDocTabActive()) return;
        e.preventDefault();
        _dragCounter = 0;
        _dragOverlay.style.display = 'none';
        const file = e.dataTransfer?.files?.[0];
        if (!file) return;
        // Open upload modal and pre-load the dropped file
        const modal = document.getElementById('uploadModal');
        if (modal) {
          modal.classList.remove('hidden');
          document.getElementById('uploadErr').style.display = 'none';
          document.getElementById('uploadMsg').style.display = 'none';
          if (window._portalSetFile) window._portalSetFile(file);
          else modal.dispatchEvent(new CustomEvent('preload-file', { detail: { file } }));
        }
      });

      // ── Chat input wiring ──
      const chatInput = document.getElementById('chatInput');
      const chatSendBtn = document.getElementById('chatSendBtn');

      if (chatInput) {
        chatInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendChatMessage();
          }
        });
      }
      if (chatSendBtn) {
        chatSendBtn.addEventListener('click', function() {
          sendChatMessage();
        });
      }
    })();

    // ── KICK OFF ─────────────────────────────────────────
    init().catch(function(e) {
      console.error('[portal] init error:', e);
    });

  })();
  </script>

  <!-- ── TAX DELIVERY REVIEW & SIGN FLOW ─────────────────────────────────── -->
  <script>
  (function() {
    'use strict';

    const portalToken = () => localStorage.getItem('portalToken') || '';

    async function loadTaxDeliveriesInit() {

        const pending = _taxDeliveries.filter(d => !d.signed_at);
        const tab = document.getElementById('review-sign-tab');
        const badge = document.getElementById('review-sign-badge');

          if (tab) tab.style.display = 'none';
          if (badge) badge.style.display = 'none';
        }
      } catch(e) { console.error('[tax-delivery] loadTaxDeliveriesInit error:', e); }
    }
    window.loadTaxDeliveriesInit = loadTaxDeliveriesInit;

    async function loadTaxDeliveries() {
      const list = document.getElementById('review-sign-list');
      const loading = document.getElementById('review-sign-loading');
      if (!list) return;
      loading.style.display = '';
      list.style.display = 'none';

      try {
        const res = await fetch('/portal/tax-deliveries', { headers: authHeader() });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          loading.innerHTML = `<p style="color:var(--red,#f56565);text-align:center;">Error ${res.status}: ${errBody.error || 'Failed to load'}</p>`;
          return;
        }
        _taxDeliveries = await res.json();
      } catch(e) {
        loading.innerHTML = `<p style="color:var(--red,#f56565);text-align:center;">Network error: ${e.message}</p>`;
        return;
      }

      loading.style.display = 'none';
      list.style.display = 'block';

      // Only show unsigned/active deliveries — filter out already signed ones
      const activeDeliveries = _taxDeliveries.filter(d => !d.signed_at);

        list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem;">No documents require your signature at this time.</p>';

      list.innerHTML = _taxDeliveries.map(d => {
        const myStatus = d.signed_at ? 'complete' : d.approved_at ? 'awaiting-sign' : d.needs_changes_at ? 'needs-changes' : 'needs-review';
        const badgeMap = {
          'needs-review': { label: 'Needs Review', color: '#c9a84c' },
          'approved': { label: 'Approved', color: '#4caf50' },
          'awaiting-sign': { label: 'Awaiting Signature', color: '#2196f3' },

        const actionBtn = myStatus === 'complete'

          : `<button class="btn-submit" onclick="openTaxDeliveryFlow(${d.id})" style="padding:0.55rem 1.25rem;font-size:0.9rem;">✍️ Review &amp; Sign →</button>`;
        return `
          <div class="card" style="margin-bottom:1rem;padding:1.25rem 1.5rem;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
              <div>
                <div style="font-weight:700;font-size:1rem;margin-bottom:0.25rem;">${esc(entityLabel)} — ${esc(d.tax_year)} Tax Return</div>
                <div style="color:var(--muted);font-size:0.88rem;margin-bottom:0.5rem;">${esc(d.title || '')}</div>
                <span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.78rem;font-weight:700;background:${badge.color}22;color:${badge.color};">${badge.label}</span>

            </div>

    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function openTaxDeliveryFlow(deliveryId) {

          <div style="font-weight:700;margin-bottom:0.5rem;font-size:0.88rem;color:var(--muted);">TAX SUMMARY</div>`;

        }

        }

        }

      }
      const meRef2 = window._portalMe || {};
      const returnLabel = d.company_name || (`${meRef2.firstName || ''} ${meRef2.lastName || ''}`.trim()) || 'Your';
      document.getElementById('tdo-content').innerHTML = `
        <div style="margin-bottom:1.5rem;">
          <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:0.4rem;">${esc(returnLabel)} — ${esc(d.tax_year)} Tax Return</h2>

        </div>
        ${summaryHtml}
        ${d.intro_note ? `<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:0.95rem;line-height:1.7;color:var(--text,#e8edf2);">${esc(d.intro_note)}</div>` : ''}
        <div style="margin-top:1.5rem;">
          <p style="font-size:0.88rem;color:var(--muted,#8fa3b8);margin-bottom:1rem;">Please review your complete tax return carefully. You'll be able to approve or request changes before signing.</p>
          <button class="btn-submit" onclick="renderTDStep2()" style="font-size:1rem;padding:0.75rem 2rem;">View Your Tax Summary →</button>
        </div>
      `;
    }
    window.renderTDStep1 = renderTDStep1;

    // ── Step 2: Tax Summary (AI-generated) ──────────────────────────────────
    async function renderTDStep2() {
      document.getElementById('tdo-step-label').textContent = 'Step 2 of 5 — Your Tax Summary';
      const d = _currentDelivery;
      const content = document.getElementById('tdo-content');
      content.innerHTML = `
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:0.5rem;">Your ${esc(d.tax_year)} Tax Summary</h2>

        <div style="margin-top:1.5rem;">

        </div>`;

    // Exact replica of staff modal renderTaxSummary — same classes, same sections, same order
    function portalRenderTaxSummary(d) {
      function fmt(n) { if (n === null || n === undefined) return '—'; var abs = Math.abs(n); var f = '$' + Math.round(abs).toLocaleString(); return n < 0 ? '(' + f + ')' : f; }
      function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      var refundColor = d.is_refund ? '#3ecf8e' : '#f56565';
      var refundLabel = d.is_refund ? 'Refund' : 'Balance Due';

      var html = '<div style="font-size:0.82rem;color:#8fa3b8;margin-bottom:1rem;">' + esc((d.client&&d.client.names)||'') + (d.client&&d.client.filing_status ? ' · ' + esc(d.client.filing_status) : '') + '</div>';

      // Stat cards
      html += '<div class="tsm-stat-row">';
      html += '<div class="tsm-stat"><div class="tsm-stat-val">' + fmt(d.total_income) + '</div><div class="tsm-stat-label">Total Income</div></div>';
      html += '<div class="tsm-stat"><div class="tsm-stat-val">' + fmt(d.taxable_income) + '</div><div class="tsm-stat-label">Taxable Income</div></div>';
      html += '<div class="tsm-stat"><div class="tsm-stat-val">' + fmt(d.total_tax) + '</div><div class="tsm-stat-label">Total Federal Tax</div></div>';
      html += '<div class="tsm-stat"><div class="tsm-stat-val" style="color:' + refundColor + '">' + fmt(d.refund_or_owed_amount) + '</div><div class="tsm-stat-label">' + refundLabel + '</div></div>';
      html += '</div>';

      // Rate pills
      html += '<div style="margin-top:1rem;"><div class="tsm-section-title">Tax Rates</div><div class="tsm-rate-row">';
      html += '<div class="tsm-rate-pill">Effective Rate: <strong>' + (d.effective_rate||0) + '%</strong></div>';
      html += '<div class="tsm-rate-pill">Marginal Bracket: <strong>' + (d.marginal_bracket||0) + '%</strong></div>';
      if (d.key_stats&&d.key_stats.capital_loss_carryover) html += '<div class="tsm-rate-pill">Cap Loss C/O: <strong>' + fmt(d.key_stats.capital_loss_carryover) + '</strong></div>';
      if (d.social_security&&d.social_security.percent_taxable) html += '<div class="tsm-rate-pill">SS Taxable: <strong>' + d.social_security.percent_taxable + '%</strong></div>';
      html += '</div></div>';

      // Income breakdown
      if (d.income_sources&&d.income_sources.length) {
        html += '<div style="margin-top:1rem;"><div class="tsm-section-title">📊 Income Breakdown</div><table class="tsm-table"><thead><tr><th>Source</th><th style="text-align:right">Amount</th></tr></thead><tbody>';
        d.income_sources.forEach(function(s) { html += '<tr><td>' + esc(s.source) + (s.note?'<span style="color:#8fa3b8;font-size:0.75em"> (' + esc(s.note) + ')</span>':'') + '</td><td>' + fmt(s.amount) + '</td></tr>'; });
        html += '<tr><td><strong>Total Income (AGI)</strong></td><td><strong>' + fmt(d.adjusted_gross_income||d.total_income) + '</strong></td></tr></tbody></table></div>';
      }

      // Tax computation — 2 col
      html += '<div style="margin-top:1rem;"><div class="tsm-section-title">🧾 Tax Computation</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">';
      html += '<table class="tsm-table"><tbody>';
      html += '<tr><td>Adjusted Gross Income</td><td>' + fmt(d.adjusted_gross_income||d.total_income) + '</td></tr>';
      (d.deductions||[]).forEach(function(ded) { html += '<tr><td style="color:#3ecf8e">' + esc(ded.name) + '</td><td style="color:#3ecf8e">(' + fmt(ded.amount) + ')</td></tr>'; });
      html += '<tr style="border-top:1px solid rgba(255,255,255,0.08)"><td><strong>Taxable Income</strong></td><td><strong>' + fmt(d.taxable_income) + '</strong></td></tr>';
      html += '</tbody></table>';
      html += '<table class="tsm-table"><tbody>';
      html += '<tr><td>Federal Income Tax</td><td>' + fmt(d.tax_before_credits) + '</td></tr>';
      if (d.credits>0) html += '<tr><td style="color:#3ecf8e">Less: Credits</td><td style="color:#3ecf8e">(' + fmt(d.credits) + ')</td></tr>';
      html += '<tr><td><strong>Total Tax</strong></td><td><strong>' + fmt(d.total_tax) + '</strong></td></tr>';
      html += '<tr><td style="color:#8fa3b8">Less: Payments &amp; Withholding</td><td style="color:#8fa3b8">(' + fmt(d.total_payments) + ')</td></tr>';
      html += '<tr style="border-top:1px solid rgba(255,255,255,0.08)"><td style="color:' + refundColor + '"><strong>' + refundLabel + '</strong></td><td style="color:' + refundColor + '"><strong>' + fmt(d.refund_or_owed_amount) + '</strong></td></tr>';
      html += '</tbody></table></div></div>';

      // Savings highlights

        html += '</div></div>';

      // Strategies

        d.strategies.forEach(function(s) {
          html += '<div class="tsm-strategy-card"><div class="tsm-strategy-title">' + esc(s.title) + (s.category?'<span class="tsm-strategy-badge ' + s.category + '">' + s.category + '</span>':'') + '</div>';

          html += '<div class="tsm-strategy-desc">' + esc(s.description) + '</div></div>';
        });
        html += '</div></div>';
      }

      // Estimated payments
      if (d.estimated_payments_required&&(d.federal_estimated_payments&&d.federal_estimated_payments.length||d.state_estimated_payments&&d.state_estimated_payments.length)) {
        html += '<div style="margin-top:1rem;"><div class="tsm-section-title">📅 Estimated Tax Payments</div>';
        if (d.federal_estimated_payments&&d.federal_estimated_payments.length) {
          html += '<div style="font-size:0.78rem;font-weight:700;margin-bottom:0.4rem;">Federal</div><table class="tsm-est-table"><thead><tr><th>Quarter</th><th>Due Date</th><th>Amount</th><th>Method</th></tr></thead><tbody>';
          d.federal_estimated_payments.forEach(function(p) { html += '<tr><td>' + esc(p.quarter) + '</td><td>' + esc(p.due_date) + '</td><td style="font-weight:600;color:#c9a84c">' + esc(p.amount) + '</td><td style="color:#8fa3b8">' + esc(p.method||'') + '</td></tr>'; });
          html += '</tbody></table>';
        }
        if (d.state_estimated_payments&&d.state_estimated_payments.length) {
          html += '<div style="font-size:0.78rem;font-weight:700;margin:0.75rem 0 0.4rem;">State</div><table class="tsm-est-table"><thead><tr><th>State</th><th>Quarter</th><th>Due Date</th><th>Amount</th></tr></thead><tbody>';
          d.state_estimated_payments.forEach(function(p) { html += '<tr><td>' + esc(p.state) + '</td><td>' + esc(p.quarter) + '</td><td>' + esc(p.due_date) + '</td><td style="font-weight:600;color:#c9a84c">' + esc(p.amount) + '</td></tr>'; });
          html += '</tbody></table>';
        }
        html += '</div>';
      }

      // YOY comparison
      if (d.prior_year_comparison) {
        var yoy = d.prior_year_comparison;
        var nonZero = (yoy.items||[]).filter(function(item) { return item.prior_year!==0||item.current_year!==0; });
        var totalRows = ['Total Income','Total Adjusted Gross Income','Taxable Income','Total Tax','Effective tax rate (%)'];
        html += '<div style="margin-top:1rem;"><div class="tsm-section-title">📊 Year-Over-Year (' + esc(yoy.prior_tax_year) + ' → ' + esc(yoy.current_tax_year) + ')</div>';
        if (yoy.highlights&&yoy.highlights.length) {
          html += '<div style="margin-bottom:0.75rem;">';
          yoy.highlights.forEach(function(h) {
            var arrow=h.direction==='increase'?'▲':h.direction==='decrease'?'▼':h.direction==='new'?'✦':'✕';
            var color=h.direction==='increase'?'#f56565':h.direction==='decrease'?'#3ecf8e':'#c9a84c';
            html += '<span class="tsm-highlight-pill"><span style="color:' + color + ';font-weight:700">' + arrow + '</span> <span style="font-weight:600">' + esc(h.title) + '</span></span>';
          });
          html += '</div>';
        }
        html += '<table class="tsm-yoy-table"><thead><tr><th>Line Item</th><th>' + esc(yoy.prior_tax_year) + '</th><th>' + esc(yoy.current_tax_year) + '</th><th>Change</th></tr></thead><tbody>';
        nonZero.forEach(function(item) {
          var isTotal=totalRows.indexOf(item.label)>=0;
          var isRate=item.label.indexOf('rate')>=0||item.label.indexOf('Rate')>=0;
          var fmtV=function(v){if(v===null||v===undefined)return'—';return isRate?v+'%':fmt(v);};
          var diffColor=item.difference>0?'#f56565':item.difference<0?'#3ecf8e':'#8fa3b8';
          var diffStr=item.difference!==null?(item.difference>0?'+':'')+(isRate?parseFloat(item.difference).toFixed(2)+'%':fmt(item.difference)):'—';
          html += '<tr'+(isTotal?' class="total-row"':'')+'><td>'+esc(item.label)+'</td><td>'+fmtV(item.prior_year)+'</td><td>'+fmtV(item.current_year)+'</td><td style="color:'+diffColor+'">'+diffStr+'</td></tr>';
        });
        html += '</tbody></table></div>';
      }

      // Carryovers
      if (d.carryovers&&d.carryovers.length) {
        html += '<div style="margin-top:1rem;"><div class="tsm-section-title">Carryovers</div><div class="tsm-rate-row">';
        d.carryovers.forEach(function(c) { html += '<div class="tsm-rate-pill">' + esc(c.item) + ': <strong>' + esc(c.amount) + '</strong></div>'; });
        html += '</div></div>';
      }

      return html;
    }

    // ── Step 3: Review the Return ────────────────────────────────────────────
    async function renderTDStep3() {
      document.getElementById('tdo-step-label').textContent = 'Step 3 of 5 — Review the Return';
      const d = _currentDelivery;
      document.getElementById('tdo-content').innerHTML = `
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:0.75rem;">Review Your Tax Return</h2>
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1.25rem;">Please review your complete tax return carefully before approving.</p>
        <div id="tdo-pdf-area" style="margin-bottom:1.5rem;"></div>
        <div id="tdo-changes-area" style="display:none;margin-bottom:1.25rem;">
          <label style="display:block;font-weight:600;margin-bottom:0.5rem;">Describe the changes needed:</label>
          <textarea id="tdo-changes-note" rows="4" style="width:100%;background:var(--card,#1a1d27);border:1px solid var(--border,#2a2d3a);border-radius:8px;padding:0.75rem;color:var(--text);font-size:0.9rem;resize:vertical;" placeholder="Please explain what changes are needed..."></textarea>
          <div style="margin-top:0.75rem;">
            <button class="btn-cancel" style="padding:0.4rem 0.85rem;font-size:0.82rem;" onclick="document.getElementById('tdo-changes-area').style.display='none'">Cancel</button>
            <button class="btn-submit" style="padding:0.4rem 0.85rem;font-size:0.82rem;" style="margin-left:0.5rem;" onclick="submitNeedsChanges()">Submit Changes Request</button>
          </div>
        </div>
        <div id="tdo-approve-btns" style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
          <button class="btn-cancel" onclick="renderTDStep2()" style="opacity:0.7;">← Back to Summary</button>
          <button class="btn-cancel" onclick="document.getElementById('tdo-changes-area').style.display='';document.getElementById('tdo-approve-btns').style.display='none';">Request Changes</button>
          <button class="btn-submit" onclick="submitApprove()">Approve Return ✓</button>
        </div>
      `;
      // Load signed URL for review doc
      try {
        const res = await fetch(`/portal/tax-deliveries/${d.id}/download-review`, { headers: authHeader() });
        if (res.ok) {
          const { url } = await res.json();
          document.getElementById('tdo-pdf-area').innerHTML =
            `<div style="margin-bottom:0.75rem;">
              <a href="${url}" target="_blank" class="btn-cancel" style="display:inline-flex;align-items:center;gap:0.5rem;">📄 Open Review Copy</a>
            </div>
            <iframe src="${url}" style="width:100%;height:calc(100vh - 280px);min-height:600px;border:1px solid var(--border,#2a2d3a);border-radius:8px;" title="Tax Return Review Copy"></iframe>`;
        }
      } catch(e) {
        document.getElementById('tdo-pdf-area').innerHTML = '<p style="color:var(--muted);font-size:0.88rem;">Unable to load PDF. You can still approve or request changes.</p>';
      }
    }
    window.renderTDStep3 = renderTDStep3;

    async function submitApprove() {
      const d = _currentDelivery;
      try {
        const res = await fetch(`/portal/tax-deliveries/${d.id}/approve`, {
          method: 'POST', headers: authHeader(), body: JSON.stringify({})
        });
        if (!res.ok) { alert('Failed to submit approval. Please try again.'); return; }
        _currentDelivery.approved_at = new Date().toISOString();
        renderTDStep4();
      } catch(e) { alert('Network error. Please try again.'); }
    }
    window.submitApprove = submitApprove;

    async function submitNeedsChanges() {
      const d = _currentDelivery;
      const note = document.getElementById('tdo-changes-note').value.trim();
      if (!note) { alert('Please describe the changes needed.'); return; }
      try {
        const res = await fetch(`/portal/tax-deliveries/${d.id}/needs-changes`, {
          method: 'POST', headers: authHeader(), body: JSON.stringify({ note })
        });
        if (!res.ok) { alert('Failed to submit. Please try again.'); return; }
        document.getElementById('tdo-step-label').textContent = 'Changes Requested';
        document.getElementById('tdo-content').innerHTML = `
          <div style="text-align:center;padding:2rem 0;">
            <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
            <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:0.75rem;">Changes Requested</h2>
            <p style="color:var(--muted);">Your advisor has been notified and will reach out to you with updated documents.</p>
            <button class="btn-cancel" style="margin-top:1.5rem;" onclick="closeTaxDeliveryFlow()">Close</button>
          </div>`;
      } catch(e) { alert('Network error. Please try again.'); }
    }
    window.submitNeedsChanges = submitNeedsChanges;

    async function renderTDStep4() {
      document.getElementById('tdo-step-label').textContent = 'Step 4 of 5 — Sign';
      const d = _currentDelivery;
      const firmName = await getFirmName();
      const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('tdo-content').innerHTML = `
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:0.75rem;">Sign Your Return</h2>
        <div id="tdo-sig-pdf-area" style="margin-bottom:1.25rem;"></div>
        <p style="font-size:0.88rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">
          By signing below, I confirm I have reviewed my tax return and authorize ${esc(firmName)} to e-file on my behalf.
        </p>
        <div style="margin-bottom:0.75rem;display:flex;gap:0.5rem;">
          <button class="btn-cancel" style="padding:0.4rem 0.85rem;font-size:0.82rem;" id="tdo-sig-tab-draw" onclick="switchSigTab('draw')" style="font-weight:700;">Draw</button>
          <button class="btn-cancel" style="padding:0.4rem 0.85rem;font-size:0.82rem;" id="tdo-sig-tab-type" onclick="switchSigTab('type')">Type</button>
        </div>
        <div id="tdo-sig-draw-area">
          <div style="position:relative;border:2px dashed var(--border,#2a2d3a);border-radius:8px;background:var(--card,#1a1d27);margin-bottom:0.5rem;">
            <canvas id="tdo-sig-canvas" width="620" height="160" style="width:100%;height:160px;display:block;touch-action:none;cursor:crosshair;border-radius:8px;"></canvas>
          </div>
          <button class="btn-cancel" style="padding:0.4rem 0.85rem;font-size:0.82rem;" onclick="clearSigCanvas()">Clear</button>
        </div>
        <div id="tdo-sig-type-area" style="display:none;">
          <input id="tdo-sig-typed" type="text" placeholder="Type your full name" style="width:100%;background:var(--card,#1a1d27);border:1px solid var(--border,#2a2d3a);border-radius:8px;padding:0.75rem;color:var(--text);font-size:1.6rem;font-family:cursive;margin-bottom:0.5rem;" />
        </div>
        <div style="margin:1rem 0;font-size:0.88rem;color:var(--muted);">Date: <strong>${today}</strong></div>
        <button class="btn-submit" onclick="submitSignature()">Submit Signature →</button>
      `;

      // Load signature pages PDF
      try {
        const res = await fetch(`/portal/tax-deliveries/${d.id}/download-signature`, { headers: authHeader() });
        if (res.ok) {
          const { url } = await res.json();
          document.getElementById('tdo-sig-pdf-area').innerHTML =
            `<a href="${url}" target="_blank" class="btn-cancel" style="padding:0.4rem 0.85rem;font-size:0.82rem;" style="display:inline-flex;align-items:center;gap:0.5rem;">📄 View Signature Pages</a>`;
        }
      } catch(e) {}

      // Set up canvas
      initSigCanvas();
    }
    window.renderTDStep4 = renderTDStep4;

    function switchSigTab(tab) {
      const draw = document.getElementById('tdo-sig-draw-area');
      const type = document.getElementById('tdo-sig-type-area');
      const btnDraw = document.getElementById('tdo-sig-tab-draw');
      const btnType = document.getElementById('tdo-sig-tab-type');
      if (tab === 'draw') {
        draw.style.display = ''; type.style.display = 'none';
        btnDraw.style.fontWeight = '700'; btnType.style.fontWeight = '';
      } else {
        draw.style.display = 'none'; type.style.display = '';
        btnDraw.style.fontWeight = ''; btnType.style.fontWeight = '700';
      }
    }
    window.switchSigTab = switchSigTab;

    function initSigCanvas() {
      const canvas = document.getElementById('tdo-sig-canvas');
      if (!canvas) return;
      _signatureCanvas = canvas;
      const ctx = canvas.getContext('2d');
      ctx.strokeStyle = '#e8e8e8';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        if (e.touches) {
          return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
      }

      canvas.addEventListener('mousedown', e => { _isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
      canvas.addEventListener('mousemove', e => { if (!_isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
      canvas.addEventListener('mouseup', () => _isDrawing = false);
      canvas.addEventListener('mouseleave', () => _isDrawing = false);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); _isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
      canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!_isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
      canvas.addEventListener('touchend', () => _isDrawing = false);
    }

    function clearSigCanvas() {
      if (!_signatureCanvas) return;
      _signatureCanvas.getContext('2d').clearRect(0, 0, _signatureCanvas.width, _signatureCanvas.height);
    }
    window.clearSigCanvas = clearSigCanvas;

    async function submitSignature() {
      const d = _currentDelivery;
      const typeArea = document.getElementById('tdo-sig-type-area');
      const isTyped = typeArea && typeArea.style.display !== 'none';
      let sigData, sigType;

      if (isTyped) {
        sigData = (document.getElementById('tdo-sig-typed').value || '').trim();
        sigType = 'typed';
        if (!sigData) { alert('Please type your name to sign.'); return; }
      } else {
        const canvas = document.getElementById('tdo-sig-canvas');
        if (!canvas) { alert('Signature canvas not found.'); return; }
        sigData = canvas.toDataURL('image/png');
        sigType = 'drawn';
        // Check if canvas is empty
        const blank = document.createElement('canvas');
        blank.width = canvas.width; blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) { alert('Please draw your signature first.'); return; }
      }

      try {
        const res = await fetch(`/portal/tax-deliveries/${d.id}/sign`, {
          method: 'POST', headers: authHeader(),
          body: JSON.stringify({ signature_data: sigData, signature_type: sigType })
        });
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          alert(e.error || 'Failed to submit signature. Please try again.');
          return;
        }
        const result = await res.json();
        renderTDStep5(result.allSigned);
      } catch(e) { alert('Network error. Please try again.'); }
    }
    window.submitSignature = submitSignature;

    async function renderTDStep5(allSigned) {
      document.getElementById('tdo-step-label').textContent = 'Step 5 of 5 — Complete';
      const d = _currentDelivery;
      document.getElementById('tdo-content').innerHTML = `
        <div style="text-align:center;padding:2rem 0;">
          <div style="font-size:3.5rem;margin-bottom:1rem;">🎉</div>
          <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:0.75rem;">Thank You!</h2>
          <p style="color:var(--muted);font-size:0.95rem;margin-bottom:0.75rem;">Your signature has been received.</p>
          ${!allSigned ? `<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem;">Your spouse will also need to sign before we can proceed.</p>` : ''}
          ${allSigned ? `<p style="color:#4caf50;font-size:0.88rem;margin-bottom:1.5rem;font-weight:600;">All signers have completed. Your advisor will proceed with e-filing.</p>` : ''}
          <button class="btn-submit" onclick="closeTaxDeliveryFlow()">Done</button>
        </div>`;

      // Silently reload docs so they appear without refresh
      try {
        const token = localStorage.getItem('portalToken');
        const docsRes = await fetch('/portal/documents', { headers: { 'Authorization': 'Bearer ' + token } });
        if (docsRes.ok) {
          _docs = await docsRes.json();
          renderDocuments();
        }
      } catch(e) {}
      // Reload deliveries to update tab
      loadTaxDeliveries().catch(() => {});
    }
    window.renderTDStep5 = renderTDStep5;

  })();
  </script>
</body>
</html>
