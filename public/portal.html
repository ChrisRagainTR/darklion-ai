<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/sentinel-favicon.png">
  <title>Sentinel Wealth & Tax — Client Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #20243a;
      --gold: #c9a84c;
      --gold-light: #e2c068;
      --text: #e8e8e8;
      --muted: #8a8fa8;
      --border: #2a2d3a;
      --green: #3ecf8e;
      --red: #e05555;
      --input-bg: #12151f;
      --nav-h: 62px;
      --tab-h: 50px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ─────────────────────────────────────────── */
    .topnav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: var(--nav-h);
      position: sticky;
      top: 0;
      z-index: 200;
      gap: 1rem;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .nav-firm {
      font-size: 0.78rem;
      color: var(--muted);
      border-left: 1px solid var(--border);
      padding-left: 0.65rem;
      margin-left: 0.35rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .nav-user {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    @media (max-width: 480px) { .nav-user { display: none; } }

    /* ── Mobile view toggle ── */
    .mobile-toggle {
      display: none;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }
    .mobile-toggle button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .mobile-toggle button.active {
      background: var(--gold);
      color: var(--navy);
    }
    @media (max-width: 600px) {
      .mobile-toggle { display: flex; }
      .tab-bar { display: none; }
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TAB BAR ─────────────────────────────────────────── */
    .tab-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0 1.25rem;
      height: var(--tab-h);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-btn:hover { color: var(--text); }

    /* ── MAIN ────────────────────────────────────────────── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
      transition: max-width 0.2s ease, padding 0.2s ease;
    }
    main.wide-mode {
      max-width: 98vw;
      padding: 1.75rem 0.75rem 4rem;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARDS ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── SKELETON ─────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #353845 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── WELCOME ─────────────────────────────────────────── */
    .welcome-card {
      background: linear-gradient(135deg, #1a1d27 0%, #1e2236 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .welcome-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 160px; height: 100%;
      background: radial-gradient(ellipse at right center, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .welcome-card h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .welcome-card .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.1rem;
    }

    .status-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.76rem;
      border-radius: 20px;
      padding: 0.22rem 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .badge-gold {
      background: rgba(201,168,76,0.14);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.28);
    }

    .badge-green {
      background: rgba(62,207,142,0.12);
      color: var(--green);
      border: 1px solid rgba(62,207,142,0.25);
    }

    .badge-muted {
      background: rgba(138,143,168,0.1);
      color: var(--muted);
      border: 1px solid rgba(138,143,168,0.2);
    }

    /* ── QUICK LINKS ──────────────────────────────────────── */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .quick-link {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
    }

    .quick-link:hover { border-color: var(--gold); background: rgba(201,168,76,0.04); }

    .ql-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }

    .ql-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .ql-desc { font-size: 0.76rem; color: var(--muted); }

    /* ── COMPANY CARDS ────────────────────────────────────── */
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 0.85rem;
    }

    .company-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }

    .company-card .co-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .company-card .co-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .company-card .co-badges {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    /* ── DOCUMENTS ────────────────────────────────────────── */
    .docs-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .btn-upload {
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.86rem;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-upload:hover { background: var(--gold-light); }

    /* Year folder */
    .year-folder {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .year-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .year-header:hover { background: rgba(255,255,255,0.03); }

    .year-header .yr-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .yr-count {
      font-size: 0.72rem;
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 0.1rem 0.5rem;
      font-weight: 600;
    }

    .yr-chevron {
      color: var(--muted);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .year-folder.open .yr-chevron { transform: rotate(180deg); }

    .year-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .year-folder.open .year-body { display: block; }

    /* Section heading inside year */
    .section-heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 0.6rem 1.1rem 0.3rem;
    }

    /* Doc row */
    .doc-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.1rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .doc-row:hover { background: rgba(255,255,255,0.03); }

    .doc-icon { font-size: 1.25rem; flex-shrink: 0; }

    .doc-info { flex: 1; min-width: 0; }

    .doc-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.25rem;
    }

    .doc-badge {
      font-size: 0.68rem;
      border-radius: 20px;
      padding: 0.1rem 0.45rem;
      font-weight: 600;
    }

    .doc-badge-type { background: rgba(138,143,168,0.12); color: var(--muted); border: 1px solid rgba(138,143,168,0.2); }
    .doc-badge-new { background: rgba(201,168,76,0.16); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .doc-badge-viewed { background: rgba(62,207,142,0.1); color: var(--green); border: 1px solid rgba(62,207,142,0.25); }
    .doc-badge-client { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }

    .btn-dl {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-dl:hover { border-color: var(--gold); color: var(--gold); }
    .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2.5rem 1rem;
    }

    .empty-state .ei { font-size: 2.2rem; margin-bottom: 0.6rem; }

    /* ── UPLOAD MODAL ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.75rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.03em;
    }

    .form-group select,
    .form-group input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.93rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .form-group select:focus,
    .form-group input[type="text"]:focus { border-color: var(--gold); }

    .file-drop {
      border: 2px dashed var(--border);
      border-radius: 9px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }

    .file-drop input[type="file"] {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .selected-file {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--gold);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.88rem;
      border-radius: 7px;
      padding: 0.55rem 1rem;
      cursor: pointer;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-submit {
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      border-radius: 7px;
      padding: 0.55rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: var(--gold-light); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .upload-msg { font-size: 0.8rem; color: var(--green); margin-top: 0.5rem; }
    .upload-err { font-size: 0.8rem; color: var(--red); margin-top: 0.5rem; }

    /* ── ORGANIZERS ───────────────────────────────────────── */
    .organizer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .organizer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .organizer-card .oc-icon { font-size: 1.8rem; }

    .organizer-card .oc-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .organizer-card .oc-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .btn-organizer {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      border-radius: 7px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-organizer:hover { background: var(--gold-light); }

    .organizer-pending {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── MESSAGES ─────────────────────────────────────────── */
    .chat-layout { display: flex; height: calc(100vh - 160px); }
    .chat-contacts { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px 0 0 12px; }
    .chat-contact-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .chat-contact-row:hover, .chat-contact-row.active { background: rgba(201,168,76,0.08); }
    .chat-contact-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(201,168,76,0.15); color: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
    .chat-contact-info { flex: 1; min-width: 0; }
    .chat-contact-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-contact-preview { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.1rem; }
    .chat-contact-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; flex-shrink: 0; }
    .chat-contact-time { font-size: 0.7rem; color: var(--muted); }
    .chat-unread-badge { background: #ffffff; color: #1a1a2e; border-radius: 10px; padding: 0.1rem 0.4rem; font-size: 0.68rem; font-weight: 700; }
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--card); border: 1px solid var(--border); border-left: none; border-radius: 0 12px 12px 0; overflow: hidden; }
    .chat-main-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
    .chat-main-header .hdr-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(201,168,76,0.15); color: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .chat-main-header .hdr-name { font-weight: 700; font-size: 0.95rem; }
    .chat-empty-contacts { padding: 2rem 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 200px);
      max-height: 650px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .chat-bubble {
      max-width: 75%;
      padding: 0.6rem 0.9rem;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-bubble.client {
      align-self: flex-end;
      background: var(--gold);
      color: #0f1117;
    }
    .chat-bubble.staff {
      align-self: flex-start;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .chat-bubble-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .chat-bubble-wrap.client { display: flex; flex-direction: column; align-items: flex-end; }
    .chat-bubble-wrap.staff { display: flex; flex-direction: column; align-items: flex-start; }
    .chat-input-bar {
      padding: 0.75rem 1rem;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .chat-input-bar textarea {
      flex: 1;
      resize: none;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      min-height: 42px;
      max-height: 120px;
    }
    .chat-input-bar textarea:focus { outline: none; border-color: var(--gold); }
    .chat-send-btn {
      background: var(--gold);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
    }
    .chat-send-btn:hover { opacity: 0.9; }

  <script src="https://js.pusher.com/8.3.0/pusher.min.js"></script>
  <script>
  (function () {
    'use strict';

    const token = localStorage.getItem('portalToken');
    if (!token) { window.location.href = '/portal-login'; return; }

    // ── Real-time + polling ────────────────────────────────────────────────────
    function _reloadMessages() {
      console.log('[portal] _reloadMessages called, _portalReloadMessages set:', typeof window._portalReloadMessages);
      if (typeof window._portalReloadMessages === 'function') {
        window._portalReloadMessages();
      }
    }

    // Polling: 30s fallback — paused while user is typing
    let _userTyping = false;
    document.addEventListener('focusin', (e) => { if (e.target.id === 'chatInput') _userTyping = true; });
    document.addEventListener('focusout', (e) => { if (e.target.id === 'chatInput') _userTyping = false; });

    // Emit typing indicator to staff when client types
    let _clientTypingTimer = null;
    document.addEventListener('input', (e) => {
      if (e.target.id !== 'chatInput') return;
      clearTimeout(_clientTypingTimer);
      _clientTypingTimer = setTimeout(() => {
        if (_portalChannel && _portalChannel.subscribed) {
          _portalChannel.trigger('client-typing', { name: _portalJwt.name || 'Client' });
        }
      }, 300);
    });
    setInterval(() => { if (!_userTyping) _reloadMessages(); }, 30000);

    // Pusher: instant delivery via private channel
    const _portalJwt = JSON.parse(atob(token.split('.')[1]));
    const _pusher = new Pusher('6ee61a25e438d5bc4751', {
      cluster: 'us2',
      authEndpoint: '/pusher/auth/portal?token=' + encodeURIComponent(token),
    });
    const _portalChannel = _pusher.subscribe(`private-portal-${_portalJwt.firmId}-${_portalJwt.personId}`);
    _portalChannel.bind('pusher:subscription_succeeded', () => console.log('[pusher] portal subscribed'));
    _portalChannel.bind('pusher:subscription_error', (e) => console.warn('[pusher] portal auth error:', e));
    _portalChannel.bind('message-new', ({ senderType }) => {
      _reloadMessages();
    });

    // Typing indicator from staff arrives on portal channel
    _portalChannel.bind('client-typing', ({ name }) => {
      const el = document.getElementById('advisorTyping');
      if (el) { el.textContent = `${name || 'Advisor'} is typing…`; el.style.display = 'block'; }
      clearTimeout(window._portalTypingTimer);
      window._portalTypingTimer = setTimeout(() => { if (el) el.style.display = 'none'; }, 3000);
    });
    // ─────────────────────────────────────────────────────────────────────────

    // ── State ─────────────────────────────────────────────
    let _me = null, _companies = [], _docs = [], _stanford = null;
    let _selectedFile = null;

    // ── Auth fetch ────────────────────────────────────────
    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: {
          'Authorization': `Bearer ${token}`,
          ...(opts.headers || {}),
        },
      });
      if (res.status === 401) {
        localStorage.removeItem('portalToken');
        window.location.href = '/portal-login';
        throw new Error('Unauthorized');
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function escHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Tabs ─────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        if (tab === 'organizers' && _stanford === null) loadOrganizers();
        if (tab === 'messages') initChat();
        if (tab === 'review-sign') loadTaxDeliveries();
        // Leave wide-mode only when on a company bookkeeping subtab
        document.querySelector('main').classList.remove('wide-mode');
      });
    });

    // ── Mobile toggle (Messages / Documents) ──────────────
    window.mobileToggleTo = function(tab, btn) {
      // Trigger the real tab switch
      const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (tabBtn) tabBtn.click();
      // Update toggle button states
      document.querySelectorAll('#mobileToggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };

    // Keep mobile toggle in sync when tabs switch via other means
    const _origTabClick = document.querySelectorAll('.tab-btn');
    _origTabClick.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        const msgBtn = document.getElementById('toggle-messages');
        const docBtn = document.getElementById('toggle-docs');
        if (msgBtn && docBtn) {
          msgBtn.classList.toggle('active', tab === 'messages');
          docBtn.classList.toggle('active', tab === 'documents');
        }
      });
    });

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('portalToken');
      window.location.href = '/portal-login';
    });

    // ── State ─────────────────────────────────────────────
    let _firmTeam = [];
    let _avatarMap = {};

    // ── INIT ─────────────────────────────────────────────
    async function init() {
      try {
        [_me, _companies, _docs] = await Promise.all([
          api('/portal/me'),
          api('/portal/companies').catch(() => []),
          api('/portal/documents').catch(() => []),
        ]);
        window._portalMe = _me; // expose for second script block
        // Pre-load staff list for messages tab and overview unread count
        try {
          const mc = await fetch('/portal/messages', { headers: { 'Authorization': `Bearer ${localStorage.getItem('portalToken')}` } });
          if (mc.ok) {
            _staffList = await mc.json();
            if (!Array.isArray(_staffList)) _staffList = [];
            _staffList.forEach(s => { if (s.avatar_url) _avatarMap[s.id] = s.avatar_url; });
          }
        } catch(e) { _staffList = []; }

        const fullName = `${_me.firstName || ''} ${_me.lastName || ''}`.trim();
        document.title = `${fullName} — Client Portal`;
        document.getElementById('navUser').textContent = fullName;

        // Load firm name
        try {
          const fi = await fetch('/portal-auth/firm-info').then(r => r.json());
          if (fi.firmName) {
            // navFirm removed — firm name shown as static "Sentinel Wealth & Tax"
          }
        } catch (e) { /* silent */ }

        // Load firm team for welcome card
        try {
          const ftRes = await fetch('/portal/firm-team', { headers: { 'Authorization': `Bearer ${localStorage.getItem('portalToken')}` } });
          if (ftRes.ok) {
            _firmTeam = await ftRes.json();
            if (!Array.isArray(_firmTeam)) _firmTeam = [];
          }
        } catch(e) { _firmTeam = []; }

        renderOverview();
        renderDocuments();
        buildCompanyTabs();

        // Load tax deliveries (show tab if any pending)
        try {
          const tdRes = await fetch('/portal/tax-deliveries', {
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
          });
          if (tdRes.ok) {
            const deliveries = await tdRes.json();
            window._taxDeliveriesCache = deliveries;
            // Only show tab if there are unsigned/pending deliveries
            const pending = deliveries.filter(function(d) { return !d.signed_at; });
            if (pending.length > 0) {
              const tdTab = document.getElementById('review-sign-tab');
              const tdBadge = document.getElementById('review-sign-badge');
              if (tdTab) { tdTab.style.display = ''; tdTab.style.visibility = 'visible'; }
              if (tdBadge) { tdBadge.textContent = pending.length; tdBadge.style.display = ''; }
            }
          } else {
            console.warn('[portal] tax-deliveries status:', tdRes.status);
          }
        } catch(e) { console.error('[portal] tax delivery init error:', e); }

        document.getElementById('overview-loading').style.display = 'none';
        document.getElementById('overview-content').style.display = 'block';
      } catch (err) {
        if (err.message !== 'Unauthorized') {
          console.error('Portal init error:', err);
          document.getElementById('overview-loading').innerHTML =
            '<div class="empty-state"><div class="ei">⚠️</div><div>Unable to load portal. Please refresh.</div></div>';
        }
      }
    }

    // ── OVERVIEW ─────────────────────────────────────────
    function buildCompanyTabs() {
      if (!_companies || !_companies.length) return;
      const tabBar = document.getElementById('company-tabs');
      const panelContainer = document.getElementById('company-tab-panels');
      tabBar.innerHTML = '';
      panelContainer.innerHTML = '';

      _companies.forEach(co => {
        const tabKey = `co-${co.id || co.company_id}`;
        const coId = co.id || co.company_id;
        const coName = co.company_name || co.name || `Company`;
        // Short name for tab (truncate if long)
        const shortName = coName.length > 18 ? coName.slice(0, 16) + '…' : coName;

        // Tab button
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.dataset.tab = tabKey;
        btn.innerHTML = `🏢 ${escHtml(shortName)}`;
        btn.title = coName;
        tabBar.appendChild(btn);

        // Tab panel — contains subtabs (Docs / Bookkeeping)
        const panel = document.createElement('div');
        panel.className = 'tab-panel';
        panel.id = `tab-${tabKey}`;
        panel.innerHTML = `
          <div class="co-subtab-bar" style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem;">
            <button class="co-subtab-btn active" data-co="${coId}" data-subtab="docs"
              style="padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:700;border:none;background:transparent;cursor:pointer;color:var(--gold,#c9a84c);border-bottom:2px solid var(--gold,#c9a84c);margin-bottom:-2px;transition:color 0.15s;">
              📁 Documents
            </button>
            <button class="co-subtab-btn" data-co="${coId}" data-subtab="bookkeeping"
              style="padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:700;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.15s;">
              📒 Bookkeeping
            </button>
          </div>
          <div id="co-subtab-docs-${coId}" class="co-subtab-panel">
            <div id="co-docs-${coId}"><div class="loading-state"><div class="loading-spinner"></div><div>Loading documents…</div></div></div>
          </div>
          <div id="co-subtab-bookkeeping-${coId}" class="co-subtab-panel" style="display:none;">
            <div id="co-bk-${coId}">
              <div class="loading-state"><div class="loading-spinner"></div><div>Loading close package…</div></div>
            </div>
          </div>`;
        panelContainer.appendChild(panel);
      });

      // Wire tab clicks for company tabs
      document.getElementById('company-tabs').querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(`tab-${tab}`).classList.add('active');
          // Load company docs if not yet loaded
          const coId = parseInt(tab.replace('co-', ''));
          loadCompanyDocs(coId);
        });

      // Wire subtab clicks (Docs / Bookkeeping) inside each company panel
      panelContainer.querySelectorAll('.co-subtab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const coId = btn.dataset.co;
          const subtab = btn.dataset.subtab;
          // Update button styles
          panelContainer.querySelectorAll(`.co-subtab-btn[data-co="${coId}"]`).forEach(b => {
            const active = b.dataset.subtab === subtab;
            b.style.color = active ? 'var(--gold,#c9a84c)' : 'var(--muted)';
            b.style.borderBottomColor = active ? 'var(--gold,#c9a84c)' : 'transparent';
          });
          // Show/hide panels
          panelContainer.querySelectorAll(`.co-subtab-panel[id^="co-subtab-"][id$="-${coId}"]`).forEach(p => {
            p.style.display = p.id === `co-subtab-${subtab}-${coId}` ? '' : 'none';
          });

          document.querySelector('main').classList.toggle('wide-mode', subtab === 'bookkeeping');

          if (subtab === 'bookkeeping') loadCompanyBookkeeping(parseInt(coId));

    async function loadCompanyDocs(coId) {
      const container = document.getElementById(`co-docs-${coId}`);
      if (!container || container.dataset.loaded) return;
      container.dataset.loaded = '1';
      try {
        const token = localStorage.getItem('portalToken');
        const res = await fetch(`/portal/documents`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Failed');
        const allDocs = await res.json();
        const coDocs = allDocs.filter(d => d.owner_type === 'company' && (d.owner_id === coId || d.owner_id === String(coId)));

        // Render using same side-by-side structure but company categories
        const co = _companies.find(c => (c.id || c.company_id) === coId);
        const coName = co ? (co.company_name || co.name) : `Company #${coId}`;

        const curYear = new Date().getFullYear();
        const years = [];
        for (let y = curYear; y >= 2018; y--) years.push(String(y));
        const recentYears = years.slice(0, 2);
        const prevYears = years.slice(2);
        const COMPANY_CATS = [
          { key: 'tax', label: 'Tax', icon: '🧾' },
          { key: 'bookkeeping', label: 'Bookkeeping', icon: '📒' },
          { key: 'other', label: 'Other', icon: '📎' },
        ];

        function renderCoSection(sectionKey, sectionLabel, sectionIcon) {
          const isClientSection = sectionKey === 'client_uploaded';
          const secDocs = coDocs.filter(d => (d.folder_section || '') === sectionKey);
          const uploadBtn = isClientSection
            ? `<button class="btn-section-upload" data-company-id="${coId}" style="font-size:0.72rem;padding:0.2rem 0.55rem;border-radius:5px;border:1px solid var(--gold,#c9a84c);background:transparent;color:var(--gold,#c9a84c);cursor:pointer;font-weight:600;margin-left:auto;">⬆ Upload</button>`
            : '';
          let s = `<div style="margin-bottom:1.5rem;">
            <div style="font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem;">${sectionIcon} ${sectionLabel} <span style="font-size:0.75rem;font-weight:400;color:var(--muted);">(${secDocs.length})</span>${uploadBtn}</div>`;

          function renderCoYear(yr) {
            const yrDocs = secDocs.filter(d => (d.year||'') === yr);
            const open = yrDocs.length > 0;
            let y = `<div class="year-folder${open?' open':''}" style="margin-bottom:0.4rem;">
              <div class="year-header"><span class="yr-label">📅 ${yr} <span class="yr-count">${yrDocs.length}</span></span><span class="yr-chevron">▼</span></div>
              <div class="year-body" style="padding-left:1rem;">`;
            COMPANY_CATS.forEach(cat => {
              const catDocs = yrDocs.filter(d => (d.folder_category||'other') === cat.key);
              y += `<div style="margin-bottom:0.5rem;"><div style="font-size:0.82rem;font-weight:700;color:var(--text);padding:0.4rem 0.5rem;margin-bottom:0.25rem;border-left:3px solid var(--gold);background:rgba(201,168,76,0.06);">${cat.icon} ${cat.label} <span style="font-size:0.72rem;font-weight:400;color:var(--muted);">(${catDocs.length})</span></div><div style="padding-left:0.5rem;">`;
              if (!catDocs.length) {
                y += `<div style="color:var(--muted);font-size:0.78rem;font-style:italic;">Empty</div>`;
              } else {
                catDocs.forEach(doc => {
                  const ftb = fileTypeBadge(doc.mime_type, doc.display_name);
                  const isNew = isDocNew(doc);
                  const moveBtn = isClientSection
                    ? `<button class="btn-move" data-docid="${doc.id}" data-docname="${escHtml(doc.display_name||'Document')}" data-year="${doc.year||''}" data-cat="${doc.folder_category||'other'}" style="font-size:0.65rem;padding:0.15rem 0.4rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-left:0.25rem;" title="Move to different year/category">✎ Move</button>`
                    : '';
                  y += `<div class="doc-row" data-docid="${doc.id}"><span style="flex-shrink:0;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.65rem;font-weight:700;color:#fff;background:${ftb.color};">${ftb.label}</span><div class="doc-info"><div class="doc-name doc-name-link" data-docid="${doc.id}" style="cursor:pointer;text-decoration:underline;text-underline-offset:2px;">${escHtml(doc.display_name||'Document')}</div><div class="doc-badges">${isNew?'<span class="doc-badge doc-badge-new">✦ NEW</span>':'<span class="doc-badge doc-badge-viewed">✓ Viewed</span>'}${doc.size_bytes?`<span class="doc-badge doc-badge-type">${fmtBytes(doc.size_bytes)}</span>`:''}</div></div><button class="btn-dl" data-docid="${doc.id}">⬇ Download</button>${moveBtn}</div>`;
                });
              }
              y += `</div></div>`;
            });
            y += `</div></div>`;
            return y;
          }

          recentYears.forEach(yr => { s += renderCoYear(yr); });
          const prevCount = prevYears.reduce((n,yr) => n + secDocs.filter(d=>(d.year||'')===yr).length, 0);
          s += `<div class="year-folder" style="margin-bottom:0.4rem;"><div class="year-header"><span class="yr-label">📂 Previous Years <span class="yr-count">${prevCount}</span></span><span class="yr-chevron">▼</span></div><div class="year-body" style="padding-left:0.5rem;">${prevYears.map(yr=>renderCoYear(yr)).join('')}</div></div>`;
          s += `</div>`;
          return s;
        }

        let html = `<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;padding-bottom:0.4rem;border-bottom:2px solid var(--border);">🏢 ${escHtml(coName)}</h2>`;
        html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">`;
        html += renderCoSection('firm_uploaded', 'Delivered by Your Advisor', '📁');
        html += renderCoSection('client_uploaded', 'Uploaded by You', '📤');
        html += `</div>`;
        container.innerHTML = html;

        // Wire year toggles and download
        container.querySelectorAll('.year-header').forEach(h => {
          h.addEventListener('click', () => h.closest('.year-folder').classList.toggle('open'));
        });
        container.querySelectorAll('.doc-name-link').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); const btn = el.closest('.doc-row').querySelector('.btn-dl'); downloadDoc(parseInt(el.dataset.docid), btn || {}); });
        });
        container.querySelectorAll('.btn-dl').forEach(btn => {
          btn.addEventListener('click', e => { e.stopPropagation(); downloadDoc(parseInt(btn.dataset.docid), btn); });
        });
        container.querySelectorAll('.btn-section-upload').forEach(btn => {
          btn.addEventListener('click', e => { e.stopPropagation(); openUploadModal(parseInt(btn.dataset.companyId)); });
        });
        container.querySelectorAll('.btn-move').forEach(btn => {
          btn.addEventListener('click', e => { e.stopPropagation(); openMoveModal(parseInt(btn.dataset.docid), btn.dataset.docname, btn.dataset.year, btn.dataset.cat); });
        });
      } catch(e) {
        container.innerHTML = `<div style="color:var(--muted);padding:2rem;text-align:center;">Failed to load documents.</div>`;
      }
    }

    // ── BOOKKEEPING / CLOSE PACKAGE ──────────────────────

          <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem;" id="co-bk-tabs-${coId}">
            <button class="co-bk-tab active" data-co="${coId}" data-bktab="ytd"

    function renderClosePackagePanel(pkg, label) {
      if (!pkg || !pkg.report_data) {
        return `<div style="text-align:center;padding:3rem;color:var(--muted);">
          <div style="font-size:2rem;margin-bottom:0.5rem;">📒</div>
          No close package available for ${escHtml(label)} yet.
        </div>`;
      }
      const rd = typeof pkg.report_data === 'string' ? JSON.parse(pkg.report_data) : pkg.report_data;
      const genDate = pkg.generated_at ? new Date(pkg.generated_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '';
      let html = `<div style="font-size:0.75rem;color:var(--muted);margin-bottom:1rem;">Period: <strong>${escHtml(pkg.period || label)}</strong>${genDate ? ' · Generated ' + genDate : ''}</div>`;
      if (rd.pnl)          html += `<div class="report-section"><h3 style="font-size:0.88rem;font-weight:700;margin:0 0 0.6rem;color:var(--text);">Profit &amp; Loss</h3>${portalRenderQBReport(rd.pnl)}</div>`;
      if (rd.balanceSheet) html += `<div style="max-width:720px;margin:0 auto;"><div class="report-section"><h3 style="font-size:0.88rem;font-weight:700;margin:1.5rem 0 0.6rem;color:var(--text);">Balance Sheet</h3>${portalRenderQBReport(rd.balanceSheet)}</div></div>`;
      if (rd.trialBalance) html += `<div style="max-width:720px;margin:0 auto;"><div class="report-section"><h3 style="font-size:0.88rem;font-weight:700;margin:1.5rem 0 0.6rem;color:var(--text);">Trial Balance</h3>${portalRenderQBReport(rd.trialBalance)}</div></div>`;
      if (!rd.pnl && !rd.balanceSheet && !rd.trialBalance) {
        html += `<div style="color:var(--muted);padding:1rem;text-align:center;">No report data available.</div>`;
      }
      return html;
    }

    function portalRenderQBReport(report) {
      if (!report?.Rows?.Row) {
        return '<div style="text-align:center;padding:1.5rem;color:var(--muted);">No report data available.</div>';
      }
      const columns = report.Columns?.Column || [];
      const colCount = Math.max(columns.length, 2);
      const dataCols = colCount - 1;
      const firstColPct = dataCols <= 1 ? 60 : dataCols <= 3 ? 40 : 30;
      const restPct = (100 - firstColPct) / dataCols;

      // Account name col: 40% if few data cols, shrink for many
      const namePct = dataCols <= 2 ? 45 : dataCols <= 5 ? 38 : dataCols <= 9 ? 30 : 24;
      const dataPct = ((100 - namePct) / dataCols).toFixed(2);
      let html = '<div class="table-wrap"><table style="border-collapse:collapse;font-size:0.72rem;table-layout:fixed;width:100%;">';
      html += '<colgroup>';
      html += `<col style="width:${namePct}%">`;
      for (let i = 0; i < dataCols; i++) html += `<col style="width:${dataPct}%">`;
      html += '</colgroup>';
      html += '<thead><tr>';
      for (let i = 0; i < colCount; i++) {
        const title = columns[i]?.ColTitle || '';
        html += i === 0
          ? `<th style="text-align:left;padding:0.3rem 0.5rem;color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);">${escHtml(title)}</th>`
          : `<th style="text-align:right;padding:0.3rem 0.5rem;color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);padding-right:1rem;">${escHtml(title)}</th>`;
      }
      html += '</tr></thead><tbody>';
      html += portalRenderRows(report.Rows.Row, 0, colCount);
      html += '</tbody></table></div>';
      return html;
    }

    function portalRenderRows(rows, depth, colCount) {
      let html = '';
      for (const row of rows) {
        if (row.type === 'Section' || row.group) {
          if (row.Header?.ColData) {
            const name = row.Header.ColData[0]?.value || '';
            const pad = (depth * 1.2) + 0.5;
            html += `<tr><td colspan="${colCount}" style="padding:0.45rem 0.5rem 0.2rem ${pad}rem;font-size:0.78rem;font-weight:700;color:var(--text);background:rgba(255,255,255,0.03);">${escHtml(name)}</td></tr>`;
          }
          if (row.Rows?.Row) html += portalRenderRows(row.Rows.Row, depth + 1, colCount);
          if (row.Summary?.ColData) html += portalRenderDataRow(row.Summary.ColData, depth, true, colCount);
        } else if (row.ColData) {
          html += portalRenderDataRow(row.ColData, depth, false, colCount);
        }
      }
      return html;
    }

    function portalRenderDataRow(colData, depth, isTotal, colCount) {
      const rowStyle = isTotal
        ? 'border-top:1px solid var(--border);font-weight:700;background:rgba(201,168,76,0.04);'
        : 'border-bottom:1px solid rgba(255,255,255,0.03);';
      let html = `<tr style="${rowStyle}">`;
      for (let i = 0; i < colCount; i++) {
        const val = colData[i]?.value ?? '';
        if (i === 0) {
          const pad = (depth * 1.2) + 0.5;
          html += `<td style="padding:0.3rem 0.5rem 0.3rem ${pad}rem;color:var(--text);">${escHtml(val)}</td>`;
        } else {
          const num = parseFloat(val);
          const display = isNaN(num) ? escHtml(val) : portalFmtCurrency(num);
          const color = isTotal ? '' : (num < 0 ? 'color:#e53e3e;' : '');
          html += `<td style="text-align:right;padding:0.3rem 1rem 0.3rem 0.5rem;${color}">${display}</td>`;
        }
      }
      html += '</tr>';
      return html;
    }

    function portalFmtCurrency(n) {
      if (isNaN(n)) return '';
      const abs = Math.abs(n);
      const fmt = abs >= 1000 ? abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : abs.toFixed(2);
      return n < 0 ? `(${fmt})` : fmt;
    }

    function renderOverview() {
      const firstName = _me.firstName || 'there';
      document.getElementById('welcomeHeading').textContent = `Welcome back, ${firstName}`;
      document.getElementById('welcomeSub').textContent = _me.email || '';

      // Team grid (right side of welcome card)
      if (_firmTeam.length > 0) {
        const roleLabel = r => r === 'owner' ? 'Principal' : 'Advisor';
        const grid = document.getElementById('teamGrid');
        grid.innerHTML = _firmTeam.map(m => {

    // ── DOCUMENTS ────────────────────────────────────────
    // Get file type label from mime type or filename
    // Determine if a doc should show as NEW
    // - Client-uploaded docs: never NEW (they uploaded it)
    // - Advisor docs: NEW until viewed OR 30 days after delivery
    function isDocNew(doc) {
      if (doc.folder_section === 'client_uploaded') return false;
      if (doc.viewed_at) return false;
      if (doc.delivered_at) {
        const daysSinceDelivery = (Date.now() - new Date(doc.delivered_at).getTime()) / (1000 * 60 * 60 * 24);
        if (daysSinceDelivery > 30) return false;
      }
      return true;
    }

    function fileTypeBadge(mimeType, displayName) {
      const mime = (mimeType || '').toLowerCase();
      const name = (displayName || '').toLowerCase();
      const ext = name.includes('.') ? name.split('.').pop() : '';

      if (mime === 'application/pdf' || ext === 'pdf') return { label: 'PDF', color: '#e53e3e' };
      if (mime.includes('spreadsheet') || mime.includes('excel') || ext === 'xlsx' || ext === 'xls' || ext === 'csv')
        return { label: ext === 'csv' ? 'CSV' : 'Excel', color: '#38a169' };
      if (mime.includes('word') || ext === 'docx' || ext === 'doc')
        return { label: 'Word', color: '#3182ce' };
      if (mime.includes('presentation') || mime.includes('powerpoint') || ext === 'pptx' || ext === 'ppt')
        return { label: 'PPT', color: '#dd6b20' };
      if (mime.startsWith('image/') || ['jpg','jpeg','png','gif','webp','heic'].includes(ext))
        return { label: 'Image', color: '#805ad5' };
      if (mime.includes('zip') || mime.includes('compressed') || ext === 'zip')
        return { label: 'ZIP', color: '#718096' };
      if (mime.startsWith('text/') || ext === 'txt')
        return { label: 'TXT', color: '#718096' };
      return { label: ext ? ext.toUpperCase().slice(0,4) : 'FILE', color: '#718096' };
    }

    function fmtBytes(b) {
      if (!b) return '';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    function renderDocuments() {
      const container = document.getElementById('docsContainer');

      // Build company name map
      const coMap = {};
      _companies.forEach(c => { coMap[c.id] = c.company_name; });

      const currentYear = new Date().getFullYear();
      const years = [];
      for (let y = currentYear; y >= 2018; y--) years.push(String(y));

      let DOC_CATEGORIES = [
        { key: 'tax', label: 'Tax', icon: '🧾' },
        { key: 'bookkeeping', label: 'Bookkeeping', icon: '📒' },
        { key: 'other', label: 'Other', icon: '📎' },
      ];

      // Render a full folder section with year/category hierarchy
      // Recent 2 years shown, rest under "Previous Years"
      function renderSection(sectionKey, sectionLabel, sectionIcon, sourceDocs) {
        const sectionDocs = (sourceDocs || _docs || []).filter(d => (d.folder_section || '') === sectionKey);
        const recentYears = years.slice(0, 2);
        const prevYears = years.slice(2);

        function renderOneYear(yr) {
          const yrDocs = sectionDocs.filter(d => (d.year || '') === yr);
          if (!yrDocs.length) return ''; // skip empty years
          const hasNew = yrDocs.some(d => isDocNew(d));
          // Always start collapsed
          let y = `<div class="year-folder" style="margin-bottom:0.4rem;">
            <div class="year-header">
              <span class="yr-label">📅 ${yr} <span class="yr-count">${yrDocs.length}</span>${hasNew ? ' <span style="color:var(--gold);font-size:0.65rem;">NEW</span>' : ''}</span>
              <span class="yr-chevron">▼</span>
            </div>
            <div class="year-body" style="padding-left:1rem;">`;
          DOC_CATEGORIES.forEach(cat => {
            const catDocs = yrDocs.filter(d => (d.folder_category || 'other') === cat.key);
            if (!catDocs.length) return; // skip empty categories
            y += `<div style="margin-bottom:0.5rem;"><div style="font-size:0.82rem;font-weight:700;color:var(--text);padding:0.4rem 0.5rem;margin-bottom:0.25rem;border-left:3px solid var(--gold);background:rgba(201,168,76,0.06);">${cat.icon} ${cat.label} <span style="font-size:0.72rem;font-weight:400;color:var(--muted);">(${catDocs.length})</span></div><div style="padding-left:0.5rem;">`;
            catDocs.forEach(doc => {
              const isNew = isDocNew(doc);
              const ftb = fileTypeBadge(doc.mime_type, doc.display_name);
              y += `<div class="doc-row" data-docid="${doc.id}"><span style="flex-shrink:0;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.65rem;font-weight:700;color:#fff;background:${ftb.color};letter-spacing:0.03em;">${ftb.label}</span><div class="doc-info"><div class="doc-name doc-name-link" data-docid="${doc.id}" style="cursor:pointer;text-decoration:underline;text-underline-offset:2px;">${escHtml(doc.display_name||'Document')}</div><div class="doc-badges">${isNew?'<span class="doc-badge doc-badge-new">✦ NEW</span>':'<span class="doc-badge doc-badge-viewed">✓ Viewed</span>'}${doc.size_bytes?`<span class="doc-badge doc-badge-type">${fmtBytes(doc.size_bytes)}</span>`:''}</div></div><button class="btn-dl" data-docid="${doc.id}">⬇ Download</button></div>`;
            });
            y += `</div></div>`;
          });
          y += `</div></div>`;
          return y;
        }

        const yearsWithDocs = years.filter(yr => sectionDocs.some(d => (d.year || '') === yr));
        let s = `<div style="margin-bottom:1.5rem;">
          <div style="font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);">${sectionIcon} ${sectionLabel} <span style="font-size:0.75rem;font-weight:400;color:var(--muted);">(${sectionDocs.length})</span></div>`;

        if (!yearsWithDocs.length) {
          s += `<div style="color:var(--muted);font-size:0.82rem;font-style:italic;">No documents yet.</div>`;
        } else {
          yearsWithDocs.forEach(yr => { s += renderOneYear(yr); });
        }

        s += `</div>`;
        return s;
      }

      // Render two sections side-by-side
      // companyId: null for personal docs, number for company docs
      const PERSONAL_CATS = [{ key: 'tax', label: 'Tax', icon: '🧾' }, { key: 'other', label: 'Other', icon: '📎' }];
      const COMPANY_CATS = [{ key: 'tax', label: 'Tax', icon: '🧾' }, { key: 'bookkeeping', label: 'Bookkeeping', icon: '📒' }, { key: 'other', label: 'Other', icon: '📎' }];

      function renderSideBySide(sourceDocs, includeBookkeeping, companyId) {
        const cats = includeBookkeeping ? COMPANY_CATS : PERSONAL_CATS;
        const left = renderSectionWithCats('firm_uploaded', 'Delivered by Your Advisor', '📁', sourceDocs, cats, null);
        const right = renderSectionWithCats('client_uploaded', 'Uploaded by You', '📤', sourceDocs, cats, companyId);
        return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">${left}${right}</div>`;
      }

      // uploadContext: null = personal, number = company_id
      function renderSectionWithCats(sectionKey, sectionLabel, sectionIcon, sourceDocs, cats, uploadContext) {
        const isClientSection = sectionKey === 'client_uploaded';
        const sectionDocs = (sourceDocs || []).filter(d => (d.folder_section || '') === sectionKey);

        // Upload button in section header (client_uploaded only)
        const uploadBtn = isClientSection
          ? `<button class="btn-section-upload" data-company-id="${uploadContext || ''}" style="font-size:0.72rem;padding:0.2rem 0.55rem;border-radius:5px;border:1px solid var(--gold,#c9a84c);background:transparent;color:var(--gold,#c9a84c);cursor:pointer;font-weight:600;margin-left:auto;">⬆ Upload</button>`
          : '';

        let s = `<div style="margin-bottom:1.5rem;">
          <div style="font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem;">${sectionIcon} ${sectionLabel} <span style="font-size:0.75rem;font-weight:400;color:var(--muted);">(${sectionDocs.length})</span>${uploadBtn}</div>`;

        const recentYears = years.slice(0, 2);
        const prevYears = years.slice(2);

        function renderOneYearWithCats(yr) {
          const yrDocs = sectionDocs.filter(d => (d.year || '') === yr);
          const hasNew = yrDocs.some(d => isDocNew(d));
          const open = yrDocs.length > 0;
          let y = `<div class="year-folder${open ? ' open' : ''}" style="margin-bottom:0.4rem;">
            <div class="year-header">
              <span class="yr-label">📅 ${yr} <span class="yr-count">${yrDocs.length}</span>${hasNew ? ' <span style="color:var(--gold);font-size:0.65rem;">NEW</span>' : ''}</span>
              <span class="yr-chevron">▼</span>
            </div>
            <div class="year-body" style="padding-left:1rem;">`;
          cats.forEach(cat => {
            const catDocs = yrDocs.filter(d => (d.folder_category || 'other') === cat.key);
            y += `<div style="margin-bottom:0.5rem;"><div style="font-size:0.82rem;font-weight:700;color:var(--text);padding:0.4rem 0.5rem;margin-bottom:0.25rem;border-left:3px solid var(--gold);background:rgba(201,168,76,0.06);">${cat.icon} ${cat.label} <span style="font-size:0.72rem;font-weight:400;color:var(--muted);">(${catDocs.length})</span></div><div style="padding-left:0.5rem;">`;
            if (catDocs.length === 0) {
              y += `<div style="color:var(--muted);font-size:0.78rem;font-style:italic;padding:0.2rem 0;">Empty</div>`;
            } else {
              catDocs.forEach(doc => {
                const isNew = isDocNew(doc);
                const ftb = fileTypeBadge(doc.mime_type, doc.display_name);
                const moveBtn = isClientSection
                  ? `<button class="btn-move" data-docid="${doc.id}" data-docname="${escHtml(doc.display_name||'Document')}" data-year="${doc.year||''}" data-cat="${doc.folder_category||'other'}" style="font-size:0.65rem;padding:0.15rem 0.4rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-left:0.25rem;" title="Move to different year/category">✎ Move</button>`
                  : '';
                y += `<div class="doc-row" data-docid="${doc.id}"><span style="flex-shrink:0;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.65rem;font-weight:700;color:#fff;background:${ftb.color};letter-spacing:0.03em;">${ftb.label}</span><div class="doc-info"><div class="doc-name doc-name-link" data-docid="${doc.id}" style="cursor:pointer;text-decoration:underline;text-underline-offset:2px;">${escHtml(doc.display_name||'Document')}</div><div class="doc-badges">${isNew?'<span class="doc-badge doc-badge-new">✦ NEW</span>':'<span class="doc-badge doc-badge-viewed">✓ Viewed</span>'}${doc.size_bytes?`<span class="doc-badge doc-badge-type">${fmtBytes(doc.size_bytes)}</span>`:''}</div></div><button class="btn-dl" data-docid="${doc.id}">⬇ Download</button>${moveBtn}</div>`;
              });
            }
            y += `</div></div>`;
          });
          y += `</div></div>`;
          return y;
        }

        recentYears.forEach(yr => { s += renderOneYearWithCats(yr); });
        const prevCount = prevYears.reduce((n, yr) => n + sectionDocs.filter(d => (d.year||'') === yr).length, 0);
        s += `<div class="year-folder" style="margin-bottom:0.4rem;">
          <div class="year-header">
            <span class="yr-label">📂 Previous Years <span class="yr-count">${prevCount}</span></span>
            <span class="yr-chevron">▼</span>
          </div>
          <div class="year-body" style="padding-left:0.5rem;">${prevYears.map(yr => renderOneYearWithCats(yr)).join('')}</div>
        </div>`;
        s += `</div>`;
        return s;
      }

      let html = '';

      // Personal docs only — company docs live in their own business tabs
      const personalDocs = (_docs || []).filter(d => d.owner_type === 'person');
      html += renderSideBySide(personalDocs, false, null);

      container.innerHTML = html;

      // Year toggle
      container.querySelectorAll('.year-header').forEach(h => {
        h.addEventListener('click', () => {
          h.closest('.year-folder').classList.toggle('open');
        });
      });

      // Clicking doc name opens it
      container.querySelectorAll('.doc-name-link').forEach(nameEl => {
        nameEl.addEventListener('click', (e) => {
          e.stopPropagation();
          const btn = nameEl.closest('.doc-row').querySelector('.btn-dl');
          downloadDoc(parseInt(nameEl.dataset.docid), btn || { disabled: false, textContent: '' });
        });
      });
      // Clicking download button
      container.querySelectorAll('.btn-dl').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadDoc(parseInt(btn.dataset.docid), btn);
        });
      });
      // Section-level upload buttons
      container.querySelectorAll('.btn-section-upload').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const coId = btn.dataset.companyId || '';
          openUploadModal(coId ? parseInt(coId) : null);
        });
      });
      // Move buttons on client_uploaded docs
      container.querySelectorAll('.btn-move').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openMoveModal(parseInt(btn.dataset.docid), btn.dataset.docname, btn.dataset.year, btn.dataset.cat);
        });
      });
    }

    async function downloadDoc(docId, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const data = await api(`/portal/documents/${docId}/download`);
        window.open(data.url, '_blank');
        btn.textContent = '✓ Done';
        // Re-fetch docs to update viewed badges
        setTimeout(async () => {
          try {
            _docs = await api('/portal/documents').catch(() => _docs);
            renderDocuments();
          } catch (e) {}
        }, 800);
      } catch (e) {
        btn.textContent = '✕ Error';
        setTimeout(() => { btn.disabled = false; btn.textContent = '📂 Open'; }, 2000);
      }
    }

    function renderDLOrganizerCard(wrap, data, year) {
      const { organizer, items, progress } = data;
      const statusColors = { pending: 'var(--muted)', in_progress: 'var(--gold)', submitted: 'var(--green)', reviewed: 'var(--green)' };
      const statusLabels = { pending: 'Not Started', in_progress: 'In Progress', submitted: 'Submitted ✓', reviewed: 'Reviewed ✓' };
      const color = statusColors[organizer.status] || 'var(--muted)';
      const label = statusLabels[organizer.status] || organizer.status;
      const isSubmitted = ['submitted', 'reviewed'].includes(organizer.status);

      // Recent items (last 4 resolved + first 2 pending)
      const actionable = items.filter(i => !i.sentinel_provides);
      const recentResolved = actionable.filter(i => i.status !== 'pending').slice(-3);
      const nextPending = actionable.filter(i => i.status === 'pending').slice(0, 2);
      const previewItems = [...recentResolved, ...nextPending].slice(0, 5);

      const previewHtml = previewItems.map(item => {
        const icon = item.status === 'uploaded' ? '✓' : item.status === 'not_this_year' ? '–' : '⏳';
        const color = item.status === 'uploaded' ? 'var(--green)' : item.status === 'not_this_year' ? 'var(--muted)' : 'var(--orange)';
        return `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;font-size:0.82rem;">

          <span style="color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(item.payer_name)}</span>
          <span style="color:var(--muted);font-size:0.72rem;">${item.section.toUpperCase()}</span>
        </div>`;
      }).join('');

      wrap.innerHTML = `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:0.5rem;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
            <div>
              <div style="font-size:1rem;font-weight:700;color:var(--text);">📋 ${year} Tax Organizer</div>
              <div style="font-size:0.78rem;color:${color};font-weight:600;margin-top:0.2rem;">${label}</div>
            </div>
            ${!isSubmitted ? `
            <div style="display:flex;align-items:center;gap:1rem;">
              <div style="text-align:right;">
                <div style="font-size:1.1rem;font-weight:700;color:var(--text);">${progress.resolved}<span style="font-size:0.78rem;font-weight:400;color:var(--muted);"> / ${progress.total}</span></div>
                <div style="font-size:0.72rem;color:var(--muted);">items resolved</div>
              </div>
              <div style="width:90px;">
                <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
                  <div style="height:100%;width:${progress.percent}%;background:var(--green);border-radius:3px;transition:width 0.3s;"></div>
                </div>
              </div>
            </div>
            ` : `<div style="color:var(--green);font-size:0.88rem;">All ${progress.total} items resolved</div>`}
          </div>
          ${previewItems.length ? `<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:0.75rem;margin-bottom:0.75rem;">${previewHtml}</div>` : ''}
          <a href="/organizer.html?year=${year}" class="btn-organizer" style="display:inline-block;text-decoration:none;">
            ${isSubmitted ? 'View Summary →' : progress.resolved > 0 ? 'Continue Organizer →' : 'Start Organizer →'}
          </a>
        </div>
      `;
    }

            <a class="btn-organizer" href="/organizer.html">

            </a>
          </div>

          <div class="organizer-card">
            <div class="oc-icon">👤</div>
            <div>
              <div class="oc-label">Personal</div>
              <div class="oc-name">${escHtml(firstName)}'s Tax Organizer</div>
            </div>
            <a class="btn-organizer" href="/organizer.html">
              Start Organizer →
            </a>
