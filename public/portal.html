<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Client Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #20243a;
      --gold: #c9a84c;
      --gold-light: #e2c068;
      --text: #e8e8e8;
      --muted: #8a8fa8;
      --border: #2a2d3a;
      --green: #3ecf8e;
      --red: #e05555;
      --input-bg: #12151f;
      --nav-h: 62px;
      --tab-h: 50px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ─────────────────────────────────────────── */
    .topnav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: var(--nav-h);
      position: sticky;
      top: 0;
      z-index: 200;
      gap: 1rem;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .nav-firm {
      font-size: 0.78rem;
      color: var(--muted);
      border-left: 1px solid var(--border);
      padding-left: 0.65rem;
      margin-left: 0.35rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .nav-user {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    @media (max-width: 480px) { .nav-user { display: none; } }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TAB BAR ─────────────────────────────────────────── */
    .tab-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0 1.25rem;
      height: var(--tab-h);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-btn:hover { color: var(--text); }

    /* ── MAIN ────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARDS ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── SKELETON ─────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #353845 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── WELCOME ─────────────────────────────────────────── */
    .welcome-card {
      background: linear-gradient(135deg, #1a1d27 0%, #1e2236 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .welcome-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 160px; height: 100%;
      background: radial-gradient(ellipse at right center, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .welcome-card h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .welcome-card .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.1rem;
    }

    .status-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.76rem;
      border-radius: 20px;
      padding: 0.22rem 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .badge-gold {
      background: rgba(201,168,76,0.14);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.28);
    }

    .badge-green {
      background: rgba(62,207,142,0.12);
      color: var(--green);
      border: 1px solid rgba(62,207,142,0.25);
    }

    .badge-muted {
      background: rgba(138,143,168,0.1);
      color: var(--muted);
      border: 1px solid rgba(138,143,168,0.2);
    }

    /* ── QUICK LINKS ──────────────────────────────────────── */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .quick-link {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
    }

    .quick-link:hover { border-color: var(--gold); background: rgba(201,168,76,0.04); }

    .ql-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }

    .ql-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .ql-desc { font-size: 0.76rem; color: var(--muted); }

    /* ── COMPANY CARDS ────────────────────────────────────── */
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 0.85rem;
    }

    .company-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }

    .company-card .co-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .company-card .co-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .company-card .co-badges {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    /* ── DOCUMENTS ────────────────────────────────────────── */
    .docs-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .btn-upload {
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.86rem;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-upload:hover { background: var(--gold-light); }

    /* Year folder */
    .year-folder {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .year-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .year-header:hover { background: rgba(255,255,255,0.03); }

    .year-header .yr-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .yr-count {
      font-size: 0.72rem;
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 0.1rem 0.5rem;
      font-weight: 600;
    }

    .yr-chevron {
      color: var(--muted);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .year-folder.open .yr-chevron { transform: rotate(180deg); }

    .year-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .year-folder.open .year-body { display: block; }

    /* Section heading inside year */
    .section-heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 0.6rem 1.1rem 0.3rem;
    }

    /* Doc row */
    .doc-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.1rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .doc-row:hover { background: rgba(255,255,255,0.03); }

    .doc-icon { font-size: 1.25rem; flex-shrink: 0; }

    .doc-info { flex: 1; min-width: 0; }

    .doc-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.25rem;
    }

    .doc-badge {
      font-size: 0.68rem;
      border-radius: 20px;
      padding: 0.1rem 0.45rem;
      font-weight: 600;
    }

    .doc-badge-type { background: rgba(138,143,168,0.12); color: var(--muted); border: 1px solid rgba(138,143,168,0.2); }
    .doc-badge-new { background: rgba(201,168,76,0.16); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .doc-badge-viewed { background: rgba(62,207,142,0.1); color: var(--green); border: 1px solid rgba(62,207,142,0.25); }
    .doc-badge-client { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }

    .btn-dl {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-dl:hover { border-color: var(--gold); color: var(--gold); }
    .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2.5rem 1rem;
    }

    .empty-state .ei { font-size: 2.2rem; margin-bottom: 0.6rem; }

    /* ── UPLOAD MODAL ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.75rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.03em;
    }

    .form-group select,
    .form-group input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.93rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .form-group select:focus,
    .form-group input[type="text"]:focus { border-color: var(--gold); }

    .file-drop {
      border: 2px dashed var(--border);
      border-radius: 9px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }

    .file-drop input[type="file"] {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .selected-file {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--gold);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.88rem;
      border-radius: 7px;
      padding: 0.55rem 1rem;
      cursor: pointer;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-submit {
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      border-radius: 7px;
      padding: 0.55rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: var(--gold-light); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .upload-msg { font-size: 0.8rem; color: var(--green); margin-top: 0.5rem; }
    .upload-err { font-size: 0.8rem; color: var(--red); margin-top: 0.5rem; }

    /* ── ORGANIZERS ───────────────────────────────────────── */
    .organizer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .organizer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .organizer-card .oc-icon { font-size: 1.8rem; }

    .organizer-card .oc-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .organizer-card .oc-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .btn-organizer {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--gold);
      color: #0f1117;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      border-radius: 7px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-organizer:hover { background: var(--gold-light); }

    .organizer-pending {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── MESSAGES ─────────────────────────────────────────── */
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 200px);
      max-height: 650px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .chat-bubble {
      max-width: 75%;
      padding: 0.6rem 0.9rem;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-bubble.client {
      align-self: flex-end;
      background: var(--gold);
      color: #0f1117;
    }
    .chat-bubble.staff {
      align-self: flex-start;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .chat-bubble-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .chat-bubble-wrap.client { display: flex; flex-direction: column; align-items: flex-end; }
    .chat-bubble-wrap.staff { display: flex; flex-direction: column; align-items: flex-start; }
    .chat-input-bar {
      padding: 0.75rem 1rem;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .chat-input-bar textarea {
      flex: 1;
      resize: none;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      min-height: 42px;
      max-height: 120px;
    }
    .chat-input-bar textarea:focus { outline: none; border-color: var(--gold); }
    .chat-send-btn {
      background: var(--gold);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
    }
    .chat-send-btn:hover { opacity: 0.9; }
    .chat-empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
    .chat-attach-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.5rem 0.7rem; font-size: 1rem; cursor: pointer; align-self: flex-end; transition: all 0.15s; }
    .chat-attach-btn:hover { color: var(--text); border-color: var(--gold); }
    .chat-attach-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.4rem 1rem 0; }
    .chat-attach-chip { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; color: var(--text); }
    .chat-attach-chip button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 0; line-height: 1; }
    .chat-attach-chip button:hover { color: #e55; }
    .msg-attachments { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .attachment-chip { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; color: var(--text); text-decoration: none; }
    .attachment-chip:hover { border-color: var(--gold); color: var(--gold); }
    .att-size { color: var(--muted); font-size: 0.7rem; }
    .unread-badge-tab { display: inline-flex; align-items: center; justify-content: center; background: var(--gold); color: #0f1117; border-radius: 10px; padding: 0.1rem 0.45rem; font-size: 0.68rem; font-weight: 700; margin-left: 0.4rem; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <a class="nav-brand" href="/portal">
      <span class="nav-logo-text">DarkLion</span>
      <span class="nav-firm" id="navFirm">Client Portal</span>
    </a>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="overview">📋 Overview</button>
    <button class="tab-btn" data-tab="documents">📁 Documents</button>
    <button class="tab-btn" data-tab="organizers">🔗 Organizers</button>
    <button class="tab-btn" data-tab="messages">💬 Messages</button>
  </div>

  <main>

    <!-- ── OVERVIEW TAB ──────────────────────────────────── -->
    <div class="tab-panel active" id="tab-overview">

      <!-- Skeleton -->
      <div id="overview-loading">
        <div class="welcome-card">
          <div class="skeleton" style="width:220px; height:1.65rem; margin-bottom:0.5rem;"></div>
          <div class="skeleton" style="width:150px; height:0.9rem;"></div>
        </div>
        <div class="card">
          <div class="skeleton" style="width:100px; height:0.75rem; margin-bottom:1rem;"></div>
          <div class="skeleton" style="height:1rem; margin-bottom:0.5rem;"></div>
          <div class="skeleton" style="width:75%; height:1rem;"></div>
        </div>
      </div>

      <!-- Loaded content -->
      <div id="overview-content" style="display:none;">
        <!-- Welcome card -->
        <div class="welcome-card">
          <h1 id="welcomeHeading">Welcome back</h1>
          <p class="sub" id="welcomeSub"></p>
          <div class="status-badges" id="statusBadges"></div>
        </div>

        <!-- Quick links -->
        <div class="quick-links" id="quickLinks"></div>

        <!-- Companies -->
        <div class="card" id="companiesCard" style="display:none;">
          <div class="card-title">Your Companies</div>
          <div class="company-grid" id="companyGrid"></div>
        </div>
      </div>
    </div>

    <!-- ── DOCUMENTS TAB ──────────────────────────────────── -->
    <div class="tab-panel" id="tab-documents">
      <div class="docs-toolbar">
        <div style="font-size:0.95rem; color:var(--muted);">Your delivered documents</div>
        <button class="btn-upload" id="openUploadBtn">⬆ Upload Document</button>
      </div>
      <div id="docsContainer">
        <div class="empty-state">
          <div class="ei">📁</div>
          <div>Loading documents…</div>
        </div>
      </div>
    </div>

    <!-- ── ORGANIZERS TAB ─────────────────────────────────── -->
    <div class="tab-panel" id="tab-organizers">
      <div style="font-size:0.95rem; color:var(--muted); margin-bottom:1.25rem;">Tax organizer links from your advisory team</div>
      <div class="organizer-grid" id="organizerGrid">
        <div class="empty-state">
          <div class="ei">🔗</div>
          <div>Loading organizers…</div>
        </div>
      </div>
    </div>

    <!-- ── MESSAGES TAB ───────────────────────────────────── -->
    <div class="tab-panel" id="tab-messages">
      <div class="chat-wrap" id="chatWrap">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-empty" id="chatEmpty">Loading messages…</div>
        </div>
        <div class="chat-attach-chips" id="chatAttachChips"></div>
        <input type="file" id="chatAttachInput" multiple style="display:none;" onchange="handleChatAttach(this.files)">
        <div class="chat-input-bar">
          <button class="chat-attach-btn" onclick="document.getElementById('chatAttachInput').click()" title="Attach files">📎</button>
          <textarea id="chatInput" placeholder="Write a message to your advisor…" rows="1"></textarea>
          <button class="chat-send-btn" id="chatSendBtn">Send</button>
        </div>
      </div>
    </div>

  </main>

  <!-- UPLOAD MODAL -->
  <div class="modal-overlay hidden" id="uploadModal">
    <div class="modal">
      <h2>Upload a Document</h2>
      <div class="form-group">
        <label>Tax Year</label>
        <select id="uploadYear"></select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="uploadCategory">
          <option value="tax">Tax</option>
          <option value="bookkeeping">Bookkeeping</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>File</label>
        <div class="file-drop" id="fileDrop">
          <input type="file" id="fileInput" />
          <span>Click to select or drag a file here</span>
          <div class="selected-file" id="selectedFileName"></div>
        </div>
      </div>
      <div class="upload-err" id="uploadErr" style="display:none;"></div>
      <div class="upload-msg" id="uploadMsg" style="display:none;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="closeUploadBtn">Cancel</button>
        <button class="btn-submit" id="doUploadBtn" disabled>Upload</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const token = localStorage.getItem('portalToken');
    if (!token) { window.location.href = '/portal-login'; return; }

    // ── State ─────────────────────────────────────────────
    let _me = null, _companies = [], _docs = [], _stanford = null;
    let _selectedFile = null;

    // ── Auth fetch ────────────────────────────────────────
    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: {
          'Authorization': `Bearer ${token}`,
          ...(opts.headers || {}),
        },
      });
      if (res.status === 401) {
        localStorage.removeItem('portalToken');
        window.location.href = '/portal-login';
        throw new Error('Unauthorized');
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function escHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Tabs ─────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        if (tab === 'organizers' && _stanford === null) loadOrganizers();
        if (tab === 'messages') initChat();
      });
    });

    // ── Logout ────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('portalToken');
      window.location.href = '/portal-login';
    });

    // ── INIT ─────────────────────────────────────────────
    async function init() {
      try {
        [_me, _companies, _docs] = await Promise.all([
          api('/portal/me'),
          api('/portal/companies').catch(() => []),
          api('/portal/documents').catch(() => []),
        ]);

        const fullName = `${_me.firstName || ''} ${_me.lastName || ''}`.trim();
        document.title = `${fullName} — Client Portal`;
        document.getElementById('navUser').textContent = fullName;

        // Load firm name
        try {
          const fi = await fetch('/portal-auth/firm-info').then(r => r.json());
          if (fi.firmName) {
            document.getElementById('navFirm').textContent = fi.firmName;
          }
        } catch (e) { /* silent */ }

        renderOverview();
        renderDocuments();

        document.getElementById('overview-loading').style.display = 'none';
        document.getElementById('overview-content').style.display = 'block';
      } catch (err) {
        if (err.message !== 'Unauthorized') {
          console.error('Portal init error:', err);
          document.getElementById('overview-loading').innerHTML =
            '<div class="empty-state"><div class="ei">⚠️</div><div>Unable to load portal. Please refresh.</div></div>';
        }
      }
    }

    // ── OVERVIEW ─────────────────────────────────────────
    function renderOverview() {
      const firstName = _me.firstName || 'there';
      document.getElementById('welcomeHeading').textContent = `Welcome back, ${firstName}`;
      document.getElementById('welcomeSub').textContent = _me.email || '';

      // Status badges
      const badges = document.getElementById('statusBadges');
      if (_me.filingStatus) {
        badges.innerHTML += `<span class="badge badge-gold">📋 ${escHtml(_me.filingStatus)}</span>`;
      }
      const newDocs = _docs.filter(d => !d.viewed_at).length;
      if (newDocs > 0) {
        badges.innerHTML += `<span class="badge badge-gold">🆕 ${newDocs} new document${newDocs > 1 ? 's' : ''}</span>`;
      }
      if (_companies.length > 0) {
        badges.innerHTML += `<span class="badge badge-muted">🏢 ${_companies.length} compan${_companies.length > 1 ? 'ies' : 'y'}</span>`;
      }

      // Quick links
      const ql = document.getElementById('quickLinks');
      ql.innerHTML = `
        <a class="quick-link" href="#" data-goto="documents">
          <div class="ql-icon">📁</div>
          <div class="ql-label">Documents</div>
          <div class="ql-desc">${_docs.length} file${_docs.length !== 1 ? 's' : ''} delivered</div>
        </a>
        <a class="quick-link" href="#" data-goto="organizers">
          <div class="ql-icon">🔗</div>
          <div class="ql-label">Tax Organizers</div>
          <div class="ql-desc">View &amp; complete</div>
        </a>
      `;

      ql.querySelectorAll('[data-goto]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const btn = document.querySelector(`.tab-btn[data-tab="${a.dataset.goto}"]`);
          if (btn) btn.click();
        });
      });

      // Companies
      if (_companies.length > 0) {
        const grid = document.getElementById('companyGrid');
        grid.innerHTML = _companies.map(c => `
          <div class="company-card">
            <div class="co-name">${escHtml(c.company_name)}</div>
            <div class="co-meta">${escHtml(c.entity_type || '')}${c.ownership_pct ? ` · ${c.ownership_pct}% ownership` : ''}</div>
            <div class="co-badges">
              <span class="badge badge-muted">${escHtml(c.access_level || 'full access')}</span>
            </div>
          </div>
        `).join('');
        document.getElementById('companiesCard').style.display = 'block';
      }
    }

    // ── DOCUMENTS ────────────────────────────────────────
    const DOC_ICONS = {
      tax_return: '📋', tax: '📋', w2: '📄', '1099': '📄',
      engagement_letter: '✍️', organizer: '📝', statement: '🏦',
      bookkeeping: '📊', other: '📎',
    };

    function docIcon(type) { return DOC_ICONS[String(type).toLowerCase()] || '📎'; }

    function fmtBytes(b) {
      if (!b) return '';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    function renderDocuments() {
      const container = document.getElementById('docsContainer');

      // Build company name map
      const coMap = {};
      _companies.forEach(c => { coMap[c.id] = c.company_name; });

      const currentYear = new Date().getFullYear();
      const years = [];
      for (let y = currentYear; y >= 2018; y--) years.push(String(y));

      const DOC_CATEGORIES = [
        { key: 'tax', label: 'Tax', icon: '🧾' },
        { key: 'other', label: 'Other', icon: '📎' },
      ];

      // Render a full folder section with year/category hierarchy
      // Recent 2 years shown, rest under "Previous Years"
      function renderSection(sectionKey, sectionLabel, sectionIcon, sourceDocs) {
        const sectionDocs = (sourceDocs || _docs || []).filter(d => (d.folder_section || 'firm_uploaded') === sectionKey);
        const recentYears = years.slice(0, 2);
        const prevYears = years.slice(2);

        function renderOneYear(yr) {
          const yrDocs = sectionDocs.filter(d => (d.year || '') === yr);
          const hasNew = yrDocs.some(d => !d.viewed_at);
          const open = yrDocs.length > 0;
          let y = `<div class="year-folder${open ? ' open' : ''}" style="margin-bottom:0.4rem;">
            <div class="year-header" onclick="this.closest('.year-folder').classList.toggle('open')">
              <span class="yr-label">📅 ${yr} <span class="yr-count">${yrDocs.length}</span>${hasNew ? ' <span style="color:var(--gold);font-size:0.65rem;">NEW</span>' : ''}</span>
              <span class="yr-chevron">▼</span>
            </div>
            <div class="year-body" style="padding-left:1rem;">`;
          DOC_CATEGORIES.forEach(cat => {
            const catDocs = yrDocs.filter(d => (d.folder_category || 'other') === cat.key);
            y += `<div style="margin-bottom:0.25rem;"><div style="font-size:0.72rem;font-weight:600;color:var(--muted);padding:0.2rem 0;">${cat.icon} ${cat.label} (${catDocs.length})</div><div style="padding-left:0.75rem;">`;
            if (catDocs.length === 0) {
              y += `<div style="color:var(--muted);font-size:0.78rem;font-style:italic;padding:0.2rem 0;">Empty</div>`;
            } else {
              catDocs.forEach(doc => {
                const isNew = !doc.viewed_at;
                y += `<div class="doc-row"><span class="doc-icon">${docIcon(doc.doc_type)}</span><div class="doc-info"><div class="doc-name">${escHtml(doc.display_name||'Document')}</div><div class="doc-badges">${isNew?'<span class="doc-badge doc-badge-new">✦ NEW</span>':'<span class="doc-badge doc-badge-viewed">✓ Viewed</span>'}${doc.size_bytes?`<span class="doc-badge doc-badge-type">${fmtBytes(doc.size_bytes)}</span>`:''}</div></div><button class="btn-dl" data-docid="${doc.id}">⬇ Download</button></div>`;
              });
            }
            y += `</div></div>`;
          });
          y += `</div></div>`;
          return y;
        }

        let s = `<div style="margin-bottom:1.5rem;">
          <div style="font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);">${sectionIcon} ${sectionLabel} <span style="font-size:0.75rem;font-weight:400;color:var(--muted);">(${sectionDocs.length})</span></div>`;

        recentYears.forEach(yr => { s += renderOneYear(yr); });

        // Previous Years
        const prevCount = prevYears.reduce((n, yr) => n + sectionDocs.filter(d => (d.year||'') === yr).length, 0);
        s += `<div class="year-folder" style="margin-bottom:0.4rem;">
          <div class="year-header" onclick="this.closest('.year-folder').classList.toggle('open')">
            <span class="yr-label">📂 Previous Years <span class="yr-count">${prevCount}</span></span>
            <span class="yr-chevron">▼</span>
          </div>
          <div class="year-body" style="padding-left:0.5rem;">${prevYears.map(yr => renderOneYear(yr)).join('')}</div>
        </div>`;

        s += `</div>`;
        return s;
      }

      let html = '';

      // Personal docs first
      const personalDocs = (_docs || []).filter(d => d.owner_type === 'person');
      const companyDocs = (_docs || []).filter(d => d.owner_type === 'company');

      if (personalDocs.length > 0 || true) { // always show personal sections
        html += `<div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.5rem;">👤 My Documents</div>`;
        html += renderSection('firm_uploaded', 'Delivered by Your Advisor', '📁', personalDocs);
        html += renderSection('client_uploaded', 'Uploaded by You', '📤', personalDocs);
      }

      // Group company docs by company
      const byCompany = {};
      companyDocs.forEach(d => {
        const cid = d.owner_id;
        if (!byCompany[cid]) byCompany[cid] = [];
        byCompany[cid].push(d);
      });

      Object.entries(byCompany).forEach(([cid, docs]) => {
        const co = _companies.find(c => c.id == cid || c.company_id == cid);
        const coName = co ? (co.company_name || co.name) : `Company #${cid}`;
        html += `<div style="font-size:1rem;font-weight:700;color:var(--text);margin:1.25rem 0 0.5rem;">🏢 ${escHtml(coName)}</div>`;
        html += renderSection('firm_uploaded', 'Delivered by Your Advisor', '📁', docs);
        html += renderSection('client_uploaded', 'Uploaded by You', '📤', docs);
      });

      if (!html) {
        html = '<div class="empty-state"><div class="ei">📁</div><div>No documents yet. Your advisor will deliver documents here.</div></div>';
      }

      container.innerHTML = html;

      // Year toggle
      container.querySelectorAll('.year-header').forEach(h => {
        h.addEventListener('click', () => {
          h.closest('.year-folder').classList.toggle('open');
        });
      });

      // Download buttons
      container.querySelectorAll('.btn-dl').forEach(btn => {
        btn.addEventListener('click', () => downloadDoc(parseInt(btn.dataset.docid), btn));
      });
    }

    async function downloadDoc(docId, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const data = await api(`/portal/documents/${docId}/download`);
        window.open(data.url, '_blank');
        btn.textContent = '✓ Done';
        // Re-fetch docs to update viewed badges
        setTimeout(async () => {
          try {
            _docs = await api('/portal/documents').catch(() => _docs);
            renderDocuments();
          } catch (e) {}
        }, 800);
      } catch (e) {
        btn.textContent = '✕ Error';
        setTimeout(() => { btn.disabled = false; btn.textContent = '⬇ Download'; }, 2000);
      }
    }

    // ── ORGANIZERS ────────────────────────────────────────
    async function loadOrganizers() {
      const grid = document.getElementById('organizerGrid');
      grid.innerHTML = '<div class="empty-state"><div class="ei">⏳</div><div>Loading…</div></div>';
      try {
        _stanford = await api('/portal/stanford-tax');
      } catch (e) {
        _stanford = { personal_url: null, companies: [] };
      }
      renderOrganizers();
    }

    function renderOrganizers() {
      const grid = document.getElementById('organizerGrid');
      const cards = [];

      // Personal card
      const firstName = _me?.firstName || 'My';
      if (_stanford?.personal_url) {
        cards.push(`
          <div class="organizer-card">
            <div class="oc-icon">👤</div>
            <div>
              <div class="oc-label">Personal</div>
              <div class="oc-name">${escHtml(firstName)}'s Tax Organizer</div>
            </div>
            <a class="btn-organizer" href="${escHtml(_stanford.personal_url)}" target="_blank" rel="noopener">
              Open My Organizer →
            </a>
          </div>
        `);
      } else {
        cards.push(`
          <div class="organizer-card">
            <div class="oc-icon">👤</div>
            <div>
              <div class="oc-label">Personal</div>
              <div class="oc-name">${escHtml(firstName)}'s Tax Organizer</div>
            </div>
            <p class="organizer-pending">Your organizer link will appear here when ready.</p>
          </div>
        `);
      }

      // Company cards
      (_stanford?.companies || []).forEach(co => {
        cards.push(`
          <div class="organizer-card">
            <div class="oc-icon">🏢</div>
            <div>
              <div class="oc-label">Business</div>
              <div class="oc-name">${escHtml(co.company_name)}</div>
            </div>
            <a class="btn-organizer" href="${escHtml(co.url)}" target="_blank" rel="noopener">
              Open Organizer →
            </a>
          </div>
        `);
      });

      if (!cards.length) {
        grid.innerHTML = '<div class="empty-state"><div class="ei">🔗</div><div>No organizer links available yet.</div></div>';
      } else {
        grid.innerHTML = cards.join('');
      }
    }

    // ── UPLOAD ────────────────────────────────────────────
    const modal = document.getElementById('uploadModal');
    const fileInput = document.getElementById('fileInput');
    const fileDrop = document.getElementById('fileDrop');

    // Populate year select
    const yearSel = document.getElementById('uploadYear');
    const curYear = new Date().getFullYear();
    for (let y = curYear; y >= 2018; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      yearSel.appendChild(opt);
    }

    document.getElementById('openUploadBtn').addEventListener('click', () => {
      modal.classList.remove('hidden');
      document.getElementById('uploadErr').style.display = 'none';
      document.getElementById('uploadMsg').style.display = 'none';
      document.getElementById('selectedFileName').textContent = '';
      document.getElementById('doUploadBtn').disabled = true;
      _selectedFile = null;
    });

    document.getElementById('closeUploadBtn').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    modal.addEventListener('click', e => {
      if (e.target === modal) modal.classList.add('hidden');
    });

    fileDrop.addEventListener('click', () => fileInput.click());

    fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(f) {
      _selectedFile = f;
      document.getElementById('selectedFileName').textContent = f.name;
      document.getElementById('doUploadBtn').disabled = false;
    }

    document.getElementById('doUploadBtn').addEventListener('click', async () => {
      if (!_selectedFile) return;
      const btn = document.getElementById('doUploadBtn');
      const errEl = document.getElementById('uploadErr');
      const msgEl = document.getElementById('uploadMsg');

      btn.disabled = true;
      btn.textContent = 'Uploading…';
      errEl.style.display = 'none';
      msgEl.style.display = 'none';

      try {
        const fd = new FormData();
        fd.append('file', _selectedFile);
        fd.append('year', yearSel.value);
        fd.append('folder_category', document.getElementById('uploadCategory').value);

        const res = await fetch('/portal/upload', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: fd,
        });

        if (res.status === 401) {
          localStorage.removeItem('portalToken');
          window.location.href = '/portal-login';
          return;
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');

        msgEl.textContent = '✓ File uploaded successfully!';
        msgEl.style.display = 'block';

        // Refresh docs
        setTimeout(async () => {
          _docs = await api('/portal/documents').catch(() => _docs);
          renderDocuments();
          modal.classList.add('hidden');
        }, 1200);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Upload';
      }
    });

    // ── Chat / Messages ───────────────────────────────────
    let _chatLoaded = false;
    let _chatAllMessages = [];
    let _chatAttachFiles = [];

    async function initChat() {
      if (_chatLoaded) return;
      _chatLoaded = true;
      await loadAllMessages();
    }

    async function loadAllMessages() {
      const token = localStorage.getItem('portalToken');
      if (!token) return;
      try {
        // Load all threads
        const threadsRes = await fetch('/portal/messages', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!threadsRes.ok) throw new Error(`Messages API error ${threadsRes.status}`);
        const threads = await threadsRes.json();
        if (!Array.isArray(threads) || !threads.length) {
          const el = document.getElementById('chatEmpty');
          if (el) { el.style.display = 'block'; el.textContent = 'No messages yet. Send a message below to get started!'; }
          return;
        }

        // Load all thread messages and flatten into one conversation
        _chatAllMessages = [];
        for (const thread of threads) {
          const res = await fetch(`/portal/messages/${thread.id}`, { headers: { 'Authorization': 'Bearer ' + token } });
          const data = await res.json();
          if (data.messages) {
            _chatAllMessages.push(...data.messages.map(m => ({ ...m, threadSubject: thread.subject })));
          }
        }

        // Sort by date
        _chatAllMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        renderChatMessages();

        // Update tab unread badge
        const unread = threads.reduce((acc, t) => acc + (t.unreadCount || 0), 0);
        updateChatBadge(unread);
      } catch (e) {
        console.error('[portal messages] load error:', e);
        const el = document.getElementById('chatEmpty');
        if (el) el.textContent = 'Error: ' + e.message;
      }
    }

    function chatFormatBytes(b) {
      if (!b) return '0 B';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }

    function handleChatAttach(fileList) {
      for (const f of Array.from(fileList)) {
        if (_chatAttachFiles.length >= 8) { alert('Maximum 8 files per message'); break; }
        _chatAttachFiles.push(f);
      }
      document.getElementById('chatAttachInput').value = '';
      renderChatAttachChips();
    }

    function removeChatAttachFile(idx) {
      _chatAttachFiles.splice(idx, 1);
      renderChatAttachChips();
    }

    function renderChatAttachChips() {
      const el = document.getElementById('chatAttachChips');
      if (!el) return;
      el.innerHTML = _chatAttachFiles.map((f, i) =>
        `<span class="chat-attach-chip">📎 ${chatEsc(f.name)} <button onclick="removeChatAttachFile(${i})">×</button></span>`
      ).join('');
    }

    async function downloadPortalAttachment(documentId) {
      const token = localStorage.getItem('portalToken');
      try {
        const res = await fetch(`/portal/attachments/${documentId}/download`, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const data = await res.json();
        if (data.url) window.open(data.url, '_blank');
        else alert('Download failed');
      } catch(e) { alert('Failed to download attachment'); }
    }

    function renderChatMessages() {
      const container = document.getElementById('chatMessages');
      if (!_chatAllMessages.length) {
        container.innerHTML = '<div class="chat-empty">No messages yet. Send a message below!</div>';
        return;
      }
      container.innerHTML = _chatAllMessages.map(m => {
        const isClient = m.sender_type === 'client';
        const side = isClient ? 'client' : 'staff';
        const time = new Date(m.created_at).toLocaleString();
        const attachmentsHtml = (m.attachments || []).length > 0
          ? `<div class="msg-attachments">${(m.attachments).map(a => {
              const size = a.sizeBytes ? ' <span class="att-size">(' + chatFormatBytes(a.sizeBytes) + ')</span>' : '';
              return `<a class="attachment-chip" href="#" onclick="downloadPortalAttachment(${a.documentId});return false;">📎 ${chatEsc(a.displayName)}${size}</a>`;
            }).join('')}</div>`
          : '';
        return `<div class="chat-bubble-wrap ${side}">
          <div class="chat-bubble ${side}">${m.body ? chatEsc(m.body) : ''}${attachmentsHtml}</div>
          <div class="chat-bubble-meta">${time}</div>
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessage() {
      const input = document.getElementById('chatInput');
      const body = input.value.trim();
      if (!body && _chatAttachFiles.length === 0) return;
      const token = localStorage.getItem('portalToken');
      try {
        input.disabled = true;
        const fd = new FormData();
        fd.append('body', body);
        _chatAttachFiles.forEach(f => fd.append('files', f));
        const res = await fetch('/portal/messages/send', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: fd,
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || `Server error ${res.status}`);
        }
        input.value = '';
        _chatAttachFiles = [];
        renderChatAttachChips();
        _chatLoaded = false;
        await loadAllMessages();
      } catch (e) {
        alert('Failed to send message: ' + e.message);
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    function updateChatBadge(count) {
      const btn = document.querySelector('.tab-btn[data-tab="messages"]');
      if (!btn) return;
      const existing = btn.querySelector('.unread-badge-tab');
      if (existing) existing.remove();
      if (count > 0) {
        btn.insertAdjacentHTML('beforeend', `<span class="unread-badge-tab">${count}</span>`);
      }
    }

    function chatEsc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    // ── Wire UI events first (independent of init, always safe) ─────
    (function wireEvents() {
      const chatInput = document.getElementById('chatInput');
      const chatSendBtn = document.getElementById('chatSendBtn');

      if (chatInput) {
        chatInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendChatMessage();
          }
        });
      }
      if (chatSendBtn) {
        chatSendBtn.addEventListener('click', function() {
          sendChatMessage();
        });
      }
    })();

    // ── KICK OFF ─────────────────────────────────────────
    init().catch(function(e) {
      console.error('[portal] init error:', e);
    });

  })();
  </script>
</body>
</html>
