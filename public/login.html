<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DarkLion">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <title>Sign In — DarkLion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1923;
      --navy-deep: #080f17;
      --charcoal: #1c2b3a;
      --card: rgba(28, 43, 58, 0.72);
      --gold: #c9a84c;
      --gold-light: #e2c068;
      --gold-dim: rgba(201, 168, 76, 0.18);
      --text: #e8edf2;
      --muted: #8fa3b8;
      --border: rgba(201, 168, 76, 0.18);
      --border-focus: rgba(201, 168, 76, 0.7);
      --red: #f56565;
      --green: #3ecf8e;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(62,207,142,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid texture overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Brand header */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
      transition: filter 0.3s ease;
    }

    .brand-logo:hover {
      filter: drop-shadow(0 0 30px rgba(201,168,76,0.6));
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .brand-name span { color: var(--gold); }

    .brand-tagline {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
      max-width: 280px;
      line-height: 1.5;
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem 2rem;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.06),
        0 20px 60px rgba(0,0,0,0.5),
        0 4px 20px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.45rem;
    }

    .input-wrap {
      position: relative;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(15, 25, 35, 0.6);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: var(--text);
      padding: 0.75rem 0.9rem;
      border-radius: 9px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12), 0 0 16px rgba(201, 168, 76, 0.08);
      background: rgba(15, 25, 35, 0.85);
    }

    input::placeholder { color: rgba(143, 163, 184, 0.5); }

    input.has-toggle {
      padding-right: 3rem;
    }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.2rem;
      font-size: 1rem;
      line-height: 1;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--gold); }

    /* Remember me row */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 0.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      user-select: none;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--gold);
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .forgot-link {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--gold); }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245, 101, 101, 0.1);
      border: 1px solid rgba(245, 101, 101, 0.3);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: var(--red);
      margin-bottom: 1.25rem;
    }

    .error-msg.visible {
      display: flex;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--gold);
      color: var(--navy-deep);
      border: none;
      border-radius: 9px;
      padding: 0.82rem 1rem;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.25);
      letter-spacing: 0.02em;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--gold-light);
      box-shadow: 0 6px 28px rgba(201, 168, 76, 0.35);
    }

    .btn-submit:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15, 25, 35, 0.3);
      border-top-color: var(--navy-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Footer link */
    .card-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .card-footer a:hover { color: var(--gold-light); }

    /* Page footer */
    .page-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(143, 163, 184, 0.4);
    }

    .page-footer a {
      color: rgba(143, 163, 184, 0.5);
      text-decoration: none;
    }

    .page-footer a:hover { color: var(--muted); }

    /* Input field error state */
    input.field-error {
      border-color: rgba(245, 101, 101, 0.5);
    }

    input.field-error:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(245, 101, 101, 0.1);
    }

    @media (max-width: 480px) {
      .card { padding: 1.75rem 1.5rem; }
      .brand-name { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="page-wrap">
    <div class="brand">
      <img src="/lion-logo.png" alt="DarkLion" class="brand-logo">
      <div>
        <div class="brand-name">Dark<span>Lion</span></div>
      </div>
      <p class="brand-tagline">AI-Native Practice Management for Tax & Accounting Firms</p>
    </div>

    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Sign in to your firm account</p>

      <div class="error-msg" id="error-msg">
        <span>⚠</span>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@yourfirm.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="has-toggle"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Show password">
              👁
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="remember">
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span id="btn-text">Sign In</span>
        </button>
      </form>

      <div class="card-footer">
        Don't have an account? <a href="/register">Create one free</a>
      </div>
    </div>

    <div class="page-footer">
      <a href="/privacy">Privacy Policy</a> &nbsp;&middot;&nbsp;
      <a href="/terms">Terms of Service</a> &nbsp;&middot;&nbsp;
      &copy; 2025 DarkLion AI
    </div>
  </div>

  <script>
    // If already logged in, go to messages (PWA start) or dashboard
    const _isPwa = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    const token = localStorage.getItem('dl_token');
    if (token) window.location.replace(_isPwa ? '/messages' : '/dashboard');

    // Restore remembered email
    const remembered = localStorage.getItem('dl_remember_email');
    if (remembered) {
      document.getElementById('email').value = remembered;
      document.getElementById('remember-me').checked = true;
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🔒';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        input.type = 'password';
        btn.textContent = '👁';
        btn.setAttribute('aria-label', 'Show password');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('visible');
      document.getElementById('email').classList.add('field-error');
      document.getElementById('password').classList.add('field-error');
    }

    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
      document.getElementById('email').classList.remove('field-error');
      document.getElementById('password').classList.remove('field-error');
    }

    function setLoading(loading) {
      const btn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span>Signing in…</span>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<span id="btn-text">Sign In</span>';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember-me').checked;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/firms/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Please try again.');
          return;
        }

        // Store JWT
        localStorage.setItem('dl_token', data.token);
        localStorage.setItem('dl_firm', JSON.stringify(data.firm));

        if (remember) {
          localStorage.setItem('dl_remember_email', email);
        } else {
          localStorage.removeItem('dl_remember_email');
        }

        window.location.replace(_isPwa ? '/messages' : '/dashboard');
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        setLoading(false);
      }
    });

    // Clear error on typing
    document.getElementById('email').addEventListener('input', clearError);
    document.getElementById('password').addEventListener('input', clearError);
  </script>
</body>
</html>
