<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipelines · DarkLion</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <style>
    :root {
      --navy: #0f1923; --charcoal: #1c2b3a; --card: #1e2f40;
      --gold: #c9a84c; --gold-light: #e2c06a;
      --text: #e8e8e8; --muted: #6a7a8a; --border: #263545;
      --input-bg: #162030;
      --green: #3ecf8e; --red: #f56565; --orange: #ed8936;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--navy); color: var(--text); line-height: 1.6; display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); background: rgba(15,25,35,0.98); border-right: 1px solid var(--border);
      position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 0.6rem; padding: 1.2rem 1rem; text-decoration: none; }
    .sidebar-brand .nav-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .sidebar-brand .nav-name span { color: var(--gold); }
    .sidebar-section { padding: 1rem 0 0.25rem 1rem; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .sidebar-nav { list-style: none; padding: 0; }
    .sidebar-nav li a { display: flex; align-items: center; gap: 0.55rem; padding: 0.55rem 1rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; border-left: 3px solid transparent; transition: all 0.15s; }
    .sidebar-nav li a:hover { color: var(--text); background: rgba(201,168,76,0.05); }
    .sidebar-nav li a.active { color: var(--gold); border-left-color: var(--gold); background: rgba(201,168,76,0.08); font-weight: 600; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
    .sidebar-footer a { display: block; text-align: center; color: var(--muted); font-size: 0.82rem; text-decoration: none; }
    .sidebar-footer a:hover { color: var(--text); }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOP HEADER ── */
    .top-header {
      position: sticky; top: 0;
      height: 56px; background: rgba(15,25,35,0.97); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem; z-index: 90;
    }
    .top-header-title { font-size: 1rem; font-weight: 700; color: var(--gold); }
    .header-spacer { flex: 1; }

    /* ── TABS ── */
    .view-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: rgba(15,25,35,0.97); padding: 0 1.5rem; position: sticky; top: 56px; z-index: 80;
    }
    .view-tab {
      padding: 0.65rem 1.2rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── CONTENT AREA ── */
    .content { flex: 1; padding: 1.5rem; overflow: auto; }

    /* ── BOARD VIEW ── */
    #view-boards { display: flex; flex-direction: column; height: 100%; }
    .board-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .board-top select, .board-top .btn { }
    .board-empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .board-empty .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .board-empty p { margin-bottom: 0.5rem; }

    .kanban-board { display: flex; gap: 1rem; overflow-x: auto; align-items: flex-start; padding-bottom: 1rem; flex: 1; }
    .kanban-col {
      min-width: 260px; max-width: 280px; flex-shrink: 0;
      background: rgba(28,43,58,0.6); border-radius: 8px; border: 1px solid var(--border);
      display: flex; flex-direction: column; max-height: calc(100vh - 200px);
    }
    .kanban-col-header {
      padding: 0.75rem 1rem 0.6rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .col-stage-name { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .col-count { font-size: 0.72rem; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 0.1rem 0.45rem; color: var(--muted); }
    .col-add-btn { font-size: 0.75rem; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0.1rem 0.3rem; border-radius: 4px; transition: all 0.15s; }
    .col-add-btn:hover { color: var(--gold); background: rgba(201,168,76,0.08); }

    .kanban-cards { padding: 0.5rem; overflow-y: auto; flex: 1; min-height: 60px; }
    .kanban-col.drag-over { background: rgba(201,168,76,0.07); border-color: var(--gold); }

    /* ── JOB CARD ── */
    .job-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.65rem 0.75rem; margin-bottom: 0.5rem; cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .job-card:hover { border-color: rgba(201,168,76,0.4); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .job-card.dragging { opacity: 0.4; }
    .job-card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; margin-bottom: 0.35rem; }
    .job-entity { font-size: 0.85rem; font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .priority-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; }
    .priority-badge.normal { background: rgba(255,255,255,0.08); color: var(--muted); }
    .priority-badge.high { background: rgba(237,137,54,0.2); color: var(--orange); }
    .priority-badge.urgent { background: rgba(245,101,101,0.2); color: var(--red); }
    .job-notes-preview { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.35rem; line-height: 1.4; }
    .job-card-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .job-days { font-size: 0.7rem; color: var(--muted); }
    .job-due { font-size: 0.7rem; color: var(--orange); }
    .job-due.overdue { color: var(--red); }
    .assignee-avatar { width: 22px; height: 22px; border-radius: 50%; background: rgba(201,168,76,0.2); color: var(--gold); font-size: 0.62rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-left: auto; flex-shrink: 0; }

    /* ── ADD JOB INLINE FORM ── */
    .add-job-form { padding: 0.5rem; border-top: 1px solid var(--border); }
    .add-job-form input, .add-job-form select {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 0.4rem 0.6rem; font-size: 0.8rem; margin-bottom: 0.4rem;
    }
    .add-job-form input:focus, .add-job-form select:focus { outline: none; border-color: var(--gold); }
    .add-job-search-results { background: #13222f; border: 1px solid var(--border); border-radius: 5px; max-height: 140px; overflow-y: auto; margin-bottom: 0.4rem; }
    .add-job-result { padding: 0.4rem 0.6rem; font-size: 0.8rem; cursor: pointer; transition: background 0.1s; }
    .add-job-result:hover { background: rgba(201,168,76,0.08); }
    .add-job-form-actions { display: flex; gap: 0.4rem; }

    /* ── INSTANCES VIEW ── */
    #view-instances { }
    .instances-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .instances-header h2 { font-size: 1.1rem; font-weight: 700; }
    .instances-list { display: grid; gap: 0.75rem; }
    .instance-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; cursor: pointer;
      transition: all 0.15s;
    }
    .instance-card:hover { border-color: rgba(201,168,76,0.4); }
    .instance-card-info { flex: 1; min-width: 0; }
    .instance-card-name { font-size: 0.95rem; font-weight: 700; }
    .instance-card-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .instance-status { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 700; }
    .instance-status.active { background: rgba(62,207,142,0.15); color: var(--green); }
    .instance-status.archived { background: rgba(255,255,255,0.06); color: var(--muted); }
    .instance-actions { display: flex; gap: 0.4rem; }

    /* ── TEMPLATES VIEW ── */
    #view-templates { }
    .templates-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .templates-header h2 { font-size: 1.1rem; font-weight: 700; }
    .templates-list { display: grid; gap: 0.75rem; margin-bottom: 2rem; }
    .template-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; cursor: pointer;
      transition: all 0.15s;
    }
    .template-card:hover { border-color: rgba(201,168,76,0.4); }
    .template-card-info { flex: 1; min-width: 0; }
    .template-card-name { font-size: 0.95rem; font-weight: 700; }
    .template-card-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .template-actions { display: flex; gap: 0.4rem; }

    /* ── TEMPLATE EDITOR ── */
    .template-editor { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-top: 1rem; }
    .template-editor-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .template-editor h3 { font-size: 1rem; font-weight: 700; }
    .stages-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .stage-row {
      display: flex; align-items: center; gap: 0.6rem; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem;
      cursor: grab;
    }
    .stage-row.drag-over-stage { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .stage-drag-handle { color: var(--muted); cursor: grab; font-size: 0.9rem; }
    .stage-color-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; cursor: pointer; }
    .stage-name-input {
      flex: 1; background: transparent; border: none; color: var(--text); font-size: 0.85rem;
      outline: none; min-width: 0;
    }
    .stage-name-input:focus { color: var(--gold); }
    .stage-terminal-label { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; cursor: pointer; white-space: nowrap; }
    .stage-terminal-label input { accent-color: var(--gold); }
    .stage-delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 0.1rem 0.3rem; border-radius: 4px; transition: all 0.15s; }
    .stage-delete-btn:hover { color: var(--red); background: rgba(245,101,101,0.1); }

    /* ── JOB DETAIL PANEL ── */
    .job-panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; }
    .job-panel-overlay.open { display: block; }
    .job-panel {
      position: fixed; top: 0; right: -480px; width: 460px; bottom: 0;
      background: var(--charcoal); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 210; transition: right 0.25s ease;
      overflow: hidden;
    }
    .job-panel.open { right: 0; }
    .job-panel-header {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
    }
    .job-panel-title { flex: 1; font-size: 1.05rem; font-weight: 700; }
    .job-panel-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 0.2rem; line-height: 1; }
    .job-panel-close:hover { color: var(--text); }
    .job-panel-body { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel-field label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .panel-field select, .panel-field textarea, .panel-field input[type=date], .panel-field input[type=text] {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.45rem 0.7rem; font-size: 0.85rem;
    }
    .panel-field select:focus, .panel-field textarea:focus, .panel-field input:focus {
      outline: none; border-color: var(--gold);
    }
    .panel-field textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .panel-entity-link { color: var(--gold); text-decoration: none; font-size: 0.82rem; }
    .panel-entity-link:hover { text-decoration: underline; }

    /* ── HISTORY TIMELINE ── */
    .history-timeline { display: flex; flex-direction: column; gap: 0.6rem; }
    .history-item { display: flex; gap: 0.75rem; align-items: flex-start; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 0.4rem; }
    .history-content { flex: 1; }
    .history-stages { font-size: 0.8rem; color: var(--text); }
    .history-stages span { color: var(--gold); }
    .history-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    .history-note { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-top: 0.15rem; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--charcoal); border: 1px solid var(--border); border-radius: 10px; padding: 1.75rem; width: 100%; max-width: 440px; position: relative; }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .form-group { margin-bottom: 0.9rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { font-family: inherit; resize: vertical; }

    /* ── BUTTONS ── */
    .btn { padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(245,101,101,0.15); border: 1px solid rgba(245,101,101,0.3); color: var(--red); }
    .btn-danger:hover { background: rgba(245,101,101,0.25); }
    .btn-modal-row { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.25rem; }

    /* ── UTILITIES ── */
    .hidden { display: none !important; }
    .loading { color: var(--muted); font-size: 0.85rem; padding: 1rem 0; }
    .section-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; }
    .color-picker-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .color-picker-wrap input[type=color] { width: 32px; height: 28px; border: 1px solid var(--border); border-radius: 4px; background: none; cursor: pointer; padding: 2px; }

    /* ── JOB STATUS BADGES ── */
    .job-status-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.45rem;
      border-radius: 4px; margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .job-status-badge.waiting_client { background: rgba(234,179,8,0.2); color: #eab308; }
    .job-status-badge.missing_info   { background: rgba(234,88,12,0.2); color: #f97316; }
    .job-status-badge.blocked        { background: rgba(239,68,68,0.2); color: #ef4444; }
    .job-status-badge.under_extension{ background: rgba(59,130,246,0.2); color: #60a5fa; }
    .job-status-badge.on_hold        { background: rgba(148,163,184,0.15); color: #94a3b8; }

    /* Status left-border on card */
    .job-card[data-status="waiting_client"]  { border-left: 3px solid #eab308; }
    .job-card[data-status="missing_info"]    { border-left: 3px solid #f97316; }
    .job-card[data-status="blocked"]         { border-left: 3px solid #ef4444; }
    .job-card[data-status="under_extension"] { border-left: 3px solid #60a5fa; }
    .job-card[data-status="on_hold"]         { border-left: 3px solid #94a3b8; }

    /* Stage automation fields */
    .stage-auto-row {
      display: flex; flex-direction: column; gap: 0.4rem;
      margin-top: 0.5rem; padding: 0.5rem 0.75rem;
      background: rgba(22,32,48,0.8); border: 1px solid var(--border); border-radius: 6px;
    }
    .stage-auto-row label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stage-auto-row select, .stage-auto-row textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 0.35rem 0.6rem; font-size: 0.8rem; font-family: inherit;
    }
    .stage-auto-row select:focus, .stage-auto-row textarea:focus { outline: none; border-color: var(--gold); }
    .stage-auto-row textarea { resize: vertical; min-height: 60px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .sidebar { width: 56px; }
      .sidebar span { display: none; }
      .sidebar-brand .nav-name { display: none; }
      .sidebar-section { display: none; }
      .main { margin-left: 56px; }
      .job-panel { width: 100%; right: -100%; }
      .modal { margin: 1rem; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar-mount" data-active="pipelines"></aside>
  <script src="/partials/sidebar.js"></script>

  <div class="main">
    <!-- TOP HEADER -->
    <div class="top-header">
      <span class="top-header-title">📋 Pipelines</span>
      <div class="header-spacer"></div>
    </div>

    <!-- TABS -->
    <div class="view-tabs">
      <button class="view-tab active" data-tab="boards">Boards</button>
      <button class="view-tab" data-tab="instances">Instances</button>
      <button class="view-tab" data-tab="templates">Templates</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- ═══════════════ BOARDS VIEW ═══════════════ -->
      <div id="view-boards">
        <div class="board-top">
          <select id="instance-select" class="btn btn-ghost" style="min-width:200px;">
            <option value="">Loading instances…</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="window.switchTab('instances')">+ New Instance</button>
        </div>
        <div id="board-container">
          <div class="board-empty">
            <div class="empty-icon">📋</div>
            <p style="font-weight:600;">Select an instance to view its board</p>
            <p>Or create a new instance to get started.</p>
          </div>
        </div>
      </div>

      <!-- ═══════════════ INSTANCES VIEW ═══════════════ -->
      <div id="view-instances" class="hidden">
        <div class="instances-header">
          <h2>Pipeline Instances</h2>
          <button class="btn btn-primary btn-sm" onclick="openCreateInstanceModal()">+ New Instance</button>
        </div>
        <div id="instances-list" class="instances-list">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- ═══════════════ TEMPLATES VIEW ═══════════════ -->
      <div id="view-templates" class="hidden">
        <div class="templates-header">
          <h2>Pipeline Templates</h2>
          <button class="btn btn-primary btn-sm" onclick="openCreateTemplateModal()">+ New Template</button>
        </div>
        <div id="templates-list" class="templates-list">
          <div class="loading">Loading…</div>
        </div>
        <div id="template-editor" class="hidden"></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->

  <!-- JOB DETAIL PANEL -->
  <div class="job-panel-overlay" id="job-panel-overlay" onclick="closeJobPanel()"></div>
  <div class="job-panel" id="job-panel">
    <div class="job-panel-header">
      <div class="job-panel-title" id="panel-entity-name">Job Details</div>
      <button class="job-panel-close" onclick="closeJobPanel()">✕</button>
    </div>
    <div class="job-panel-body" id="panel-body">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <!-- CREATE INSTANCE MODAL -->
  <div class="modal-overlay" id="create-instance-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('create-instance-modal')">✕</button>
      <h3>New Pipeline Instance</h3>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="ci-name" placeholder="e.g. 2025 Business Tax Returns" />
      </div>
      <div class="form-group">
        <label>Template</label>
        <select id="ci-template"></select>
      </div>
      <div class="form-group">
        <label>Tax Year (optional)</label>
        <input type="text" id="ci-tax-year" placeholder="e.g. 2025" />
      </div>
      <div class="btn-modal-row">
        <button class="btn btn-ghost" onclick="closeModal('create-instance-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateInstance()">Create</button>
      </div>
    </div>
  </div>

  <!-- CREATE TEMPLATE MODAL -->
  <div class="modal-overlay" id="create-template-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('create-template-modal')">✕</button>
      <h3>New Pipeline Template</h3>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="ct-name" placeholder="e.g. Tax Return Workflow" />
      </div>
      <div class="form-group">
        <label>Entity Type</label>
        <select id="ct-entity-type">
          <option value="company">Company</option>
          <option value="person">Person</option>
          <option value="relationship">Relationship</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="ct-description" rows="3" placeholder="What is this workflow for?"></textarea>
      </div>
      <div class="btn-modal-row">
        <button class="btn btn-ghost" onclick="closeModal('create-template-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateTemplate()">Create</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    // ─── AUTH ───────────────────────────────────────
    const token = localStorage.getItem('dl_token');
    if (!token) { window.location.href = '/login'; return; }

    // ─── STATE ───────────────────────────────────────
    let instances = [];
    let templates = [];
    let teamMembers = [];
    let currentInstance = null;
    let currentInstanceData = null;
    let openJobId = null;
    let panelSaveTimer = null;

    // ─── API ─────────────────────────────────────────
    async function api(method, path, body) {
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const r = await fetch('/api/pipelines' + path, opts);
      if (r.status === 401) { localStorage.removeItem('dl_token'); window.location.href = '/login'; throw new Error('Unauthorized'); }
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'Request failed'); }
      return r.json();
    }

    // ─── TABS ─────────────────────────────────────────
    window.switchTab = function(tab) {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.toggle('hidden', v.id !== 'view-' + tab));
      if (tab === 'boards') loadBoardView();
      if (tab === 'instances') loadInstances();
      if (tab === 'templates') loadTemplates();
    };

    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    // ─── UTILS ───────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function daysAgo(ts) {
      if (!ts) return 0;
      return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
    }

    function initials(name) {
      if (!name) return '?';
      const parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function entityUrl(type, id) {
      if (type === 'company') return `/crm/company/${id}`;
      if (type === 'person') return `/crm/person/${id}`;
      if (type === 'relationship') return `/crm/relationship/${id}`;
      return '#';
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    window.closeModal = closeModal;
    window.openModal = openModal;

    // ─── LOAD TEAM ───────────────────────────────────
    async function loadTeam() {
      try {
        const r = await fetch('/firms/team', { headers: { 'Authorization': 'Bearer ' + token } });
        if (r.ok) teamMembers = await r.json();
      } catch (_) {}
    }

    // ─── BOARD VIEW ──────────────────────────────────
    async function loadBoardView() {
      // Load instances into selector
      try {
        instances = await api('GET', '/instances');
      } catch (e) { console.error(e); }

      const sel = document.getElementById('instance-select');
      sel.innerHTML = '<option value="">— Select an instance —</option>';
      instances.filter(i => i.status === 'active').forEach(i => {
        const opt = document.createElement('option');
        opt.value = i.id;
        opt.textContent = i.name + (i.tax_year ? ` (${i.tax_year})` : '');
        if (currentInstance && currentInstance == i.id) opt.selected = true;
        sel.appendChild(opt);
      });

      if (currentInstance) {
        await renderBoard(currentInstance);
      }
    }

    document.getElementById('instance-select').addEventListener('change', function() {
      currentInstance = this.value;
      if (currentInstance) renderBoard(currentInstance);
      else document.getElementById('board-container').innerHTML = `<div class="board-empty"><div class="empty-icon">📋</div><p style="font-weight:600;">Select an instance to view its board</p></div>`;
    });

    async function renderBoard(instanceId) {
      const container = document.getElementById('board-container');
      container.innerHTML = '<div class="loading">Loading board…</div>';
      try {
        currentInstanceData = await api('GET', `/instances/${instanceId}`);
        const { stages, jobs } = currentInstanceData;

        if (!stages || stages.length === 0) {
          container.innerHTML = `<div class="board-empty"><div class="empty-icon">🔧</div><p style="font-weight:600;">This template has no stages yet</p><p>Go to Templates to add stages.</p></div>`;
          return;
        }

        // Group jobs by stage
        const byStage = {};
        stages.forEach(s => { byStage[s.id] = []; });
        jobs.forEach(j => {
          const sid = j.current_stage_id;
          if (byStage[sid]) byStage[sid].push(j);
          else {
            // Orphaned job (stage deleted) — put in first stage
            if (stages[0]) {
              if (!byStage['orphaned']) byStage['orphaned'] = [];
              byStage['orphaned'].push(j);
            }
          }
        });

        let html = '<div class="kanban-board">';
        stages.forEach(stage => {
          const stageJobs = byStage[stage.id] || [];
          const color = stage.color || '#c9a84c';
          html += `<div class="kanban-col" data-stage-id="${stage.id}" ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event, ${stage.id})">
            <div class="kanban-col-header">
              <div class="col-stage-name" style="color:${color}">${esc(stage.name)}</div>
              <span class="col-count">${stageJobs.length}</span>
              <button class="col-add-btn" onclick="toggleAddJobForm(${stage.id})" title="Add job">＋</button>
            </div>
            <div class="kanban-cards" id="stage-cards-${stage.id}">`;

          stageJobs.forEach(job => {
            html += renderJobCard(job);
          });

          html += `</div>
            <div class="add-job-form hidden" id="add-job-form-${stage.id}">
              <input type="text" placeholder="Search ${esc(currentInstanceData.template.entity_type)} by name…"
                id="add-job-search-${stage.id}" autocomplete="off"
                oninput="searchEntities(this.value, ${stage.id}, '${esc(currentInstanceData.template.entity_type)}')" />
              <div class="add-job-search-results hidden" id="add-job-results-${stage.id}"></div>
              <button class="btn btn-ghost btn-sm" style="width:100%" onclick="toggleAddJobForm(${stage.id})">Cancel</button>
            </div>
          </div>`;
        });

        html += '</div>';
        container.innerHTML = html;

        // Attach drag events to cards
        attachDragEvents();

      } catch (e) {
        container.innerHTML = `<div class="board-empty"><div class="empty-icon">⚠️</div><p>Failed to load board: ${esc(e.message)}</p></div>`;
      }
    }

    const JOB_STATUS_LABELS = {
      waiting_client:  '🟡 Waiting on Client',
      missing_info:    '🟠 Missing Info',
      blocked:         '🔴 Blocked',
      under_extension: '🔵 Under Extension',
      on_hold:         '⚫ On Hold',
    };

    function renderJobCard(job) {
      const priorityCls = job.priority || 'normal';
      const notesPreview = (job.notes || '').substring(0, 60) + ((job.notes || '').length > 60 ? '…' : '');
      const days = daysAgo(job.updated_at || job.created_at);
      const dueStr = job.due_date ? formatDate(job.due_date) : '';
      const isOverdue = job.due_date && new Date(job.due_date) < new Date();
      const assignName = job.assigned_name || job.assigned_full_name || '';
      const assignIni = assignName ? initials(assignName) : '';
      const status = job.job_status || 'active';
      const statusAttr = status !== 'active' ? ` data-status="${status}"` : '';
      const statusBadge = status !== 'active' && JOB_STATUS_LABELS[status]
        ? `<div><span class="job-status-badge ${status}">${JOB_STATUS_LABELS[status]}</span></div>`
        : '';

      return `<div class="job-card" data-job-id="${job.id}" draggable="true" onclick="openJobPanel(${job.id})"${statusAttr}>
        <div class="job-card-top">
          <div class="job-entity">${esc(job.entity_name || `#${job.entity_id}`)}</div>
          <span class="priority-badge ${priorityCls}">${priorityCls}</span>
        </div>
        ${statusBadge}
        ${notesPreview ? `<div class="job-notes-preview">${esc(notesPreview)}</div>` : ''}
        <div class="job-card-meta">
          <span class="job-days">${days}d</span>
          ${dueStr ? `<span class="job-due${isOverdue ? ' overdue' : ''}">📅 ${dueStr}</span>` : ''}
          ${assignIni ? `<div class="assignee-avatar" title="${esc(assignName)}">${esc(assignIni)}</div>` : ''}
        </div>
      </div>`;
    }

    function attachDragEvents() {
      document.querySelectorAll('.job-card[draggable]').forEach(card => {
        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('jobId', card.dataset.jobId);
          setTimeout(() => card.classList.add('dragging'), 0);
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
      });
    }

    window.handleDrop = async function(e, stageId) {
      e.preventDefault();
      const col = e.currentTarget;
      col.classList.remove('drag-over');
      const jobId = e.dataTransfer.getData('jobId');
      if (!jobId) return;
      try {
        await api('POST', `/jobs/${jobId}/move`, { stage_id: stageId, note: '' });
        await renderBoard(currentInstance);
      } catch (err) {
        alert('Failed to move job: ' + err.message);
      }
    };

    window.toggleAddJobForm = function(stageId) {
      const form = document.getElementById(`add-job-form-${stageId}`);
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        document.getElementById(`add-job-search-${stageId}`).focus();
      }
    };

    let entitySearchTimer = null;
    window.searchEntities = function(query, stageId, entityType) {
      clearTimeout(entitySearchTimer);
      const resultsEl = document.getElementById(`add-job-results-${stageId}`);
      if (!query.trim()) { resultsEl.classList.add('hidden'); return; }
      entitySearchTimer = setTimeout(async () => {
        try {
          const r = await fetch(`/api/search?q=${encodeURIComponent(query)}`, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!r.ok) return;
          const data = await r.json();
          let items = [];
          if (entityType === 'company') items = data.companies || [];
          else if (entityType === 'person') items = data.people || [];
          else items = data.relationships || [];

          if (!items.length) {
            resultsEl.innerHTML = '<div class="add-job-result" style="color:var(--muted)">No results found</div>';
            resultsEl.classList.remove('hidden');
            return;
          }

          resultsEl.innerHTML = items.map(item => {
            const name = item.company_name || item.name || `${item.first_name || ''} ${item.last_name || ''}`.trim();
            return `<div class="add-job-result" onclick="addJobFromSearch(${item.id}, '${entityType}', '${esc(name).replace(/'/g, "\\'")}', ${stageId})">${esc(name)}</div>`;
          }).join('');
          resultsEl.classList.remove('hidden');
        } catch (_) {}
      }, 250);
    };

    window.addJobFromSearch = async function(entityId, entityType, entityName, stageId) {
      const resultsEl = document.getElementById(`add-job-results-${stageId}`);
      resultsEl.classList.add('hidden');
      try {
        await api('POST', `/instances/${currentInstance}/jobs`, {
          entity_type: entityType,
          entity_id: entityId,
          notes: '',
          priority: 'normal',
        });
        // Move to target stage if not first
        const newJob = currentInstanceData?.stages?.[0]?.id !== stageId ? null : null;
        // Reload board — job is placed in first stage, then move if needed
        const freshInstance = await api('GET', `/instances/${currentInstance}`);
        const addedJob = freshInstance.jobs.find(j => j.entity_id == entityId && j.entity_type === entityType);
        if (addedJob && addedJob.current_stage_id !== stageId) {
          await api('POST', `/jobs/${addedJob.id}/move`, { stage_id: stageId, note: 'Initial placement' });
        }
        toggleAddJobForm(stageId);
        await renderBoard(currentInstance);
      } catch (err) {
        alert('Failed to add job: ' + err.message);
      }
    };

    // ─── JOB DETAIL PANEL ────────────────────────────
    window.openJobPanel = async function(jobId) {
      openJobId = jobId;
      document.getElementById('job-panel-overlay').classList.add('open');
      document.getElementById('job-panel').classList.add('open');
      document.getElementById('panel-body').innerHTML = '<div class="loading">Loading…</div>';
      document.getElementById('panel-entity-name').textContent = 'Job Details';
      await renderJobPanel(jobId);
    };

    window.closeJobPanel = function() {
      document.getElementById('job-panel-overlay').classList.remove('open');
      document.getElementById('job-panel').classList.remove('open');
      openJobId = null;
      clearTimeout(panelSaveTimer);
    };

    async function renderJobPanel(jobId) {
      try {
        // Get job from current board data
        const job = currentInstanceData?.jobs?.find(j => j.id == jobId);
        if (!job) return;

        const stages = currentInstanceData?.stages || [];
        const history = await api('GET', `/jobs/${jobId}/history`);

        document.getElementById('panel-entity-name').textContent = job.entity_name || `Job #${job.id}`;

        const stageOpts = stages.map(s =>
          `<option value="${s.id}" ${s.id == job.current_stage_id ? 'selected' : ''}>${esc(s.name)}</option>`
        ).join('');

        const teamOpts = '<option value="">— Unassigned —</option>' +
          teamMembers.map(m =>
            `<option value="${m.id}" ${m.id == job.assigned_to ? 'selected' : ''}>${esc(m.display_name || m.name)}</option>`
          ).join('');

        const histHtml = history.length ? history.map(h => {
          const from = h.from_stage_name || 'Start';
          const to = h.to_stage_name || '?';
          const who = h.moved_by_name || h.moved_by_full_name || 'System';
          const when = new Date(h.moved_at).toLocaleString();
          return `<div class="history-item">
            <div class="history-dot"></div>
            <div class="history-content">
              <div class="history-stages">${esc(from)} → <span>${esc(to)}</span></div>
              <div class="history-meta">${esc(who)} · ${when}</div>
              ${h.note ? `<div class="history-note">${esc(h.note)}</div>` : ''}
            </div>
          </div>`;
        }).join('') : '<p style="color:var(--muted);font-size:0.8rem;">No movement history yet.</p>';

        const dueDateVal = job.due_date ? job.due_date.split('T')[0] : '';
        const entityLink = entityUrl(job.entity_type, job.entity_id);

        document.getElementById('panel-body').innerHTML = `
          <div class="panel-field">
            <label>Entity</label>
            <a class="panel-entity-link" href="${entityLink}" target="_blank">${esc(job.entity_name || `#${job.entity_id}`)}</a>
          </div>
          <div class="panel-field">
            <label>Stage</label>
            <select id="panel-stage" onchange="panelMoveStage(${jobId}, this.value)">${stageOpts}</select>
          </div>
          <div class="panel-field">
            <label>Status</label>
            <select id="panel-job-status" onchange="panelSaveField(${jobId})">
              <option value="active" ${(job.job_status || 'active') === 'active' ? 'selected' : ''}>Active</option>
              <option value="waiting_client" ${job.job_status === 'waiting_client' ? 'selected' : ''}>🟡 Waiting on Client</option>
              <option value="missing_info" ${job.job_status === 'missing_info' ? 'selected' : ''}>🟠 Missing Info</option>
              <option value="blocked" ${job.job_status === 'blocked' ? 'selected' : ''}>🔴 Blocked</option>
              <option value="under_extension" ${job.job_status === 'under_extension' ? 'selected' : ''}>🔵 Under Extension</option>
              <option value="on_hold" ${job.job_status === 'on_hold' ? 'selected' : ''}>⚫ On Hold</option>
            </select>
          </div>
          <div class="panel-field">
            <label>Priority</label>
            <select id="panel-priority" onchange="panelSaveField(${jobId})">
              <option value="normal" ${job.priority === 'normal' ? 'selected' : ''}>Normal</option>
              <option value="high" ${job.priority === 'high' ? 'selected' : ''}>High</option>
              <option value="urgent" ${job.priority === 'urgent' ? 'selected' : ''}>Urgent</option>
            </select>
          </div>
          <div class="panel-field">
            <label>Assigned To</label>
            <select id="panel-assigned" onchange="panelSaveField(${jobId})">${teamOpts}</select>
          </div>
          <div class="panel-field">
            <label>Due Date</label>
            <input type="date" id="panel-due" value="${dueDateVal}" onchange="panelSaveField(${jobId})" />
          </div>
          <div class="panel-field">
            <label>Notes</label>
            <textarea id="panel-notes" rows="4" oninput="panelScheduleSave(${jobId})">${esc(job.notes || '')}</textarea>
          </div>
          <div>
            <div class="section-label">Movement History</div>
            <div class="history-timeline">${histHtml}</div>
          </div>
          <div style="display:flex;gap:0.6rem;margin-top:0.5rem;">
            <button class="btn btn-danger btn-sm" onclick="deleteJob(${jobId})">Delete Job</button>
          </div>
        `;
      } catch (e) {
        document.getElementById('panel-body').innerHTML = `<p style="color:var(--red)">Failed to load job: ${esc(e.message)}</p>`;
      }
    }

    window.panelMoveStage = async function(jobId, stageId) {
      try {
        await api('POST', `/jobs/${jobId}/move`, { stage_id: parseInt(stageId), note: '' });
        await renderBoard(currentInstance);
        // Refresh panel
        currentInstanceData = await api('GET', `/instances/${currentInstance}`);
        await renderJobPanel(jobId);
      } catch (err) { alert('Failed to move: ' + err.message); }
    };

    window.panelSaveField = async function(jobId) {
      try {
        const priority = document.getElementById('panel-priority')?.value;
        const assigned = document.getElementById('panel-assigned')?.value;
        const due = document.getElementById('panel-due')?.value;
        const notes = document.getElementById('panel-notes')?.value;
        const jobStatus = document.getElementById('panel-job-status')?.value || 'active';
        await api('PUT', `/jobs/${jobId}`, {
          priority,
          assigned_to: assigned || null,
          due_date: due || null,
          notes,
          job_status: jobStatus,
        });
        // Refresh board silently
        currentInstanceData = await api('GET', `/instances/${currentInstance}`);
        // Re-render board cards only
        await renderBoard(currentInstance);
      } catch (err) { console.error('panel save error:', err); }
    };

    window.panelScheduleSave = function(jobId) {
      clearTimeout(panelSaveTimer);
      panelSaveTimer = setTimeout(() => panelSaveField(jobId), 800);
    };

    window.deleteJob = async function(jobId) {
      if (!confirm('Delete this job? This cannot be undone.')) return;
      try {
        await api('DELETE', `/jobs/${jobId}`);
        closeJobPanel();
        await renderBoard(currentInstance);
      } catch (err) { alert('Failed to delete: ' + err.message); }
    };

    // ─── INSTANCES VIEW ──────────────────────────────
    async function loadInstances() {
      const el = document.getElementById('instances-list');
      el.innerHTML = '<div class="loading">Loading…</div>';
      try {
        instances = await api('GET', '/instances');
        if (!instances.length) {
          el.innerHTML = '<div class="loading">No instances yet. Create one to get started.</div>';
          return;
        }
        el.innerHTML = instances.map(inst => `
          <div class="instance-card" onclick="goToBoard(${inst.id})">
            <div class="instance-card-info">
              <div class="instance-card-name">${esc(inst.name)}</div>
              <div class="instance-card-meta">${esc(inst.template_name || 'Unknown template')} · ${inst.job_count} jobs${inst.tax_year ? ` · ${inst.tax_year}` : ''}</div>
            </div>
            <span class="instance-status ${inst.status}">${inst.status}</span>
            <div class="instance-actions" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="toggleArchive(${inst.id}, '${inst.status}')">${inst.status === 'active' ? 'Archive' : 'Unarchive'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteInstance(${inst.id})">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<div class="loading" style="color:var(--red)">Failed to load: ${esc(e.message)}</div>`;
      }
    }

    window.goToBoard = function(instanceId) {
      currentInstance = instanceId;
      switchTab('boards');
    };

    window.toggleArchive = async function(id, currentStatus) {
      try {
        await api('PUT', `/instances/${id}`, { status: currentStatus === 'active' ? 'archived' : 'active' });
        loadInstances();
      } catch (err) { alert('Failed: ' + err.message); }
    };

    window.deleteInstance = async function(id) {
      if (!confirm('Delete this instance? It must have no jobs.')) return;
      try {
        await api('DELETE', `/instances/${id}`);
        loadInstances();
      } catch (err) { alert('Failed: ' + err.message); }
    };

    window.openCreateInstanceModal = async function() {
      // Load templates into selector
      try {
        templates = await api('GET', '/templates');
      } catch (_) {}
      const sel = document.getElementById('ci-template');
      sel.innerHTML = templates.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
      document.getElementById('ci-name').value = '';
      document.getElementById('ci-tax-year').value = '';
      openModal('create-instance-modal');
    };

    window.submitCreateInstance = async function() {
      const name = document.getElementById('ci-name').value.trim();
      const templateId = document.getElementById('ci-template').value;
      const taxYear = document.getElementById('ci-tax-year').value.trim();
      if (!name) { alert('Name is required'); return; }
      if (!templateId) { alert('Please select a template'); return; }
      try {
        const inst = await api('POST', '/instances', { name, template_id: parseInt(templateId), tax_year: taxYear });
        closeModal('create-instance-modal');
        currentInstance = inst.id;
        switchTab('boards');
      } catch (err) { alert('Failed: ' + err.message); }
    };

    // ─── TEMPLATES VIEW ──────────────────────────────
    async function loadTemplates() {
      const el = document.getElementById('templates-list');
      el.innerHTML = '<div class="loading">Loading…</div>';
      document.getElementById('template-editor').classList.add('hidden');
      try {
        templates = await api('GET', '/templates');
        if (!templates.length) {
          el.innerHTML = '<div class="loading">No templates yet. Create one to get started.</div>';
          return;
        }
        el.innerHTML = templates.map(t => `
          <div class="template-card" onclick="openTemplateEditor(${t.id})">
            <div class="template-card-info">
              <div class="template-card-name">${esc(t.name)}</div>
              <div class="template-card-meta">${esc(t.entity_type)} · ${t.stage_count} stages${t.description ? ' · ' + esc(t.description) : ''}</div>
            </div>
            <div class="template-actions" onclick="event.stopPropagation()">
              <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${t.id})">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<div class="loading" style="color:var(--red)">Failed: ${esc(e.message)}</div>`;
      }
    }

    window.openCreateTemplateModal = function() {
      document.getElementById('ct-name').value = '';
      document.getElementById('ct-entity-type').value = 'company';
      document.getElementById('ct-description').value = '';
      openModal('create-template-modal');
    };

    window.submitCreateTemplate = async function() {
      const name = document.getElementById('ct-name').value.trim();
      const entityType = document.getElementById('ct-entity-type').value;
      const description = document.getElementById('ct-description').value.trim();
      if (!name) { alert('Name is required'); return; }
      try {
        const tmpl = await api('POST', '/templates', { name, entity_type: entityType, description });
        closeModal('create-template-modal');
        templates.push(tmpl);
        openTemplateEditor(tmpl.id);
        await loadTemplates();
        openTemplateEditor(tmpl.id);
      } catch (err) { alert('Failed: ' + err.message); }
    };

    window.deleteTemplate = async function(id) {
      if (!confirm('Delete this template? It must have no instances.')) return;
      try {
        await api('DELETE', `/templates/${id}`);
        loadTemplates();
      } catch (err) { alert('Failed: ' + err.message); }
    };

    // ─── TEMPLATE EDITOR ─────────────────────────────
    let editingTemplate = null;
    let dragSrcStage = null;

    window.openTemplateEditor = async function(templateId) {
      const editorEl = document.getElementById('template-editor');
      editorEl.innerHTML = '<div class="loading">Loading…</div>';
      editorEl.classList.remove('hidden');
      editorEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      try {
        editingTemplate = await api('GET', `/templates/${templateId}`);
        renderTemplateEditor();
      } catch (e) {
        editorEl.innerHTML = `<p style="color:var(--red)">Failed to load template: ${esc(e.message)}</p>`;
      }
    };

    function renderTemplateEditor() {
      if (!editingTemplate) return;
      const t = editingTemplate;
      const editorEl = document.getElementById('template-editor');

      const stagesHtml = t.stages.map((s, idx) => {
        const autoAssignOpts = '<option value="">None (keep current)</option>' +
          teamMembers.map(m =>
            `<option value="${m.id}" ${m.id == s.auto_assign_to ? 'selected' : ''}>${esc(m.display_name || m.name)}</option>`
          ).join('');
        return `
        <div style="margin-bottom:0.75rem;">
          <div class="stage-row" data-stage-id="${s.id}" draggable="true"
            ondragstart="stageDragStart(event, ${s.id})"
            ondragover="event.preventDefault(); this.classList.add('drag-over-stage')"
            ondragleave="this.classList.remove('drag-over-stage')"
            ondrop="stageDrop(event, ${s.id})">
            <span class="stage-drag-handle" title="Drag to reorder">⠿</span>
            <div class="stage-color-swatch" style="background:${s.color||'#c9a84c'}" onclick="openStageColorPicker(${s.id})"></div>
            <input type="color" id="stage-color-${s.id}" value="${s.color||'#c9a84c'}" style="display:none"
              oninput="updateStageColorSwatch(${s.id}, this.value)"
              onchange="saveStageColor(${s.id}, this.value)" />
            <input class="stage-name-input" type="text" value="${esc(s.name)}" placeholder="Stage name"
              onchange="saveStageField(${s.id}, 'name', this.value)"
              onblur="saveStageField(${s.id}, 'name', this.value)" />
            <label class="stage-terminal-label">
              <input type="checkbox" ${s.is_terminal ? 'checked' : ''} onchange="saveStageField(${s.id}, 'is_terminal', this.checked)" />
              Terminal
            </label>
            <button class="stage-delete-btn" onclick="deleteStage(${s.id})" title="Delete stage">🗑</button>
          </div>
          <div class="stage-auto-row">
            <label>Auto-assign to</label>
            <select id="stage-auto-assign-${s.id}" onchange="saveStageAutoFields(${s.id})">${autoAssignOpts}</select>
            <label style="margin-top:0.35rem;">Auto-message to client</label>
            <textarea id="stage-auto-message-${s.id}" rows="2"
              placeholder="Enter a message to automatically send to the client when a job enters this stage. Leave blank to skip."
              onblur="saveStageAutoFields(${s.id})">${esc(s.auto_message || '')}</textarea>
          </div>
        </div>`;
      }).join('');

      editorEl.innerHTML = `
        <div class="template-editor">
          <div class="template-editor-header">
            <div>
              <h3>${esc(t.name)}</h3>
              <p style="font-size:0.78rem;color:var(--muted);margin-top:0.15rem;">${esc(t.entity_type)} · ${t.stages.length} stages</p>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('template-editor').classList.add('hidden')">Close</button>
          </div>
          <div class="section-label">Stages (drag to reorder)</div>
          <div class="stages-list" id="stages-list">${stagesHtml || '<p style="color:var(--muted);font-size:0.82rem;">No stages yet.</p>'}</div>
          <button class="btn btn-ghost btn-sm" onclick="addStage()">+ Add Stage</button>
        </div>
      `;
    }

    window.saveStageField = async function(stageId, field, value) {
      if (!editingTemplate) return;
      try {
        const stage = editingTemplate.stages.find(s => s.id == stageId);
        if (!stage) return;
        const update = {
          name: stage.name,
          position: stage.position,
          color: stage.color,
          is_terminal: stage.is_terminal,
          auto_assign_to: stage.auto_assign_to || null,
          auto_message: stage.auto_message || '',
        };
        update[field] = value;
        const updated = await api('PUT', `/templates/${editingTemplate.id}/stages/${stageId}`, update);
        Object.assign(stage, updated);
      } catch (err) { console.error('Stage save error:', err); }
    };

    window.saveStageAutoFields = async function(stageId) {
      if (!editingTemplate) return;
      try {
        const stage = editingTemplate.stages.find(s => s.id == stageId);
        if (!stage) return;
        const autoAssignEl = document.getElementById(`stage-auto-assign-${stageId}`);
        const autoMsgEl = document.getElementById(`stage-auto-message-${stageId}`);
        const auto_assign_to = autoAssignEl ? (autoAssignEl.value ? parseInt(autoAssignEl.value) : null) : (stage.auto_assign_to || null);
        const auto_message = autoMsgEl ? autoMsgEl.value : (stage.auto_message || '');
        const update = {
          name: stage.name,
          position: stage.position,
          color: stage.color,
          is_terminal: stage.is_terminal,
          auto_assign_to,
          auto_message,
        };
        const updated = await api('PUT', `/templates/${editingTemplate.id}/stages/${stageId}`, update);
        Object.assign(stage, updated);
      } catch (err) { console.error('Stage auto-fields save error:', err); }
    };

    window.openStageColorPicker = function(stageId) {
      document.getElementById(`stage-color-${stageId}`)?.click();
    };

    window.updateStageColorSwatch = function(stageId, color) {
      const row = document.querySelector(`.stage-row[data-stage-id="${stageId}"] .stage-color-swatch`);
      if (row) row.style.background = color;
    };

    window.saveStageColor = async function(stageId, color) {
      await saveStageField(stageId, 'color', color);
    };

    window.addStage = async function() {
      if (!editingTemplate) return;
      const name = prompt('Stage name:');
      if (!name || !name.trim()) return;
      try {
        const position = editingTemplate.stages.length;
        const stage = await api('POST', `/templates/${editingTemplate.id}/stages`, {
          name: name.trim(), position, color: '#c9a84c', is_terminal: false
        });
        editingTemplate.stages.push(stage);
        renderTemplateEditor();
      } catch (err) { alert('Failed to add stage: ' + err.message); }
    };

    window.deleteStage = async function(stageId) {
      if (!confirm('Delete this stage? Jobs in this stage will become orphaned.')) return;
      try {
        await api('DELETE', `/templates/${editingTemplate.id}/stages/${stageId}`);
        editingTemplate.stages = editingTemplate.stages.filter(s => s.id !== stageId);
        renderTemplateEditor();
      } catch (err) { alert('Failed to delete stage: ' + err.message); }
    };

    // Stage drag-and-drop reorder
    window.stageDragStart = function(e, stageId) {
      dragSrcStage = stageId;
      e.dataTransfer.setData('stageId', stageId);
    };

    window.stageDrop = async function(e, targetStageId) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over-stage');
      const srcId = parseInt(e.dataTransfer.getData('stageId'));
      if (srcId === targetStageId || !editingTemplate) return;

      const stages = editingTemplate.stages;
      const srcIdx = stages.findIndex(s => s.id === srcId);
      const tgtIdx = stages.findIndex(s => s.id === targetStageId);
      if (srcIdx < 0 || tgtIdx < 0) return;

      // Reorder array
      const [moved] = stages.splice(srcIdx, 1);
      stages.splice(tgtIdx, 0, moved);

      try {
        await api('PUT', `/templates/${editingTemplate.id}/stages/reorder`, { stageIds: stages.map(s => s.id) });
        stages.forEach((s, i) => s.position = i);
        renderTemplateEditor();
      } catch (err) { alert('Failed to reorder: ' + err.message); }
    };

    // ─── INIT ────────────────────────────────────────
    async function init() {
      await loadTeam();
      switchTab('boards');
    }

    init();
  })();
  </script>
</body>
</html>
