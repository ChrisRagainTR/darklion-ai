<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBooks Authorization — DarkLion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1923;
      --charcoal: #1c2b3a;
      --card: #1e2f40;
      --gold: #c9a84c;
      --text: #e8edf2;
      --muted: #8fa3b8;
      --border: rgba(201,168,76,0.2);
      --green: #3ecf8e;
      --red: #f56565;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(15,25,35,0.95);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .nav-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .nav-name span { color: var(--gold); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .callback-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .status-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }

    .status-icon.loading {
      background: rgba(201,168,76,0.12);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-icon.success { background: rgba(62,207,142,0.12); }
    .status-icon.error   { background: rgba(245,101,101,0.12); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    h1.success { color: var(--green); }
    h1.error   { color: var(--red); }

    .status-msg {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.65;
    }

    .fallback-box {
      background: rgba(15,25,35,0.7);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.4rem 1.6rem;
      text-align: left;
      margin-top: 1.5rem;
      display: none;
    }

    .fallback-box h3 {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .data-row {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.9rem;
    }

    .data-row:last-child { margin-bottom: 0; }

    .data-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .data-value {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--gold);
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 5px;
      padding: 0.5rem 0.75rem;
      word-break: break-all;
    }

    .btn-home {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 1.8rem;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }

    .btn-home:hover { background: #e2c068; }

    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      list-style: none;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
    }

    .footer-links a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="36" height="36" style="display:block;flex-shrink:0;" aria-label="DarkLion logo">
        <defs>
          <linearGradient id="clm" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#e2c068"/><stop offset="100%" stop-color="#7a5c22"/></linearGradient>
          <linearGradient id="clm2" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#5a421a"/></linearGradient>
          <filter id="clg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <!-- MANE outer - bold angular rays -->
        <path d="M60,2 L52,20 L36,4 L34,26 L14,14 L20,36 L2,34 L14,52 L0,62 L16,68 L4,86 L24,82 L16,102 L38,94 L38,112 L60,98 L82,112 L82,94 L104,102 L96,82 L116,86 L104,68 L120,62 L106,52 L118,34 L100,36 L106,14 L86,26 L84,4 L68,20Z" fill="url(#clm2)"/>
        <!-- MANE inner -->
        <path d="M60,10 L54,24 L42,12 L40,30 L24,22 L26,40 L12,40 L20,54 L10,62 L22,68 L14,82 L30,78 L24,96 L40,90 L42,104 L60,94 L78,104 L80,90 L96,96 L90,78 L106,82 L98,68 L110,62 L100,54 L108,40 L94,40 L96,22 L80,30 L78,12 L66,24Z" fill="url(#clm)"/>
        <!-- FACE - dark background, gold features -->
        <path d="M60,26 L78,36 L88,54 L86,74 L76,88 L60,94 L44,88 L34,74 L32,54 L42,36Z" fill="#0f1923" stroke="#c9a84c" stroke-width="0.8"/>
        <!-- Forehead accent -->
        <path d="M60,30 L63,38 L60,46 L57,38Z" fill="#c9a84c" opacity="0.3"/>
        <!-- Brow ridges - gold on dark -->
        <path d="M38,52 L46,44 L56,50" stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M82,52 L74,44 L64,50" stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Eyes - fierce angular, glowing gold on dark -->
        <polygon points="38,58 48,52 56,59 48,64" fill="#b8942e"/>
        <polygon points="82,58 72,52 64,59 72,64" fill="#b8942e"/>
        <!-- Eye glow center -->
        <polygon points="42,58 48,54 52,59 48,62" fill="#ffe4a0" filter="url(#clg)"/>
        <polygon points="78,58 72,54 68,59 72,62" fill="#ffe4a0" filter="url(#clg)"/>
        <!-- Pupil slits -->
        <polygon points="46,56 48,54.5 50,56 48,61" fill="#c9a84c" opacity="0.8"/>
        <polygon points="74,56 72,54.5 70,56 72,61" fill="#c9a84c" opacity="0.8"/>
        <!-- Nose bridge -->
        <line x1="60" y1="50" x2="60" y2="66" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
        <!-- Nose -->
        <path d="M55,66 L65,66 L60,74Z" fill="#c9a84c" opacity="0.5"/>
        <path d="M55,66 L65,66 L60,74Z" fill="none" stroke="#c9a84c" stroke-width="1" stroke-linejoin="round"/>
        <!-- Mouth -->
        <path d="M48,80 L54,76 L60,81 L66,76 L72,80" stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Chin -->
        <path d="M52,86 L60,90 L68,86" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
        <!-- Cheek contour lines -->
        <path d="M36,68 L42,78 L46,84" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity="0.25"/>
        <path d="M84,68 L78,78 L74,84" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity="0.25"/>
      </svg>
      <span class="nav-name">Dark<span>Lion</span></span>
    </a>
  </nav>

  <main>
    <div class="callback-card" id="callback-card">
      <div class="status-icon loading" id="status-icon">&#x23F3;</div>
      <h1 id="status-title">Processing Authorization&hellip;</h1>
      <p class="status-msg" id="status-msg">Please wait while we complete the QuickBooks connection.</p>

      <div class="fallback-box" id="fallback-box">
        <h3>If automatic connection failed, send this to your administrator:</h3>
        <div class="data-row">
          <span class="data-label">Authorization Code</span>
          <span class="data-value" id="display-code">&mdash;</span>
        </div>
        <div class="data-row">
          <span class="data-label">Realm ID (Company)</span>
          <span class="data-value" id="display-realm">&mdash;</span>
        </div>
      </div>

      <div id="home-btn-wrap" style="display:none;">
        <a href="/" class="btn-home">&#x2190; Back to Home</a>
      </div>
    </div>
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="/privacy.html">Privacy Policy</a></li>
      <li><a href="/terms.html">Terms of Service</a></li>
      <li><a href="/">Home</a></li>
    </ul>
  </footer>

  <script>
    (async function () {
      const params  = new URLSearchParams(window.location.search);
      const code    = params.get('code');
      const realmId = params.get('realmId');
      const state   = params.get('state');
      const error   = params.get('error');

      const iconEl  = document.getElementById('status-icon');
      const titleEl = document.getElementById('status-title');
      const msgEl   = document.getElementById('status-msg');
      const fallback = document.getElementById('fallback-box');
      const btnWrap  = document.getElementById('home-btn-wrap');

      function showSuccess(autoConnected) {
        iconEl.className  = 'status-icon success';
        iconEl.textContent = '\u2705';
        titleEl.className = 'success';
        titleEl.textContent = 'Authorization Complete!';
        msgEl.textContent   = 'QuickBooks is now connected. DarkLion will begin processing your transactions shortly.';

        if (!autoConnected) {
          // Show fallback box with code/realmId
          document.getElementById('display-code').textContent  = code  || '(not provided)';
          document.getElementById('display-realm').textContent = realmId || '(not provided)';
          fallback.style.display = 'block';
        }

        btnWrap.style.display = 'block';
      }

      function showError(message) {
        iconEl.className   = 'status-icon error';
        iconEl.textContent = '\u274C';
        titleEl.className  = 'error';
        titleEl.textContent = 'Authorization Failed';
        msgEl.textContent  = message || 'An unknown error occurred. Please try connecting again.';
        btnWrap.style.display = 'block';
      }

      if (error) {
        showError('QuickBooks returned an error: ' + error + '. Please try again or contact support at support@darklion.ai.');
        return;
      }

      if (!code) {
        showError('No authorization code was received. Please return to the connect page and try again.');
        return;
      }

      // Forward to backend for token exchange
      const backendUrl = new URL('/auth/callback', window.location.origin);
      if (code)    backendUrl.searchParams.set('code', code);
      if (realmId) backendUrl.searchParams.set('realmId', realmId);
      if (state)   backendUrl.searchParams.set('state', state);

      let autoConnected = false;
      try {
        const res = await fetch(backendUrl.toString(), { signal: AbortSignal.timeout(15000) });
        if (res.ok) {
          autoConnected = true;
        }
      } catch (e) {
        autoConnected = false;
      }

      showSuccess(autoConnected);
    })();
  </script>

</body>
</html>
