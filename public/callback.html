<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBooks Authorization — DarkLion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1923;
      --charcoal: #1c2b3a;
      --card: #1e2f40;
      --gold: #c9a84c;
      --text: #e8edf2;
      --muted: #8fa3b8;
      --border: rgba(201,168,76,0.2);
      --green: #3ecf8e;
      --red: #f56565;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(15,25,35,0.95);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .nav-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .nav-name span { color: var(--gold); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .callback-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .status-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }

    .status-icon.loading {
      background: rgba(201,168,76,0.12);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-icon.success { background: rgba(62,207,142,0.12); }
    .status-icon.error   { background: rgba(245,101,101,0.12); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    h1.success { color: var(--green); }
    h1.error   { color: var(--red); }

    .status-msg {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.65;
    }

    .fallback-box {
      background: rgba(15,25,35,0.7);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.4rem 1.6rem;
      text-align: left;
      margin-top: 1.5rem;
      display: none;
    }

    .fallback-box h3 {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .data-row {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.9rem;
    }

    .data-row:last-child { margin-bottom: 0; }

    .data-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .data-value {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--gold);
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 5px;
      padding: 0.5rem 0.75rem;
      word-break: break-all;
    }

    .btn-home {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 1.8rem;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }

    .btn-home:hover { background: #e2c068; }

    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      list-style: none;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
    }

    .footer-links a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="36" height="36" style="display:block;flex-shrink:0;" aria-label="DarkLion logo">
        <defs>
          <linearGradient id="clf" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#f5dfa0"/><stop offset="100%" stop-color="#b8942e"/></linearGradient>
          <filter id="clg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <!-- Halo ring -->
        <circle cx="60" cy="56" r="56" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.35"/>
        <!-- Mane outer layer -->
        <polygon points="60,2 54,10 48,4 44,18 52,24 60,14 68,24 76,18 72,4 66,10" fill="#6b4f1d"/>
        <polygon points="44,18 34,8 24,20 32,30 40,24" fill="#5a421a"/>
        <polygon points="76,18 86,8 96,20 88,30 80,24" fill="#5a421a"/>
        <polygon points="24,20 12,26 8,44 18,48 26,36" fill="#4a3614"/>
        <polygon points="96,20 108,26 112,44 102,48 94,36" fill="#4a3614"/>
        <polygon points="8,44 4,60 12,72 22,62 18,50" fill="#3d2d10"/>
        <polygon points="112,44 116,60 108,72 98,62 102,50" fill="#3d2d10"/>
        <polygon points="12,72 16,84 28,82 24,72" fill="#3d2d10" opacity="0.7"/>
        <polygon points="108,72 104,84 92,82 96,72" fill="#3d2d10" opacity="0.7"/>
        <!-- Mane inner layer -->
        <polygon points="60,8 54,16 48,10 42,24 50,28 60,20 70,28 78,24 72,10 66,16" fill="#8a6d2b"/>
        <polygon points="42,24 32,16 24,28 34,34 40,28" fill="#7a5c22"/>
        <polygon points="78,24 88,16 96,28 86,34 80,28" fill="#7a5c22"/>
        <polygon points="24,28 14,34 12,52 24,50 28,38" fill="#6b4f1d"/>
        <polygon points="96,28 106,34 108,52 96,50 92,38" fill="#6b4f1d"/>
        <polygon points="12,52 8,66 20,68 24,56" fill="#5a421a"/>
        <polygon points="108,52 112,66 100,68 96,56" fill="#5a421a"/>
        <!-- Face -->
        <polygon points="60,22 76,30 88,48 84,66 74,80 60,88 46,80 36,66 32,48 44,30" fill="url(#clf)" stroke="#9a7828" stroke-width="0.8"/>
        <!-- Forehead diamond -->
        <polygon points="60,26 64,33 60,40 56,33" fill="#0f1923" opacity="0.45"/>
        <!-- Brow ridges -->
        <polygon points="36,48 44,40 58,46 54,52" fill="#0f1923" opacity="0.8"/>
        <polygon points="84,48 76,40 62,46 66,52" fill="#0f1923" opacity="0.8"/>
        <!-- Eyes -->
        <polygon points="38,56 46,50 54,56 46,62" fill="#0f1923"/>
        <polygon points="82,56 74,50 66,56 74,62" fill="#0f1923"/>
        <!-- Eye glow -->
        <polygon points="42,56 46,52.5 50,56 46,59.5" fill="#ffe4a0" filter="url(#clg)"/>
        <polygon points="78,56 74,52.5 70,56 74,59.5" fill="#ffe4a0" filter="url(#clg)"/>
        <!-- Nose bridge + nose -->
        <line x1="60" y1="44" x2="60" y2="62" stroke="#0f1923" stroke-width="0.8" opacity="0.3"/>
        <polygon points="55,64 65,64 60,72" fill="#0f1923" opacity="0.7"/>
        <!-- Mouth -->
        <path d="M50,76 L56,73 L60,77 L64,73 L70,76" stroke="#0f1923" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Chin -->
        <polygon points="54,82 60,86 66,82 60,79" fill="#0f1923" opacity="0.35"/>
        <!-- Jaw contour -->
        <line x1="36" y1="66" x2="44" y2="78" stroke="#0f1923" stroke-width="0.8" opacity="0.25"/>
        <line x1="84" y1="66" x2="76" y2="78" stroke="#0f1923" stroke-width="0.8" opacity="0.25"/>
        <!-- Tech circuit accents -->
        <line x1="60" y1="90" x2="60" y2="104" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
        <line x1="52" y1="88" x2="46" y2="100" stroke="#c9a84c" stroke-width="0.6" opacity="0.25"/>
        <line x1="68" y1="88" x2="74" y2="100" stroke="#c9a84c" stroke-width="0.6" opacity="0.25"/>
        <circle cx="60" cy="106" r="1.5" fill="#c9a84c" opacity="0.35"/>
        <circle cx="45" cy="102" r="1" fill="#c9a84c" opacity="0.25"/>
        <circle cx="75" cy="102" r="1" fill="#c9a84c" opacity="0.25"/>
        <line x1="20" y1="68" x2="12" y2="76" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
        <line x1="100" y1="68" x2="108" y2="76" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
      </svg>
      <span class="nav-name">Dark<span>Lion</span></span>
    </a>
  </nav>

  <main>
    <div class="callback-card" id="callback-card">
      <div class="status-icon loading" id="status-icon">&#x23F3;</div>
      <h1 id="status-title">Processing Authorization&hellip;</h1>
      <p class="status-msg" id="status-msg">Please wait while we complete the QuickBooks connection.</p>

      <div class="fallback-box" id="fallback-box">
        <h3>If automatic connection failed, send this to your administrator:</h3>
        <div class="data-row">
          <span class="data-label">Authorization Code</span>
          <span class="data-value" id="display-code">&mdash;</span>
        </div>
        <div class="data-row">
          <span class="data-label">Realm ID (Company)</span>
          <span class="data-value" id="display-realm">&mdash;</span>
        </div>
      </div>

      <div id="home-btn-wrap" style="display:none;">
        <a href="/" class="btn-home">&#x2190; Back to Home</a>
      </div>
    </div>
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="/privacy.html">Privacy Policy</a></li>
      <li><a href="/terms.html">Terms of Service</a></li>
      <li><a href="/">Home</a></li>
    </ul>
  </footer>

  <script>
    (async function () {
      const params  = new URLSearchParams(window.location.search);
      const code    = params.get('code');
      const realmId = params.get('realmId');
      const state   = params.get('state');
      const error   = params.get('error');

      const iconEl  = document.getElementById('status-icon');
      const titleEl = document.getElementById('status-title');
      const msgEl   = document.getElementById('status-msg');
      const fallback = document.getElementById('fallback-box');
      const btnWrap  = document.getElementById('home-btn-wrap');

      function showSuccess(autoConnected) {
        iconEl.className  = 'status-icon success';
        iconEl.textContent = '\u2705';
        titleEl.className = 'success';
        titleEl.textContent = 'Authorization Complete!';
        msgEl.textContent   = 'QuickBooks is now connected. DarkLion will begin processing your transactions shortly.';

        if (!autoConnected) {
          // Show fallback box with code/realmId
          document.getElementById('display-code').textContent  = code  || '(not provided)';
          document.getElementById('display-realm').textContent = realmId || '(not provided)';
          fallback.style.display = 'block';
        }

        btnWrap.style.display = 'block';
      }

      function showError(message) {
        iconEl.className   = 'status-icon error';
        iconEl.textContent = '\u274C';
        titleEl.className  = 'error';
        titleEl.textContent = 'Authorization Failed';
        msgEl.textContent  = message || 'An unknown error occurred. Please try connecting again.';
        btnWrap.style.display = 'block';
      }

      if (error) {
        showError('QuickBooks returned an error: ' + error + '. Please try again or contact support at support@darklion.ai.');
        return;
      }

      if (!code) {
        showError('No authorization code was received. Please return to the connect page and try again.');
        return;
      }

      // Forward to backend for token exchange
      const backendUrl = new URL('/auth/callback', window.location.origin);
      if (code)    backendUrl.searchParams.set('code', code);
      if (realmId) backendUrl.searchParams.set('realmId', realmId);
      if (state)   backendUrl.searchParams.set('state', state);

      let autoConnected = false;
      try {
        const res = await fetch(backendUrl.toString(), { signal: AbortSignal.timeout(15000) });
        if (res.ok) {
          autoConnected = true;
        }
      } catch (e) {
        autoConnected = false;
      }

      showSuccess(autoConnected);
    })();
  </script>

</body>
</html>
