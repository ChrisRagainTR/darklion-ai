name: Build DarkLion Print Agent

on:
  push:
    paths:
      - 'darklion-print-agent/**'
    branches: [main, dev]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Node.js
        shell: powershell
        run: node --version; npm --version

      - name: Prepare Redmon64.dll
        shell: powershell
        run: |
          # Ensure installer directory exists
          $dir = "darklion-print-agent\installer"
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir | Out-Null }
          $dest = "$dir\redmon64.dll"

          # Try to download Redmon (open-source Windows port monitor)
          $urls = @(
            "https://github.com/nicholasess/redmon/raw/master/redmon64.dll",
            "https://github.com/dtjohnson/redmon/raw/master/redmon64.dll"
          )
          $downloaded = $false
          foreach ($url in $urls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing -TimeoutSec 30
              if ((Test-Path $dest) -and (Get-Item $dest).Length -gt 1000) {
                Write-Host "Redmon64.dll downloaded from $url"
                $downloaded = $true
                break
              }
            } catch {
              Write-Host "Failed from $url : $_"
            }
          }
          if (-not $downloaded) {
            # Use placeholder — printer virtual port setup will be skipped at install time
            Write-Host "WARNING: Could not download Redmon — using placeholder. Manual Redmon setup required for virtual printer."
            [byte[]]$placeholder = [byte[]]::new(64)
            [System.IO.File]::WriteAllBytes($dest, $placeholder)
          }
          Write-Host "Redmon step complete."

      - name: Create placeholder icon (if not present)
        shell: powershell
        run: |
          # electron-builder needs an icon.ico — create a minimal one if not committed
          $iconPath = "darklion-print-agent\app\renderer\icon.ico"
          if (-not (Test-Path $iconPath)) {
            # Use a 1x1 valid ICO file (base64 encoded minimal ICO)
            $icoBase64 = ""
            [System.IO.File]::WriteAllBytes($iconPath, [System.Convert]::FromBase64String($icoBase64))
            Write-Host "Placeholder icon created."
          } else {
            Write-Host "Icon already exists."
          }

      - name: Install Electron app dependencies
        working-directory: darklion-print-agent/app
        run: npm ci

      - name: Build Windows installer
        working-directory: darklion-print-agent/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkLionPrintAgent-installer
          path: darklion-print-agent/app/dist/DarkLionPrintAgent_Setup_*.exe
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: darklion-print-agent/dist/DarkLionPrintAgent_Setup_*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
