name: Build DarkLion Print Agent

on:
  push:
    paths:
      - 'darklion-print-agent/**'
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: darklion-print-agent/app/package-lock.json

      - name: Download Redmon64.dll
        shell: powershell
        run: |
          # Download Redmon from the official source
          $url = "https://www.undocprint.org/uploads/winspool/redmon22.zip"
          $zip = "$env:TEMP\redmon.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\redmon" -Force
          # Copy the 64-bit DLL to the installer directory
          Copy-Item "$env:TEMP\redmon\redmon64.dll" "darklion-print-agent\installer\redmon64.dll" -Force
          Write-Host "Redmon64.dll ready."

      - name: Create placeholder icon (if not present)
        shell: powershell
        run: |
          # electron-builder needs an icon.ico — create a minimal one if not committed
          $iconPath = "darklion-print-agent\app\renderer\icon.ico"
          if (-not (Test-Path $iconPath)) {
            # Use a 1x1 valid ICO file (base64 encoded minimal ICO)
            $icoBase64 = ""
            [System.IO.File]::WriteAllBytes($iconPath, [System.Convert]::FromBase64String($icoBase64))
            Write-Host "Placeholder icon created."
          } else {
            Write-Host "Icon already exists."
          }

      - name: Install Electron app dependencies
        working-directory: darklion-print-agent/app
        run: npm ci

      - name: Build Windows installer
        working-directory: darklion-print-agent/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkLionPrintAgent-installer
          path: darklion-print-agent/dist/DarkLionPrintAgent_Setup_*.exe
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: darklion-print-agent/dist/DarkLionPrintAgent_Setup_*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
